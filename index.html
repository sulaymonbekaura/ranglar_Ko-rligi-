<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  RANGLAR KO'RLIGI  v3  —  To'liq versiya
// ═══════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r||0,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();return this;
  };
}

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',()=>{resize();calcBtns();});

// ─── KONSTANTLAR ────────────────────────────────────────────
const GRAV=0.47, JUMP=-13.2, SPD=3.6, MAXV=16;
const PW=26, PH=34;
const CHEX=['#ff3355','#33ff88','#3388ff'];
const CNAME=["Qizil","Yashil","Ko'k"];
const NEU='#8899cc';

// ─── HOLAT ──────────────────────────────────────────────────
let gameState='title'; // title | countdown | playing | levelComplete | over | win
let levelIdx=0, score=0, lives=5, activeC=0, frame=0;
let titleT=0, countDown=3, countTimer=0;
let bestScore=parseInt(localStorage.getItem('rk_best')||0);
let currentLevel;

// Screen shake
let shakeAmt=0;
// Color flash
let flashAmt=0, flashCol='#fff';

// ─── AUDIO ──────────────────────────────────────────────────
let ac, bgmGain, bgmRunning=false, bgmTimer=null;

function initAudio(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  bgmGain=ac.createGain();
  bgmGain.gain.value=0.055;
  bgmGain.connect(ac.destination);
}

function beep(freq,type,dur,vol,delay){
  if(!ac)return;
  const t=ac.currentTime+(delay||0);
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}

function snd(type){
  if(!ac)return;
  switch(type){
    case'jump':   beep(260,'square',.08,.08);beep(420,'square',.07,.06,.06);break;
    case'land':   beep(110,'square',.05,.06);break;
    case'die':    beep(360,'sawtooth',.1,.09);beep(180,'sawtooth',.25,.08,.12);beep(90,'sawtooth',.4,.07,.27);break;
    case'collect':beep(700,'sine',.08,.07);beep(1050,'sine',.1,.05,.08);break;
    case'stomp':  beep(270,'square',.05,.1);beep(85,'sine',.18,.08,.05);break;
    case'color':  beep([500,640,780][activeC],'sine',.12,.07);break;
    case'portal': [523,659,784,1047].forEach((f,i)=>beep(f,'square',.14,.07,i*.12));break;
    case'count':  beep(660,'sine',.15,.1);break;
    case'go':     beep(880,'square',.06,.1);beep(1100,'square',.1,.08,.08);break;
  }
}

// ─── CHIPTUNE MUSIQA ────────────────────────────────────────
// Har bir element: [ohang_hz, bass_hz, urinishlar_soni]
const BGM=[
  [392,196,1],[330,196,1],[392,196,1],[440,196,1],
  [392,175,1],[330,175,1],[262,175,1],[294,175,1],
  [330,196,1],[294,196,1],[330,196,1],[392,196,1],
  [330,175,1],[262,175,1],[196,175,2],
  [392,196,1],[523,196,1],[440,196,1],[392,196,1],
  [330,175,1],[392,175,1],[440,175,1],[523,175,1],
  [440,196,1],[392,196,1],[330,196,1],[294,196,1],
  [262,131,2],[294,131,1],[330,131,1],
];
const BGM_STEP=0.175; // 1/8 nota uzunligi (soniya)

function bgmPlayNote(freq,dur,when,type,v){
  if(!ac||!bgmGain)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(bgmGain);
  o.type=type||'square';o.frequency.value=freq;
  g.gain.setValueAtTime(v||0.45,when);
  g.gain.setValueAtTime(v||0.45,when+dur*.75);
  g.gain.exponentialRampToValueAtTime(0.0001,when+dur*.95);
  o.start(when);o.stop(when+dur+.02);
}

function startBGM(){
  if(!ac||bgmRunning)return;
  bgmRunning=true;
  const totalDur=BGM.reduce((s,[,,d])=>s+d*BGM_STEP,0);
  function sch(){
    if(!bgmRunning)return;
    let t=ac.currentTime+.05;
    for(const[mel,bas,steps]of BGM){
      const d=steps*BGM_STEP;
      bgmPlayNote(mel,d*.82,t,'square',.4);
      bgmPlayNote(bas,d*.88,t,'triangle',.28);
      t+=d;
    }
    bgmTimer=setTimeout(sch,(totalDur-.15)*1000);
  }
  sch();
}

function stopBGM(){
  bgmRunning=false;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}
  if(bgmGain&&ac)bgmGain.gain.setTargetAtTime(0,ac.currentTime,.3);
}

// ─── ZARRALAR ───────────────────────────────────────────────
class Particle{
  constructor(x,y,col,vx,vy,life,sz){
    this.x=x;this.y=y;this.col=col;
    this.vx=vx!=null?vx:(Math.random()-.5)*9;
    this.vy=vy!=null?vy:(Math.random()-.5)*9-2;
    this.life=life||1;this.ml=this.life;
    this.sz=sz||Math.random()*4+1;
  }
  upd(){this.x+=this.vx;this.y+=this.vy;this.vy+=.2;this.vx*=.97;this.life-=.022;}
  draw(){
    if(this.life<=0)return;
    const a=Math.pow(this.life/this.ml,.6);
    ctx.save();ctx.globalAlpha=a*.9;
    ctx.fillStyle=this.col;ctx.shadowColor=this.col;ctx.shadowBlur=7;
    ctx.beginPath();ctx.arc(this.x-cam.x,this.y-cam.y,this.sz*a,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  dead(){return this.life<=0;}
}
let parts=[];
function burst(x,y,col,n,str){
  str=str||1;
  for(let i=0;i<n;i++)
    parts.push(new Particle(x,y,col,(Math.random()-.5)*9*str,(Math.random()-.5)*9*str-3*str));
}

// ─── KAMERA ─────────────────────────────────────────────────
const cam={x:0,y:0,tx:0,ty:0};
function updateCam(){
  cam.x+=(cam.tx-cam.x)*.13;
  cam.y+=(cam.ty-cam.y)*.13;
  const lv=currentLevel;
  cam.x=Math.max(0,Math.min(cam.x,lv.worldW-canvas.width));
  cam.y=Math.max(-180,Math.min(cam.y,lv.worldH-canvas.height+200));
}

function addShake(v){shakeAmt=Math.max(shakeAmt,v);}
function addFlash(col,v){flashCol=col;flashAmt=Math.max(flashAmt,v);}

// ─── YORDAMCHILAR ───────────────────────────────────────────
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ─── PLATFORMA ──────────────────────────────────────────────
class Platform{
  constructor(x,y,w,h,col){this.x=x;this.y=y;this.w=w;this.h=h;this.col=col;}
  solid(){return this.col===-1||this.col!==activeC;}
  draw(){
    const sx=this.x-cam.x,sy=this.y-cam.y;
    const erased=this.col!==-1&&this.col===activeC;
    const hex=this.col===-1?NEU:CHEX[this.col];
    ctx.save();
    if(erased)ctx.globalAlpha=.1;
    ctx.shadowColor=hex;ctx.shadowBlur=erased?0:18;
    const gr=ctx.createLinearGradient(sx,sy,sx,sy+this.h);
    gr.addColorStop(0,hex);gr.addColorStop(1,hex+'77');
    ctx.fillStyle=gr;ctx.beginPath();ctx.roundRect(sx,sy,this.w,this.h,5);ctx.fill();
    if(!erased){
      ctx.globalAlpha=.35;ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.fillRect(sx+4,sy+2,this.w-8,4);
    }
    ctx.restore();
  }
}

// ─── TIKAN ──────────────────────────────────────────────────
class Spike{
  constructor(x,y,w,col){this.x=x;this.y=y;this.w=w||28;this.h=20;this.col=col;}
  solid(){return this.col===-1||this.col!==activeC;}
  check(){if(!this.solid())return;if(player.alive&&ov(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h}))player.kill();}
  draw(){
    const sx=this.x-cam.x,sy=this.y-cam.y,hex=this.col===-1?NEU:CHEX[this.col];
    const er=this.col!==-1&&this.col===activeC;
    ctx.save();if(er)ctx.globalAlpha=.1;
    ctx.fillStyle=hex;ctx.shadowColor=hex;ctx.shadowBlur=er?0:10;
    const n=Math.max(1,Math.floor(this.w/16)),sw=this.w/n;
    for(let i=0;i<n;i++){
      ctx.beginPath();ctx.moveTo(sx+i*sw,sy+this.h);
      ctx.lineTo(sx+i*sw+sw/2,sy);ctx.lineTo(sx+(i+1)*sw,sy+this.h);
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
  }
}

// ─── OLMOS ──────────────────────────────────────────────────
class Gem{
  constructor(x,y,col){this.x=x;this.y=y;this.w=20;this.h=20;this.col=col;this.t=Math.random()*Math.PI*2;this.taken=false;}
  upd(){
    this.t+=.04;
    if(!this.taken&&player.alive){
      const fy=this.y-Math.sin(this.t)*7;
      if(ov(player.rect(),{x:this.x,y:fy,w:this.w,h:this.h})){
        this.taken=true;score+=50;
        burst(this.x+10,this.y+10,this.col===-1?'#ffdd00':CHEX[this.col],8);
        snd('collect');
      }
    }
  }
  draw(){
    if(this.taken)return;
    const sx=this.x-cam.x,sy=this.y-cam.y-Math.sin(this.t)*7;
    const hex=this.col===-1?'#ffdd00':CHEX[this.col];
    ctx.save();ctx.shadowColor=hex;ctx.shadowBlur=16;ctx.fillStyle=hex;
    ctx.beginPath();ctx.moveTo(sx+10,sy);ctx.lineTo(sx+20,sy+10);ctx.lineTo(sx+10,sy+20);ctx.lineTo(sx,sy+10);ctx.closePath();ctx.fill();
    ctx.globalAlpha=.5;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(sx+10,sy+2);ctx.lineTo(sx+18,sy+10);ctx.lineTo(sx+10,sy+10);ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

// ─── PORTAL ─────────────────────────────────────────────────
class Portal{
  constructor(x,y){this.x=x;this.y=y;this.w=42;this.h=60;this.t=0;this.done=false;}
  upd(){
    this.t+=.04;
    if(!this.done&&player.alive&&ov(player.rect(),this)){this.done=true;nextLevel();}
  }
  draw(){
    const sx=this.x-cam.x+21,sy=this.y-cam.y+30;
    ctx.save();
    // dış parlama
    const og=ctx.createRadialGradient(sx,sy,0,sx,sy,55);
    og.addColorStop(0,'rgba(200,80,255,.35)');og.addColorStop(1,'rgba(180,60,255,0)');
    ctx.fillStyle=og;ctx.beginPath();ctx.ellipse(sx,sy,55,60,0,0,Math.PI*2);ctx.fill();
    // halqa
    ctx.strokeStyle='#cc55ff';ctx.lineWidth=3+Math.sin(this.t);ctx.shadowColor='#cc55ff';ctx.shadowBlur=28;
    ctx.beginPath();ctx.ellipse(sx,sy,20+Math.sin(this.t)*3,29+Math.cos(this.t)*4,0,0,Math.PI*2);ctx.stroke();
    // ichki
    const ig=ctx.createRadialGradient(sx,sy,0,sx,sy,19);
    ig.addColorStop(0,'rgba(230,140,255,.85)');ig.addColorStop(1,'rgba(100,20,200,.3)');
    ctx.fillStyle=ig;ctx.beginPath();ctx.ellipse(sx,sy,19,28,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<3;i++){
      const a=this.t*2+i*Math.PI*2/3;
      ctx.fillStyle='#ff88ff';ctx.shadowBlur=9;
      ctx.beginPath();ctx.arc(sx+Math.cos(a)*29,sy+Math.sin(a)*35,4,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.fillText('⭐',sx,sy);
    ctx.restore();
  }
}

// ─── DUSHMAN ────────────────────────────────────────────────
class Enemy{
  constructor(x,y,pl,pr,col){this.x=x;this.y=y;this.w=30;this.h=30;this.vx=.9;this.pl=pl;this.pr=pr;this.col=col;this.alive=true;this.t=0;}
  upd(){
    if(!this.alive)return;
    this.t+=.1;this.x+=this.vx;
    if(this.x<=this.pl||this.x+this.w>=this.pr)this.vx*=-1;
    if(!player.alive||player.inv>0)return;
    if(ov(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h})){
      if(player.vy>1&&player.y+player.h<this.y+this.h*.55){
        this.alive=false;player.vy=JUMP*.65;
        score+=100;addShake(8);
        burst(this.x+15,this.y+15,this.col>=0?CHEX[this.col]:'#ff8833',15);
        snd('stomp');
      }else{player.kill();}
    }
  }
  draw(){
    if(!this.alive)return;
    const sx=this.x-cam.x,sy=this.y-cam.y+Math.sin(this.t)*2.5;
    const ec=this.col>=0?CHEX[this.col]:'#ff8833';
    ctx.save();ctx.shadowColor=ec;ctx.shadowBlur=15;ctx.fillStyle=ec;
    ctx.beginPath();ctx.roundRect(sx,sy,this.w,this.h-Math.abs(Math.sin(this.t))*2,7);ctx.fill();
    ctx.fillStyle='#111';ctx.shadowBlur=0;
    [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(sx+15+s*8,sy+11,4,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#f00';
    [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(sx+15+s*8,sy+11,2,0,Math.PI*2);ctx.fill();});
    ctx.strokeStyle='#111';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx+5,sy+5);ctx.lineTo(sx+11,sy+8);ctx.moveTo(sx+25,sy+5);ctx.lineTo(sx+19,sy+8);ctx.stroke();
    ctx.restore();
  }
}

// ─── DARAJA BO'SHASH BELGISI ────────────────────────────────
class Hint{
  constructor(x,y,txt,col){this.x=x;this.y=y;this.txt=txt;this.col=col;this.t=Math.random()*Math.PI*2;}
  draw(){
    if(Math.abs(player.x-this.x)>350)return;
    this.t+=.04;
    const sx=this.x-cam.x,sy=this.y-cam.y+Math.sin(this.t)*5;
    const hex=CHEX[this.col];
    ctx.save();
    ctx.shadowColor=hex;ctx.shadowBlur=12;
    ctx.fillStyle=hex;
    ctx.font=`bold ${Math.min(canvas.width*.032,13)}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('↓ '+this.txt+' ↓',sx,sy);
    ctx.restore();
  }
}

// ─── PLAYER ─────────────────────────────────────────────────
const player={
  x:100,y:100,vx:0,vy:0,w:PW,h:PH,
  grounded:false,alive:true,dying:false,
  inv:0,jumped:false,face:1,
  // squash/stretch
  sx:1,sy:1,tsx:1,tsy:1,
  rect(){return{x:this.x,y:this.y,w:this.w,h:this.h};},
  reset(rx,ry){
    this.x=rx;this.y=ry;this.vx=0;this.vy=0;
    this.grounded=false;this.alive=true;this.dying=false;
    this.inv=100;this.jumped=false;
    this.sx=1;this.sy=1;this.tsx=1;this.tsy=1;
  },
  upd(){
    if(!this.alive)return;
    if(this.inv>0)this.inv--;
    // squash/stretch yaqinlashuv
    this.sx+=(this.tsx-this.sx)*.28;this.sy+=(this.tsy-this.sy)*.28;
    this.tsx+=(1-this.tsx)*.18;this.tsy+=(1-this.tsy)*.18;

    if(keys.left||touch.left)      {this.vx=-SPD;this.face=-1;}
    else if(keys.right||touch.right){this.vx= SPD;this.face= 1;}
    else this.vx*=.76;

    this.vy=Math.min(this.vy+GRAV,MAXV);

    this.x+=this.vx;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(ov(this.rect(),p)){
        if(this.vx>0)this.x=p.x-this.w;else this.x=p.x+p.w;
        this.vx=0;
      }
    }
    const wasG=this.grounded;this.grounded=false;
    this.y+=this.vy;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(ov(this.rect(),p)){
        if(this.vy>=0){
          this.y=p.y-this.h;
          if(this.vy>4){addShake(5);this.tsx=1.5;this.tsy=0.55;snd('land');}
          this.vy=0;this.grounded=true;
        }else{this.y=p.y+p.h;this.vy=0;}
      }
    }
    if(this.grounded&&!wasG){this.jumped=false;}
    this.x=Math.max(0,this.x);
    if(this.y>currentLevel.worldH+400)this.kill();

    // yurganda chang
    if(this.grounded&&(keys.left||touch.left||keys.right||touch.right)&&frame%8===0)
      parts.push(new Particle(this.x+13,this.y+this.h,CHEX[activeC],0,-1,.4,1.5));

    cam.tx=this.x-canvas.width/2+this.w/2;
    cam.ty=this.y-canvas.height*.44;
  },
  jump(){
    if(this.jumped||!this.grounded)return; // FAQAT 1 marta sakrash!
    this.vy=JUMP;this.jumped=true;this.grounded=false;
    this.tsx=.7;this.tsy=1.45; // uzayish
    snd('jump');burst(this.x+13,this.y+this.h,CHEX[activeC],9,.7);
  },
  kill(){
    if(this.dying||this.inv>0)return;
    this.dying=true;this.alive=false;
    addShake(18);addFlash('#ff1144',.55);
    burst(this.x+13,this.y+17,'#ff3355',25);burst(this.x+13,this.y+17,'#fff',10);
    snd('die');lives--;
    setTimeout(()=>{
      if(lives<=0)gameState='over';
      else{loadLevel(levelIdx);gameState='playing';}
    },1400);
  },
  draw(){
    if(!this.alive)return;
    if(this.inv>0&&frame%6<3)return;
    // squash/stretch asosida o'lchamni hisoblash
    const dw=this.w*this.sx,dh=this.h*this.sy;
    const sx2=this.x-cam.x+this.w/2-dw/2;
    const sy2=this.y-cam.y+this.h-dh;
    ctx.save();
    // aura
    ctx.globalAlpha=.22;ctx.fillStyle=CHEX[activeC];
    ctx.beginPath();ctx.roundRect(sx2-6,sy2-6,dw+12,dh+12,15);ctx.fill();ctx.globalAlpha=1;
    ctx.shadowColor=CHEX[activeC];ctx.shadowBlur=24;
    const gr=ctx.createLinearGradient(sx2,sy2,sx2,sy2+dh);
    gr.addColorStop(0,'#dde2ff');gr.addColorStop(1,'#7788cc');
    ctx.fillStyle=gr;ctx.beginPath();ctx.roundRect(sx2,sy2,dw,dh,8);ctx.fill();
    ctx.strokeStyle=CHEX[activeC];ctx.lineWidth=2.5;ctx.stroke();
    // ko'z
    const ex=sx2+(this.face>0?dw*.65:dw*.35),ey=sy2+dh*.3;
    ctx.fillStyle='#111';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=CHEX[activeC];ctx.beginPath();ctx.arc(ex+this.face*1.3,ey,2,0,Math.PI*2);ctx.fill();
    // sharf
    ctx.fillStyle=CHEX[activeC];ctx.globalAlpha=.8;
    ctx.fillRect(sx2+3,sy2+dh*.55,dw-6,4);
    ctx.restore();
  }
};

// ─── LEVEL BUILDER ──────────────────────────────────────────
const P=(x,y,w,h,c)=>new Platform(x,y,w,h,c);
const S=(x,y,w,c)=>new Spike(x,y,w,c);
const E=(x,y,l,r,c)=>new Enemy(x,y,l,r,c);
const G=(x,y,c)=>new Gem(x,y,c);
const H=(x,y,t,c)=>new Hint(x,y,t,c);

// ══ DARAJA 1 ══
function mkLv1(){
  const Y=530;
  return{
    name:'1-DARAJA: Salom Dunyo!',
    worldW:2900,worldH:800,
    sx:60,sy:Y-80,
    bgTop:'#06061e',bgBot:'#140824',
    initC:0,
    plats:[
      P(0,Y,360,30,-1),
      P(450,Y,220,30,0),     // Qizil ko'prik
      P(770,Y,190,30,-1),
      P(1060,Y,220,30,1),    // Yashil ko'prik
      P(1380,Y,190,30,-1),
      P(1670,Y,220,30,2),    // Ko'k ko'prik
      P(1990,Y,190,30,-1),

const LVS=[mkLv1,mkLv2,mkLv3];

function loadLevel(idx){
  currentLevel=LVS[idx]();
  activeC=currentLevel.initC;
  player.reset(currentLevel.sx,currentLevel.sy);
  cam.x=0;cam.y=0;parts=[];
}

function startGame(){score=0;lives=5;levelIdx=0;loadLevel(0);startCountDown();}
function restartGame(){score=0;lives=5;levelIdx=0;loadLevel(0);startCountDown();}
function startCountDown(){gameState='countdown';countDown=3;countTimer=0;}

function nextLevel(){
  score+=500;snd('portal');
  burst(player.x+13,player.y+17,'#ffdd00',30);burst(player.x+13,player.y+17,'#fff',12);
  addFlash('#ffdd00',.5);
  levelIdx++;
  if(levelIdx>=LVS.length){
    if(score>bestScore){bestScore=score;localStorage.setItem('rk_best',bestScore);}
    gameState='win';
  }else{
    gameState='levelComplete';
  }
}

function setColor(c){
  if(activeC===c)return;
  activeC=c;snd('color');
  addFlash(CHEX[c],.35);
  burst(player.x+13,player.y+17,CHEX[c],14,.75);
}

// ─── INPUT ──────────────────────────────────────────────────
const keys={};
const touch={left:false,right:false};

window.addEventListener('keydown',e=>{
  initAudio();
  if(gameState==='title')                   {startGame();return;}
  if(gameState==='over'||gameState==='win') {restartGame();return;}
  if(gameState==='levelComplete')           {startCountDown();loadLevel(levelIdx);gameState='countdown';return;}
  if(gameState==='countdown'||gameState==='playing'){
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;
    if(['ArrowUp','w','W',' '].includes(e.key)){e.preventDefault();player.jump();}
    if(e.key==='1')setColor(0);
    if(e.key==='2')setColor(1);
    if(e.key==='3')setColor(2);
  }
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
});

// ─── TUGMALAR ───────────────────────────────────────────────
const btns={};
function calcBtns(){
  const W=canvas.width,H=canvas.height;
  const pad=10;
  const mvW=Math.min(76,W*.185),mvH=Math.min(74,H*.105);
  const row2Y=H-mvH-pad;
  btns.left ={x:pad,y:row2Y,w:mvW,h:mvH};
  btns.right={x:pad*2+mvW,y:row2Y,w:mvW,h:mvH};
  const jpW=Math.min(82,W*.2),jpH=Math.min(82,H*.115);
  btns.jump={x:W-jpW-pad,y:H-jpH-pad,w:jpW,h:jpH};
  const cw=Math.min(70,W*.17),ch=Math.min(56,H*.08);
  const tot=cw*3+pad*2,csx=(W-tot)/2,cY=row2Y-ch-8;
  btns.R={x:csx,y:cY,w:cw,h:ch};
  btns.G={x:csx+cw+pad,y:cY,w:cw,h:ch};
  btns.B={x:csx+cw*2+pad*2,y:cY,w:cw,h:ch};
}
calcBtns();

function inB(b,tx,ty){const m=16;return tx>=b.x-m&&tx<=b.x+b.w+m&&ty>=b.y-m&&ty<=b.y+b.h+m;}
function gTxy(t){
  const r=canvas.getBoundingClientRect();
  return{x:(t.clientX-r.left)*canvas.width/r.width,y:(t.clientY-r.top)*canvas.height/r.height};
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  if(gameState==='title')                   {startGame();return;}
  if(gameState==='over'||gameState==='win') {restartGame();return;}
  if(gameState==='levelComplete')           {startCountDown();loadLevel(levelIdx);gameState='countdown';return;}
  for(const t of e.changedTouches){
    const{x,y}=gTxy(t);
    if(inB(btns.left,x,y))  touch.left=true;
    if(inB(btns.right,x,y)) touch.right=true;
    if(inB(btns.jump,x,y))  player.jump();
    if(inB(btns.R,x,y))setColor(0);
    if(inB(btns.G,x,y))setColor(1);
    if(inB(btns.B,x,y))setColor(2);
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  touch.left=false;touch.right=false;
  for(const t of e.touches){
    const{x,y}=gTxy(t);
    if(inB(btns.left,x,y)) touch.left=true;
    if(inB(btns.right,x,y))touch.right=true;
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  touch.left=false;touch.right=false;
  for(const t of e.touches){
    const{x,y}=gTxy(t);
    if(inB(btns.left,x,y)) touch.left=true;
    if(inB(btns.right,x,y))touch.right=true;
  }
},{passive:false});

// ─── YULDUZLAR ──────────────────────────────────────────────
const STARS=Array.from({length:150},()=>({
  fx:Math.random(),fy:Math.random(),r:Math.random()*1.5+.3,
  spd:Math.random()*.0003+.0001,t:Math.random()*Math.PI*2
}));
function drawStars(W,H,par){
  for(const s of STARS){
    s.t+=s.spd*60;
    const a=.2+Math.sin(s.t)*.2;
    const px=((s.fx*W)-(cam.x*(par||.07))+W*60)%W;
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.arc(px,s.fy*H,s.r,0,Math.PI*2);ctx.fill();
  }
}

  ctx.fillStyle='#ff4466';ctx.font=`bold ${Math.min(14,W*.035)}px Arial`;

  ctx.fillStyle='#ffee88';ctx.font=`bold ${Math.min(14,W*.035)}px Arial`;

  ctx.fillStyle='#99aadd';ctx.font=`${Math.min(10,W*.026)}px Arial`;
  ctx.textAlign='right';ctx.fillText(currentLevel.name,W-8,16);
  // Aktiv rang
  ctx.fillStyle=CHEX[activeC];ctx.shadowColor=CHEX[activeC];ctx.shadowBlur=9;
  ctx.font=`bold ${Math.min(10,W*.026)}px Arial`;
  ctx.fillText(`${CNAME[activeC].toUpperCase()} — O'CHIRILGAN`,W-8,38);
  ctx.shadowBlur=0;

  // Progress bar
  const prog=Math.min(1,player.x/Math.max(1,currentLevel.worldW-canvas.width));
  const bx=W*.15,bw=W*.7,by=43,bh=5;
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bx,by,bw,bh);
  const pg=ctx.createLinearGradient(bx,0,bx+bw,0);
  pg.addColorStop(0,CHEX[0]);pg.addColorStop(.5,CHEX[1]);pg.addColorStop(1,CHEX[2]);
  ctx.fillStyle=pg;ctx.shadowColor='#fff';ctx.shadowBlur=5;
  ctx.fillRect(bx,by,bw*prog,bh);
  ctx.shadowBlur=0;
  // Portal ikona
  ctx.font='10px Arial';ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.fillText('🚩',bx+bw*prog-5,by+bh+8);
}

// ─── TUGMALAR CHIZISH ───────────────────────────────────────
function drawBtn(b,lbl,col,active,fs){
  ctx.save();ctx.globalAlpha=active?1:.62;
  ctx.fillStyle=active?col+'bb':'#111133cc';
  ctx.shadowColor=col;ctx.shadowBlur=active?28:10;
  ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,14);ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=active?3:1.8;ctx.stroke();
  ctx.shadowBlur=0;ctx.fillStyle='#fff';
  ctx.font=`bold ${fs||Math.min(b.h*.55,26)}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lbl,b.x+b.w/2,b.y+b.h/2);
  ctx.restore();
}

function drawControls(){
  calcBtns();
  const W=canvas.width,H=canvas.height;
  const barTop=Math.min(btns.R.y,btns.left.y)-14;
  const bg=ctx.createLinearGradient(0,barTop,0,H);
  bg.addColorStop(0,'rgba(0,0,5,0)');bg.addColorStop(.1,'rgba(0,0,15,.88)');bg.addColorStop(1,'rgba(0,0,20,.97)');
  ctx.fillStyle=bg;ctx.fillRect(0,barTop,W,H-barTop);
  ctx.strokeStyle='rgba(100,100,180,.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,barTop+14);ctx.lineTo(W,barTop+14);ctx.stroke();

  drawBtn(btns.left,'◀','#4466cc',touch.left);
  drawBtn(btns.right,'▶','#4466cc',touch.right);
  drawBtn(btns.jump,'▲','#8855cc',false,Math.min(btns.jump.h*.6,30));
  drawBtn(btns.R,'R',CHEX[0],activeC===0,Math.min(btns.R.h*.55,22));
  drawBtn(btns.G,'G',CHEX[1],activeC===1,Math.min(btns.G.h*.55,22));
  drawBtn(btns.B,'B',CHEX[2],activeC===2,Math.min(btns.B.h*.55,22));

  ctx.fillStyle='rgba(180,180,220,.5)';ctx.font=`${Math.min(9.5,W*.024)}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText("RANGNI O'CHIR",W/2,btns.R.y-3);
}

function drawCountDown(){
  const W=canvas.width,H=canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  const n=Math.ceil(countDown);
  const scale=1+(countDown%1)*.6;
  ctx.font=`bold ${Math.min(W*.32,130)*scale}px Arial`;
  ctx.fillStyle=n===3?CHEX[0]:n===2?CHEX[1]:CHEX[2];
  ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=50;
  ctx.globalAlpha=.9+Math.sin(frame*.3)*.1;
  ctx.fillText(n>0?n:'GO!',W/2,H*.42);
  ctx.restore();
}

    {e:'🟢',t:"G tugma → Yashil to'siqlar yo'qoladi",c:'#77ffaa'},
    {e:'🔵',t:"B tugma → Ko'k to'siqlar yo'qoladi",c:'#7799ff'},
    {e:'⭐',t:"Olmoslar yig'ing va portga yeting!",c:'#ffdd88'},
    {e:'👟',t:"Dushmanlarni tepib o'ldiring!",c:'#ffbb88'},
  ];
  const tfs=Math.min(W*.033,13.5);ctx.font=`${tfs}px Arial`;
  const tipTop=H*(bestScore>0?.44:.43);
  tips.forEach((t,i)=>{ctx.fillStyle=t.c;ctx.fillText(`${t.e}  ${t.t}`,W/2,tipTop+i*(tfs*1.9));});
  // O'ynash tugmasi
  const pulse=.65+Math.sin(titleT*3.8)*.35;
  const bW=Math.min(310,W*.8),bH=Math.min(62,H*.078);
  const bX=W/2-bW/2,bY=H*.845;
  ctx.shadowColor='#44ffbb';ctx.shadowBlur=22+pulse*28;
  const bGr=ctx.createLinearGradient(bX,bY,bX,bY+bH);
  bGr.addColorStop(0,`rgba(16,70,48,${.82+pulse*.18})`);
  bGr.addColorStop(1,`rgba(8,40,26,${.82+pulse*.18})`);
  ctx.fillStyle=bGr;ctx.beginPath();ctx.roundRect(bX,bY,bW,bH,17);ctx.fill();
  ctx.strokeStyle=`rgba(60,240,160,${.65+pulse*.35})`;ctx.lineWidth=2.5;ctx.stroke();
  ctx.shadowBlur=0;ctx.globalAlpha=.85+pulse*.15;ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(bH*.48,24)}px Arial`;
  ctx.fillText('▶  O\'YNASHNI BOSHLASH  ◀',W/2,bY+bH/2);
  ctx.globalAlpha=.5;ctx.fillStyle='#aabbcc';
  ctx.font=`${Math.min(W*.03,12)}px Arial`;
  ctx.fillText('Teging yoki istalgan tugmani bosing',W/2,bY+bH+17);
  ctx.restore();
}

// ─── OVERLAY ────────────────────────────────────────────────
function drawOverlay(t1,sub,hint,tc){
  titleT+=.025;
  const W=canvas.width,H=canvas.height;
  ctx.save();ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(W*.1,42)}px Arial`;
  ctx.fillStyle=tc;ctx.shadowColor=tc;ctx.shadowBlur=35;
  ctx.fillText(t1,W/2,H*.3+Math.sin(titleT*3)*6);
  if(sub){
    ctx.shadowBlur=0;ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.min(W*.065,26)}px Arial`;
    ctx.fillText(sub,W/2,H*.45);
    if(bestScore>0){
      ctx.fillStyle='#ffdd88';ctx.font=`${Math.min(W*.035,14)}px Arial`;
      ctx.fillText(`🏆 Rekord: ${bestScore}`,W/2,H*.53);
    }
  }
  const pulse=.6+Math.sin(titleT*3.8)*.4;
  const bW=Math.min(280,W*.72),bH=Math.min(54,H*.07),bX=W/2-bW/2,bY=H*.64;
  ctx.shadowColor='#44ffbb';ctx.shadowBlur=18+pulse*22;
  ctx.fillStyle=`rgba(16,65,45,${.8+pulse*.2})`;
  ctx.beginPath();ctx.roundRect(bX,bY,bW,bH,14);ctx.fill();
  ctx.strokeStyle=`rgba(60,240,150,${.6+pulse*.4})`;ctx.lineWidth=2.5;ctx.stroke();
  ctx.shadowBlur=0;ctx.globalAlpha=.85+pulse*.15;ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(bH*.5,22)}px Arial`;
  ctx.fillText(hint,W/2,bY+bH/2);
  ctx.restore();
}

// ─── YANGILASH ──────────────────────────────────────────────
function update(){
  frame++;
  // Countdown
  if(gameState==='countdown'){
    countTimer++;
    if(countTimer%55===0){
      countDown--;
      if(countDown>0)snd('count');
      else{snd('go');gameState='playing';countDown=0;}
    }
    return;
  }
  if(gameState!=='playing'&&gameState!=='levelComplete'&&gameState!=='win'&&gameState!=='over')return;

  if(gameState==='playing'){
    player.upd();updateCam();
    for(const e of currentLevel.enemies)e.upd();
    for(const s of currentLevel.spikes) s.check();
    for(const g of currentLevel.gems)   g.upd();
    currentLevel.portal.upd();
  }
  parts=parts.filter(p=>{p.upd();return!p.dead();});

  // Nishonlash zarralari
  if((gameState==='win'||gameState==='levelComplete')&&frame%2===0){
    const cols=[CHEX[0],CHEX[1],CHEX[2],'#ffdd00','#fff'];
    parts.push(new Particle(
      Math.random()*canvas.width+cam.x,Math.random()*canvas.height*.65+cam.y,
      cols[Math.random()*cols.length|0],(Math.random()-.5)*7,-Math.random()*7,2,5
    ));
  }

  // Shake kamayishi
  if(shakeAmt>0){shakeAmt*=.78;if(shakeAmt<.3)shakeAmt=0;}
  // Flash kamayishi
  if(flashAmt>0){flashAmt*=.82;if(flashAmt<.01)flashAmt=0;}
}

// ─── TASVIR ─────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(gameState==='title'){drawTitle();return;}

  // Screen shake
  ctx.save();
  if(shakeAmt>0)ctx.translate((Math.random()-.5)*shakeAmt*2,(Math.random()-.5)*shakeAmt*2);

  // Fon
  const bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,currentLevel.bgTop);bg.addColorStop(1,currentLevel.bgBot);
  ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawStars(canvas.width,canvas.height,.08);

  // O'yin elementlari
  for(const p of currentLevel.plats)   p.draw();
  for(const s of currentLevel.spikes)  s.draw();
  for(const g of currentLevel.gems)    g.draw();
  if(currentLevel.hints)for(const h of currentLevel.hints)h.draw();
  currentLevel.portal.draw();
  for(const e of currentLevel.enemies) e.draw();
  player.draw();
  for(const p of parts)p.draw();

  // Rang o'zgartirish flesh
  if(flashAmt>0){
    ctx.globalAlpha=flashAmt*.3;
    ctx.fillStyle=flashCol;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha=1;
  }

  ctx.restore(); // shake restore

  // HUD va tugmalar (shake ta'sir qilmaydi)
  drawHUD();
  drawControls();

  // Countdown overlay
  if(gameState==='countdown')drawCountDown();

  // Boshqa ekranlar
  if(gameState==='levelComplete')drawOverlay('🎉 DARAJA TUGADI!',`Natija: ⭐ ${score}`,'▶ DAVOM ETISH ◀','#ffdd00');
  if(gameState==='over')         drawOverlay('💔 O\'YIN TUGADI',`Natija: ⭐ ${score}`,'▶ QAYTA URINISH ◀','#ff3355');
  if(gameState==='win')          drawOverlay("🏆 G'OLIB! 🏆",`Umumiy natija: ⭐ ${score}`,"▶ QAYTA O'YNASH ◀",'#ffdd00');
}

function loop(){update();render();requestAnimationFrame(loop);}

// ─── ISHGA TUSHIRISH ────────────────────────────────────────
loadLevel(0);gameState='title';calcBtns();
// Musiqa title ekranda boshlanmaydi — faqat o'yinda
window.addEventListener('keydown',()=>{if(gameState!=='title'&&!bgmRunning){initAudio();startBGM();}},{once:false,passive:true});
canvas.addEventListener('touchstart',()=>{if(gameState!=='title'&&!bgmRunning){initAudio();startBGM();}},{passive:true});
loop();
</script>
