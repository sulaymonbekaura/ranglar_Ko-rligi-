const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// --- roundRect polyfill ---
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
    return this;
  };
}

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// =========================================================
//  CONSTANTS
// =========================================================
const GRAVITY   = 0.52;
const JUMP_F    = -12.5;
const SPEED     = 3.8;
const MAX_FALL  = 17;
const PW = 26, PH = 34;

// Colors  0=RED  1=GREEN  2=BLUE  -1=NEUTRAL
const CHEX  = ['#ff3355','#33ff88','#3388ff'];
const CNAME = ["Qizil","Yashil","Ko'k"];
const NEUTRAL_COL = '#8899cc';

// =========================================================
//  AUDIO
// =========================================================
let ac;
function initAudio(){ if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(freq,type,dur,vol){
  if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
  o.start(); o.stop(ac.currentTime+dur+0.01);
}
function snd(t){
  if(!ac) return;
  switch(t){
    case 'jump':   beep(280,'square',0.08,0.08); setTimeout(()=>beep(480,'square',0.07,0.06),55); break;
    case 'land':   beep(120,'square',0.06,0.06); break;
    case 'die':    beep(380,'sawtooth',0.1,0.1); setTimeout(()=>beep(180,'sawtooth',0.2,0.09),110); setTimeout(()=>beep(90,'sawtooth',0.35,0.08),220); break;
    case 'collect':beep(750,'sine',0.08,0.07); setTimeout(()=>beep(1100,'sine',0.1,0.05),75); break;
    case 'stomp':  beep(280,'square',0.05,0.1); setTimeout(()=>beep(90,'sine',0.18,0.08),45); break;
    case 'color':  beep([523,659,784][activeC],'sine',0.12,0.07); break;
    case 'win':    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'square',0.15,0.07),i*115)); break;
    case 'levelup':beep(784,'sine',0.1,0.07); setTimeout(()=>beep(1047,'sine',0.15,0.06),100); break;
  }
}

// =========================================================
//  PARTICLES
// =========================================================
class Particle {
  constructor(x,y,col,vx,vy,life,size){
    this.x=x; this.y=y; this.col=col;
    this.vx = vx!==undefined ? vx : (Math.random()-.5)*8;
    this.vy = vy!==undefined ? vy : (Math.random()-.5)*8-2;
    this.life=life||1; this.maxL=this.life;
    this.size=size||Math.random()*4+1;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.18; this.vx*=0.97; this.life-=0.022; }
  draw(){
    if(this.life<=0)return;
    const a=Math.pow(this.life/this.maxL,.6);
    ctx.save(); ctx.globalAlpha=a*.9;
    ctx.fillStyle=this.col; ctx.shadowColor=this.col; ctx.shadowBlur=7;
    ctx.beginPath(); ctx.arc(this.x-cam.x, this.y-cam.y, this.size*a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  dead(){ return this.life<=0; }
}
let parts=[];
function burst(x,y,col,n,str){
  str=str||1;
  for(let i=0;i<n;i++) parts.push(new Particle(x,y,col,(Math.random()-.5)*9*str,(Math.random()-.5)*9*str-3*str));
}

// =========================================================
//  CAMERA
// =========================================================
const cam={x:0,y:0,tx:0,ty:0};
function updateCam(){
  cam.x+=(cam.tx-cam.x)*.13;
  cam.y+=(cam.ty-cam.y)*.13;
  const lv=currentLevel;
  cam.x=Math.max(0, Math.min(cam.x, lv.worldW-canvas.width));
  cam.y=Math.max(-150, Math.min(cam.y, lv.worldH-canvas.height+200));
}

// =========================================================
//  HELPERS
// =========================================================
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

// =========================================================
//  PLATFORM
// =========================================================
class Platform {
  constructor(x,y,w,h,col){
    this.x=x; this.y=y; this.w=w; this.h=h;
    this.col=col; // -1=neutral, 0=R,1=G,2=B
  }
  solid(){ return this.col===-1 || this.col!==activeC; }
  draw(){
    const sx=this.x-cam.x, sy=this.y-cam.y;
    const erased=this.col!==-1 && this.col===activeC;
    const hex=this.col===-1 ? NEUTRAL_COL : CHEX[this.col];
    ctx.save();
    if(erased) ctx.globalAlpha=0.11;
    ctx.shadowColor=hex; ctx.shadowBlur=erased?0:16;
    const gr=ctx.createLinearGradient(sx,sy,sx,sy+this.h);
    gr.addColorStop(0,hex); gr.addColorStop(1,hex+'88');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h,5); ctx.fill();
    if(!erased){
      ctx.globalAlpha=.38; ctx.fillStyle='rgba(255,255,255,.45)';
      ctx.fillRect(sx+4,sy+2,this.w-8,4);
    }
    ctx.restore();
  }
}

// =========================================================
//  SPIKE
// =========================================================
class Spike {
  constructor(x,y,w,col){
    this.x=x; this.y=y; this.w=w||32; this.h=20;
    this.col=col; // -1 or color
  }
  solid(){ return this.col===-1 || this.col!==activeC; }
  check(){
    if(!this.solid()) return;
    if(player.alive && overlap(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h})) player.kill();
  }
  draw(){
    const sx=this.x-cam.x, sy=this.y-cam.y;
    const hex=this.col===-1?NEUTRAL_COL:CHEX[this.col];
    const erased=this.col!==-1&&this.col===activeC;
    ctx.save();
    if(erased) ctx.globalAlpha=0.1;
    ctx.fillStyle=hex; ctx.shadowColor=hex; ctx.shadowBlur=erased?0:10;
    const n=Math.max(1,Math.floor(this.w/16));
    const sw=this.w/n;
    for(let i=0;i<n;i++){
      ctx.beginPath();
      ctx.moveTo(sx+i*sw,sy+this.h);
      ctx.lineTo(sx+i*sw+sw/2,sy);
      ctx.lineTo(sx+(i+1)*sw,sy+this.h);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

// =========================================================
//  GEM
// =========================================================
class Gem {
  constructor(x,y,col){ this.x=x; this.y=y; this.w=18; this.h=18; this.col=col; this.t=Math.random()*Math.PI*2; this.taken=false; }
  update(){
    this.t+=.04;
    if(!this.taken&&player.alive){
      const fy=this.y-Math.sin(this.t)*6;
      if(overlap(player.rect(),{x:this.x,y:fy,w:this.w,h:this.h})){
        this.taken=true; score+=50;
        burst(this.x+9,this.y+9,this.col===-1?'#ffdd00':CHEX[this.col],8);
        snd('collect');
      }
    }
  }
  draw(){
    if(this.taken)return;
    const sx=this.x-cam.x, sy=this.y-cam.y-Math.sin(this.t)*6;
    const hex=this.col===-1?'#ffdd00':CHEX[this.col];
    ctx.save(); ctx.shadowColor=hex; ctx.shadowBlur=14; ctx.fillStyle=hex;
    ctx.beginPath();
    ctx.moveTo(sx+9,sy); ctx.lineTo(sx+18,sy+9); ctx.lineTo(sx+9,sy+18); ctx.lineTo(sx,sy+9); ctx.closePath();
    ctx.fill();
    ctx.globalAlpha=.5; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.moveTo(sx+9,sy+2); ctx.lineTo(sx+16,sy+9); ctx.lineTo(sx+9,sy+9); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// =========================================================
//  PORTAL (GOAL)
// =========================================================
class Portal {
  constructor(x,y){ this.x=x; this.y=y; this.w=38; this.h=56; this.t=0; this.triggered=false; }
  update(){
    this.t+=.04;
    if(!this.triggered&&player.alive&&overlap(player.rect(),this)){ this.triggered=true; nextLevel(); }
  }
  draw(){
    const sx=this.x-cam.x+19, sy=this.y-cam.y+28;
    ctx.save();
    // Outer glow
    const og=ctx.createRadialGradient(sx,sy,0,sx,sy,50);
    og.addColorStop(0,'rgba(200,80,255,.35)'); og.addColorStop(1,'rgba(200,80,255,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.ellipse(sx,sy,50,55,0,0,Math.PI*2); ctx.fill();
    // Ring
    ctx.strokeStyle='#cc55ff'; ctx.lineWidth=3+Math.sin(this.t); ctx.shadowColor='#cc55ff'; ctx.shadowBlur=25;
    ctx.beginPath(); ctx.ellipse(sx,sy,19+Math.sin(this.t)*3,28+Math.cos(this.t)*4,0,0,Math.PI*2); ctx.stroke();
    // Inner
    const ig=ctx.createRadialGradient(sx,sy,0,sx,sy,18);
    ig.addColorStop(0,'rgba(230,140,255,.8)'); ig.addColorStop(1,'rgba(110,20,200,.3)');
    ctx.fillStyle=ig; ctx.beginPath(); ctx.ellipse(sx,sy,18,27,0,0,Math.PI*2); ctx.fill();
    // Orbits
    for(let i=0;i<3;i++){
      const a=this.t*2+i*Math.PI*2/3;
      ctx.fillStyle='#ff88ff'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(sx+Math.cos(a)*26,sy+Math.sin(a)*32,3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0; ctx.font='18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('⭐',sx,sy);
    ctx.restore();
  }
}

// =========================================================
//  ENEMY
// =========================================================
class Enemy {
  constructor(x,y,pl,pr,col){ this.x=x; this.y=y; this.w=28; this.h=28; this.vx=1.6; this.pl=pl; this.pr=pr; this.col=col; this.alive=true; this.t=0; }
  update(){
    if(!this.alive)return;
    this.t+=.1; this.x+=this.vx;
    if(this.x<=this.pl||this.x+this.w>=this.pr) this.vx*=-1;
    if(!player.alive||player.invincible>0) return;
    if(overlap(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h})){
      if(player.vy>1 && player.y+player.h < this.y+this.h*.55){
        this.alive=false; player.vy=JUMP_F*.65; player.jumps=1;
        score+=100; burst(this.x+14,this.y+14,this.col>=0?CHEX[this.col]:'#ff8833',14); snd('stomp');
      } else { player.kill(); }
    }
  }
  draw(){
    if(!this.alive)return;
    const sx=this.x-cam.x, sy=this.y-cam.y+Math.sin(this.t)*2;
    const ec=this.col>=0?CHEX[this.col]:'#ff8833';
    ctx.save(); ctx.shadowColor=ec; ctx.shadowBlur=14; ctx.fillStyle=ec;
    ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h-Math.abs(Math.sin(this.t))*2,7); ctx.fill();
    // Eyes
    ctx.fillStyle='#111'; ctx.shadowBlur=0;
    [-1,1].forEach(s=>{ ctx.beginPath(); ctx.arc(sx+14+s*7,sy+10,4,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle='#ff0000';
    [-1,1].forEach(s=>{ ctx.beginPath(); ctx.arc(sx+14+s*7,sy+10,2,0,Math.PI*2); ctx.fill(); });
    // Angry brow
    ctx.strokeStyle='#111'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx+5,sy+4); ctx.lineTo(sx+10,sy+7); ctx.moveTo(sx+23,sy+4); ctx.lineTo(sx+18,sy+7); ctx.stroke();
    ctx.restore();
  }
}

// =========================================================
//  PLAYER
// =========================================================
const player={
  x:100,y:100,vx:0,vy:0,w:PW,h:PH,
  grounded:false,alive:true,dying:false,
  invincible:0,jumps:0,maxJumps:2,face:1,

  rect(){ return {x:this.x,y:this.y,w:this.w,h:this.h}; },

  reset(sx,sy){
    this.x=sx; this.y=sy; this.vx=0; this.vy=0;
    this.grounded=false; this.alive=true; this.dying=false;
    this.invincible=0; this.jumps=0;
  },

  update(){
    if(!this.alive)return;
    if(this.invincible>0) this.invincible--;

    // Horizontal
    if(keys.left||touch.left)      { this.vx=-SPEED; this.face=-1; }
    else if(keys.right||touch.right){ this.vx= SPEED; this.face= 1; }
    else this.vx*=.76;

    // Gravity
    this.vy=Math.min(this.vy+GRAVITY, MAX_FALL);

    // Move X → collide
    this.x+=this.vx;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(overlap(this.rect(),p)){
        if(this.vx>0) this.x=p.x-this.w;
        else          this.x=p.x+p.w;
        this.vx=0;
      }
    }

    // Move Y → collide
    const wasG=this.grounded; this.grounded=false;
    this.y+=this.vy;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(overlap(this.rect(),p)){
        if(this.vy>=0){ this.y=p.y-this.h; this.vy=0; this.grounded=true; }
        else           { this.y=p.y+p.h; this.vy=0; }
      }
    }

    if(this.grounded&&!wasG){ this.jumps=0; if(this.vy>3)snd('land'); }

    // Left bound
    this.x=Math.max(0,this.x);

    // Fall into void
    if(this.y>currentLevel.worldH+300) this.kill();

    // Running dust
    if(this.grounded&&(keys.left||touch.left||keys.right||touch.right)&&frame%7===0)
      parts.push(new Particle(this.x+13,this.y+this.h,CHEX[activeC],0,-1,.4,1.5));

    // Camera target
    cam.tx=this.x-canvas.width/2+this.w/2;
    cam.ty=this.y-canvas.height*.44;
  },

  jump(){
    if(this.jumps<this.maxJumps){
      this.vy=JUMP_F; this.jumps++; this.grounded=false;
      snd('jump'); burst(this.x+13,this.y+this.h,CHEX[activeC],8,.7);
    }
  },

  kill(){
    if(this.dying||this.invincible>0)return;
    this.dying=true; this.alive=false;
    burst(this.x+13,this.y+17,'#ff3355',22); burst(this.x+13,this.y+17,'#fff',8);
    snd('die'); lives--;
    setTimeout(()=>{
      if(lives<=0) gameState='over';
      else{ loadLevel(levelIdx); gameState='playing'; }
    },1300);
  },

  draw(){
    if(!this.alive)return;
    if(this.invincible>0&&frame%6<3)return;
    const sx=this.x-cam.x, sy=this.y-cam.y;
    ctx.save();
    // Aura
    ctx.globalAlpha=.22; ctx.fillStyle=CHEX[activeC];
    ctx.beginPath(); ctx.roundRect(sx-5,sy-5,this.w+10,this.h+10,14); ctx.fill(); ctx.globalAlpha=1;
    // Shadow glow
    ctx.shadowColor=CHEX[activeC]; ctx.shadowBlur=22;
    // Body
    const gr=ctx.createLinearGradient(sx,sy,sx,sy+this.h);
    gr.addColorStop(0,'#dde2ff'); gr.addColorStop(1,'#7788cc');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h,8); ctx.fill();
    // Outline
    ctx.strokeStyle=CHEX[activeC]; ctx.lineWidth=2.5; ctx.stroke();
    // Eye
    const ex=sx+(this.face>0?this.w*.65:this.w*.35), ey=sy+this.h*.3;
    ctx.fillStyle='#111'; ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(ex,ey,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=CHEX[activeC]; ctx.beginPath(); ctx.arc(ex+this.face*1.3,ey,2,0,Math.PI*2); ctx.fill();
    // Scarf
    ctx.fillStyle=CHEX[activeC]; ctx.globalAlpha=.8;
    ctx.fillRect(sx+3,sy+this.h*.55,this.w-6,5);
    ctx.restore();
  }
};

// =========================================================
//  GAME STATE
// =========================================================
const levelFactories=[makeLevel1,makeLevel2,makeLevel3];
let levelIdx=0, currentLevel, gameState='title';
let score=0, lives=3, activeC=0, frame=0;
let titleT=0;

function loadLevel(idx){
  currentLevel=levelFactories[idx]();
  activeC=currentLevel.initC;
  player.reset(currentLevel.startX,currentLevel.startY);
  cam.x=0; cam.y=0;
  parts=[];
}

function nextLevel(){
  score+=500;
  snd('levelup');
  burst(player.x+13,player.y+17,'#ffdd00',25); burst(player.x+13,player.y+17,'#fff',12);
  levelIdx++;
  if(levelIdx>=levelFactories.length){ gameState='win'; snd('win'); }
  else gameState='levelComplete';
}

function setColor(c){
  if(activeC===c)return;
  activeC=c; snd('color');
  burst(player.x+13,player.y+17,CHEX[c],14,.8);
}

function startGame()  { score=0;lives=3;levelIdx=0; loadLevel(0); gameState='playing'; }
function restartGame(){ score=0;lives=3;levelIdx=0; loadLevel(0); gameState='playing'; }

// =========================================================
//  INPUT
// =========================================================
const keys={};
const touch={left:false,right:false};

window.addEventListener('keydown',e=>{
  initAudio();
  if(gameState==='title')             { startGame();  return; }
  if(gameState==='over'||gameState==='win'){ restartGame(); return; }
  if(gameState==='levelComplete')     { loadLevel(levelIdx); gameState='playing'; return; }
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if(['ArrowUp','w','W',' '].includes(e.key)){ e.preventDefault(); player.jump(); }
  if(e.key==='1') setColor(0);
  if(e.key==='2') setColor(1);
  if(e.key==='3') setColor(2);
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});

// =========================================================
//  VIRTUAL BUTTONS
// =========================================================
const btns={};
function updateBtns(){
  const W=canvas.width, H=canvas.height;
  const bs=Math.min(68,W*.17);
  const p=8, by=H-bs-p;
  btns.left ={x:p,       y:by,w:bs,h:bs};
  btns.right={x:p*2+bs,  y:by,w:bs,h:bs};
  btns.jump ={x:W-bs-p,  y:by,w:bs,h:bs};
  const cw=Math.min(60,W*.145), ch=cw*.58;
  const tot=cw*3+p*2, csx=(W-tot)/2, cy=H-ch-p;
  btns.R={x:csx,         y:cy,w:cw,h:ch};
  btns.G={x:csx+cw+p,    y:cy,w:cw,h:ch};
  btns.B={x:csx+cw*2+p*2,y:cy,w:cw,h:ch};
}
function inBtn(b,tx,ty){ return tx>=b.x&&tx<=b.x+b.w&&ty>=b.y&&ty<=b.y+b.h; }
function getTxy(t){
  const r=canvas.getBoundingClientRect();
  return {x:(t.clientX-r.left)*canvas.width/r.width, y:(t.clientY-r.top)*canvas.height/r.height};
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); initAudio();
  if(gameState==='title')             { startGame();  return; }
  if(gameState==='over'||gameState==='win'){ restartGame(); return; }
  if(gameState==='levelComplete')     { loadLevel(levelIdx); gameState='playing'; return; }
  for(const t of e.changedTouches){
    const {x,y}=getTxy(t);
    if(inBtn(btns.left,x,y))  touch.left=true;
    if(inBtn(btns.right,x,y)) touch.right=true;
    if(inBtn(btns.jump,x,y))  player.jump();
    if(inBtn(btns.R,x,y)) setColor(0);
    if(inBtn(btns.G,x,y)) setColor(1);
    if(inBtn(btns.B,x,y)) setColor(2);
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  touch.left=false; touch.right=false;
  for(const t of e.touches){
    const {x,y}=getTxy(t);
    if(inBtn(btns.left,x,y))  touch.left=true;
    if(inBtn(btns.right,x,y)) touch.right=true;
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  touch.left=false; touch.right=false;
  for(const t of e.touches){
    const {x,y}=getTxy(t);
    if(inBtn(btns.left,x,y))  touch.left=true;
    if(inBtn(btns.right,x,y)) touch.right=true;
  }
},{passive:false});

// =========================================================
//  STARS
// =========================================================
const STARS=Array.from({length:140},()=>({
  fx:Math.random(),fy:Math.random(),
  r:Math.random()*1.5+.3,
  speed:Math.random()*.0003+.0001,
  t:Math.random()*Math.PI*2
}));
function drawStars(){
  for(const s of STARS){
    s.t+=s.speed*60;
    const a=.25+Math.sin(s.t)*.22;
    const px=((s.fx*canvas.width)-(cam.x*.08)+canvas.width*50)%canvas.width;
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(px,s.fy*canvas.height,s.r,0,Math.PI*2); ctx.fill();
  }
}

// =========================================================
//  RENDER HELPERS
// =========================================================
function drawBg(){
  const bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,currentLevel.bgTop); bg.addColorStop(1,currentLevel.bgBot);
  ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawStars();
}

function drawHUD(){
  const W=canvas.width;
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,48);
  ctx.textBaseline='middle';
  // Lives
  ctx.fillStyle='#ff4466'; ctx.font=`bold ${Math.min(15,W*.038)}px Arial`;
  ctx.textAlign='left'; ctx.fillText('❤️'.repeat(Math.max(0,lives)),10,24);
  // Score
  ctx.fillStyle='#ffee88'; ctx.font=`bold ${Math.min(14,W*.036)}px Arial`;
  ctx.textAlign='center'; ctx.fillText(`⭐ ${score}`,W/2,24);
  // Level
  ctx.fillStyle='#99aadd'; ctx.font=`${Math.min(10,W*.027)}px Arial`;
  ctx.textAlign='right'; ctx.fillText(currentLevel.name,W-8,16);
  // Active color label
  ctx.fillStyle=CHEX[activeC]; ctx.shadowColor=CHEX[activeC]; ctx.shadowBlur=9;
  ctx.font=`bold ${Math.min(10,W*.027)}px Arial`;
  ctx.fillText(`${CNAME[activeC].toUpperCase()} — O'CHIRILGAN`,W-8,36);
  ctx.shadowBlur=0;
}

function drawBtnUI(){
  updateBtns();
  function db(b,lbl,col,active){
    ctx.save(); ctx.globalAlpha=active?1:.62;
    ctx.fillStyle=active?col+'aa':'#111133aa';
    ctx.shadowColor=col; ctx.shadowBlur=active?24:8;
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,13); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=active?3:1.5; ctx.stroke();
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.min(b.h*.55,26)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lbl,b.x+b.w/2,b.y+b.h/2);
    ctx.restore();
  }
  db(btns.left, '◄','#4466bb',touch.left);
  db(btns.right,'►','#4466bb',touch.right);
  db(btns.jump, '▲','#8855cc',false);
  db(btns.R,    'R', CHEX[0], activeC===0);
  db(btns.G,    'G', CHEX[1], activeC===1);
  db(btns.B,    'B', CHEX[2], activeC===2);
}

// =========================================================
//  TITLE SCREEN
// =========================================================
function drawTitle(){
  titleT+=.02;
  const W=canvas.width, H=canvas.height;
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#03031a'); bg.addColorStop(1,'#0c041e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  for(const s of STARS){
    s.t+=s.speed*60;
    const a=.2+Math.sin(s.t)*.2;
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(s.fx*W,s.fy*H,s.r,0,Math.PI*2); ctx.fill();
  }
  // Floating orbs
  [[CHEX[0],.18,.48],[CHEX[1],.5,.32],[CHEX[2],.82,.48]].forEach(([c,fx,fy],i)=>{
    const ox=W*fx+Math.cos(titleT+i*2.1)*28, oy=H*fy+Math.sin(titleT*1.3+i)*20;
    const rg=ctx.createRadialGradient(ox,oy,0,ox,oy,75);
    rg.addColorStop(0,c+'55'); rg.addColorStop(1,c+'00');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(ox,oy,75,0,Math.PI*2); ctx.fill();
  });

  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  const fs=Math.min(W*.088,38);
  ctx.font=`bold ${fs}px Arial`;
  const title="RANGLAR KO'RLIGI";
  const tw=ctx.measureText(title).width;
  const sx=W/2-tw/2;
  const rcols=[CHEX[0],'#ff9933','#ffee00',CHEX[1],CHEX[2],'#aa44ff'];
  let cx2=0;
  for(let i=0;i<title.length;i++){
    const ci=(i+Math.floor(titleT*2))%rcols.length;
    ctx.fillStyle=rcols[ci]; ctx.shadowColor=rcols[ci]; ctx.shadowBlur=16;
    const cw=ctx.measureText(title[i]).width;
    ctx.fillText(title[i], sx+cx2+cw/2, H*.27+Math.sin(titleT*2.5+i*.4)*7);
    cx2+=cw;
  }

  ctx.shadowBlur=6; ctx.shadowColor='#88aaff'; ctx.fillStyle='#aabbff';
  ctx.font=`${Math.min(W*.04,16)}px Arial`;
  ctx.fillText('Color Shift Adventure  🎮',W/2,H*.37);

  ctx.shadowBlur=0;
  const iy=H*.48;
  const tips=[
    {e:'🔴',t:"Qizil tugma → Qizil to'siqlar g'oyib bo'ladi",c:'#ff7788'},
    {e:'🟢',t:"Yashil tugma → Yashil to'siqlar g'oyib bo'ladi",c:'#77ffaa'},
    {e:'🔵',t:"Ko'k tugma → Ko'k to'siqlar g'oyib bo'ladi",c:'#7799ff'},
    {e:'⭐',t:"Olmoslarni yig'ing va portga yeting!",c:'#ffdd88'},
    {e:'👊',t:"Dushmanlarni tepib o'ldiring!",c:'#ffbb88'},
  ];
  const tfs=Math.min(W*.034,13.5);
  ctx.font=`${tfs}px Arial`;
  tips.forEach((tip,i)=>{ ctx.fillStyle=tip.c; ctx.fillText(`${tip.e} ${tip.t}`,W/2,iy+i*(tfs*1.85)); });

  const pulse=.55+Math.sin(titleT*3)*.45;
  ctx.globalAlpha=pulse; ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(W*.05,20)}px Arial`;
  ctx.fillText('👆  BOSING YOKI TEGING',W/2,H*.88);
  ctx.restore();
}

// =========================================================
//  OVERLAY SCREENS
// =========================================================
function drawOverlay(title2,sub,hint,tc){
  titleT+=.025;
  const W=canvas.width, H=canvas.height;
  ctx.save(); ctx.fillStyle='rgba(0,0,0,.8)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(W*.11,44)}px Arial`;
  ctx.fillStyle=tc; ctx.shadowColor=tc; ctx.shadowBlur=35;
  ctx.fillText(title2,W/2,H*.33+Math.sin(titleT*3)*6);
  if(sub){
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.min(W*.07,28)}px Arial`;
    ctx.fillText(sub,W/2,H*.5);
  }
  const pulse=.55+Math.sin(titleT*3.5)*.45;
  ctx.globalAlpha=pulse; ctx.fillStyle='#ccffdd';
  ctx.font=`bold ${Math.min(W*.047,19)}px Arial`;
  ctx.fillText(hint,W/2,H*.67);
  ctx.restore();
}

// =========================================================
//  UPDATE / RENDER
// =========================================================
function update(){
  frame++;
  player.update(); updateCam();
  for(const e of currentLevel.enemies) e.update();
  for(const s of currentLevel.spikes)  s.check();
  for(const g of currentLevel.gems)    g.update();
  currentLevel.portal.update();
  parts=parts.filter(p=>{ p.update(); return !p.dead(); });

  // Celebration particles
  if((gameState==='win'||gameState==='levelComplete')&&frame%2===0){
    const cols=[CHEX[0],CHEX[1],CHEX[2],'#ffdd00','#fff'];
    parts.push(new Particle(
      Math.random()*canvas.width+cam.x,
      Math.random()*canvas.height*.65+cam.y,
      cols[Math.random()*cols.length|0],
      (Math.random()-.5)*6,-Math.random()*7,2,5
    ));
  }
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(gameState==='title'){ drawTitle(); return; }
  drawBg();
  for(const p of currentLevel.plats)   p.draw();
  for(const s of currentLevel.spikes)  s.draw();
  for(const g of currentLevel.gems)    g.draw();
  currentLevel.portal.draw();
  for(const e of currentLevel.enemies) e.draw();
  player.draw();
  for(const p of parts) p.draw();
  drawHUD();
  drawBtnUI();
  if(gameState==='levelComplete') drawOverlay('🎉 DARAJA TUGADI!',`Natija: ⭐ ${score}`,'Davom etish uchun bosing','#ffdd00');
  if(gameState==='over')          drawOverlay("O'YIN TUGADI",`Natija: ⭐ ${score}`,'Qayta urinish uchun bosing','#ff3355');
  if(gameState==='win')           drawOverlay("🏆 G'OLIB! 🏆",`Umumiy natija: ⭐ ${score}`,"Qayta o'ynash uchun bosing",'#ffdd00');
}

function loop(){
  if(gameState==='playing'||gameState==='levelComplete'||gameState==='over'||gameState==='win') update();
  render();
  requestAnimationFrame(loop);
}

// =========================================================
//  INIT
// =========================================================
loadLevel(0);
gameState='title';
updateBtns();
loop();
</script>
