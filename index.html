<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ranglar Ko'rligi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#020210;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style>

<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  RANGLAR KO'RLIGI  v5  —  Premium Final
// ═══════════════════════════════════════════════════════
const cv=document.getElementById('c'), cx=cv.getContext('2d');
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r||0,w/2,h/2);this.beginPath();
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();return this;
  };
}
const W=()=>cv.width, H=()=>cv.height;
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;layoutUI();}
resize();window.addEventListener('resize',resize);

// ─── KONSTANTLAR ────────────────────────────────────
const GRAV=0.47,JMP=-13.2,SPD=3.6,MAXV=16,PW=26,PH=34;
const CHX=['#ff3355','#33ff88','#3388ff'];
const CNM=["Qizil","Yashil","Ko'k"];
const NEU='#6677aa';

// ─── O'YIN HOLATI ───────────────────────────────────
// menu | levelSelect | countdown | playing | paused | levelComplete | over | win
let gs='menu';
let lvIdx=0,score=0,lives=5,aC=0,fr=0;
let cdN=3,cdT=0,menuT=0;
let shk=0,flA=0,flC='#fff';
let maxX=0; // progress bar — faqat oldinga!

// Saqlash
let bestS =+localStorage.getItem('rk_best')||0;
let unlkd =+localStorage.getItem('rk_unl')||0;  // 0=faqat 1-daraja ochiq
let musOn =localStorage.getItem('rk_mus')!=='0';
function save(){
  localStorage.setItem('rk_best',bestS);
  localStorage.setItem('rk_unl',unlkd);
  localStorage.setItem('rk_mus',musOn?'1':'0');
}

// ─── AUDIO ──────────────────────────────────────────
let ac,bgGain,bgRun=false,bgTmr=null;
function initAC(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  bgGain=ac.createGain();bgGain.gain.value=musOn?.05:0;bgGain.connect(ac.destination);
}
function beep(f,t,d,v,dl){
  if(!ac)return;const w=ac.currentTime+(dl||0);
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,w);
  g.gain.exponentialRampToValueAtTime(.0001,w+d);o.start(w);o.stop(w+d+.02);
}
function sfx(t){
  if(!ac)return;
  if(t==='jump')  {beep(260,'square',.08,.08);beep(420,'square',.07,.06,.06);}
  if(t==='land')   beep(110,'square',.05,.06);
  if(t==='die')   {beep(360,'sawtooth',.1,.09);beep(180,'sawtooth',.25,.08,.12);}
  if(t==='gem')   {beep(700,'sine',.08,.07);beep(1050,'sine',.1,.05,.08);}
  if(t==='stomp') {beep(270,'square',.05,.1);beep(85,'sine',.18,.08,.05);}
  if(t==='col')    beep([500,640,780][aC],'sine',.12,.07);
  if(t==='win')    [523,659,784,1047].forEach((f,i)=>beep(f,'square',.14,.07,i*.12));
  if(t==='cd')     beep(660,'sine',.15,.1);
  if(t==='go')    {beep(880,'square',.06,.1);beep(1100,'square',.1,.08,.08);}
  if(t==='tap')    beep(800,'sine',.06,.05);
}
// BGM
const BN=[[392,196],[330,196],[392,196],[440,196],[392,175],[330,175],[262,175],[294,175],
          [330,196],[294,196],[330,196],[392,196],[330,175],[262,175],[196,175],[196,175],
          [392,196],[523,196],[440,196],[392,196],[330,175],[392,175],[440,175],[523,175],
          [440,196],[392,196],[330,196],[294,196],[262,131],[262,131],[294,131],[330,131]];
function bgNote(f,d,w,tp,v){
  if(!ac||!bgGain)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(bgGain);o.type=tp||'square';o.frequency.value=f;
  g.gain.setValueAtTime(v||.4,w);g.gain.setValueAtTime(v||.4,w+d*.75);
  g.gain.exponentialRampToValueAtTime(.0001,w+d*.95);o.start(w);o.stop(w+d+.02);
}
function startBG(){
  if(!ac||bgRun)return;bgRun=true;
  if(bgGain)bgGain.gain.setTargetAtTime(musOn?.05:0,ac.currentTime,.3);
  const S=0.178,tot=BN.length*S;
  function sch(){
    if(!bgRun)return;let t=ac.currentTime+.05;
    for(const[m,b]of BN){bgNote(m,S*.82,t,'square',.38);bgNote(b,S*.9,t,'triangle',.26);t+=S;}
    bgTmr=setTimeout(sch,(tot-.2)*1000);
  }sch();
}
function stopBG(){bgRun=false;if(bgTmr){clearTimeout(bgTmr);bgTmr=null;}}
function togMus(){musOn=!musOn;if(bgGain&&ac)bgGain.gain.setTargetAtTime(musOn?.05:0,ac.currentTime,.3);save();}

// ─── ZARRALAR ───────────────────────────────────────
class P2{
  constructor(x,y,col,vx,vy,life,sz){
    this.x=x;this.y=y;this.c=col;
    this.vx=vx!=null?vx:(Math.random()-.5)*9;
    this.vy=vy!=null?vy:(Math.random()-.5)*9-2;
    this.l=life||1;this.ml=this.l;this.sz=sz||Math.random()*4+1;
  }
  upd(){this.x+=this.vx;this.y+=this.vy;this.vy+=.2;this.vx*=.97;this.l-=.022;}
  draw(){
    if(this.l<=0)return;const a=Math.pow(this.l/this.ml,.6);
    cx.save();cx.globalAlpha=a*.9;cx.fillStyle=this.c;cx.shadowColor=this.c;cx.shadowBlur=7;
    cx.beginPath();cx.arc(this.x-cam.x,this.y-cam.y,this.sz*a,0,Math.PI*2);cx.fill();cx.restore();
  }
  dead(){return this.l<=0;}
}
let pts=[];
function burst(x,y,c,n,s){s=s||1;for(let i=0;i<n;i++)pts.push(new P2(x,y,c,(Math.random()-.5)*9*s,(Math.random()-.5)*9*s-3*s));}

// ─── KAMERA ─────────────────────────────────────────
const cam={x:0,y:0,tx:0,ty:0};
function updCam(){
  cam.x+=(cam.tx-cam.x)*.13;cam.y+=(cam.ty-cam.y)*.13;
  if(!lv)return;
  cam.x=Math.max(0,Math.min(cam.x,lv.wW-W()));
  cam.y=Math.max(-180,Math.min(cam.y,lv.wH-H()+200));
}
function addShk(v){shk=Math.max(shk,v);}
function addFl(c,v){flC=c;flA=Math.max(flA,v);}
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ─── UI LAYOUT (markaziy, bir joyda hisoblash) ──────
const UI={};
function layoutUI(){
  const w=W(),h=H(),p=12;

  // === MENYU ===
  const pw=Math.min(300,w*.82),ph2=Math.min(58,h*.074);
  const px=(w-pw)/2;
  UI.play  ={x:px,      y:h*.72,      w:pw,       h:ph2};
  UI.levs  ={x:px,      y:h*.72+ph2+10,w:pw,      h:Math.min(46,h*.057)};
  UI.mmus  ={x:w-54,    y:h-52,       w:42,       h:42};

  // === DARAJA TANLASH ===
  const cw=Math.min(w*.9,380),ch=Math.min(h*.195,145);
  const cx2=(w-cw)/2;
  UI.back  ={x:10,      y:10,         w:90,       h:36};
  UI.cards =[0,1,2].map(i=>({x:cx2, y:h*.24+i*(ch+12), w:cw, h:ch, idx:i}));

  // === PAUZA ===
  const bw=Math.min(260,w*.72),bh=50,bx=(w-bw)/2,by0=h*.38;
  UI.pr={x:bx,y:by0,      w:bw,h:bh};// Resume
  UI.prs={x:bx,y:by0+62,  w:bw,h:bh};// Restart
  UI.pm={x:bx,y:by0+124,  w:bw,h:bh};// Music
  UI.pmn={x:bx,y:by0+186, w:bw,h:bh};// Menu

  // === HUD ===
  UI.pBtn={x:w-52,y:6,w:42,h:38};

  // === KONTROLLER ===
  const mvW=Math.min(72,w*.178),mvH=Math.min(72,h*.1);
  const r2y=h-mvH-p;
  UI.lft={x:p,          y:r2y,w:mvW,h:mvH};
  UI.rgt={x:p*2+mvW,    y:r2y,w:mvW,h:mvH};
  const jW=Math.min(78,w*.2),jH=Math.min(78,h*.108);
  UI.jmp={x:w-jW-p,     y:h-jH-p,w:jW,h:jH};
  const cBw=Math.min(66,w*.162),cBh=Math.min(52,h*.072);
  const ctot=cBw*3+p*2,csx=(w-ctot)/2,cy=r2y-cBh-8;
  UI.cr={x:csx,          y:cy,w:cBw,h:cBh};
  UI.cg={x:csx+cBw+p,    y:cy,w:cBw,h:cBh};
  UI.cb={x:csx+cBw*2+p*2,y:cy,w:cBw,h:cBh};
}

function hit(b,tx,ty,m){m=m!=null?m:18;return tx>=b.x-m&&tx<=b.x+b.w+m&&ty>=b.y-m&&ty<=b.y+b.h+m;}

// ─── O'YIN NARSALARI ────────────────────────────────
class Platf{
  constructor(x,y,w,h,c){this.x=x;this.y=y;this.w=w;this.h=h;this.c=c;}
  solid(){return this.c===-1||this.c!==aC;}
  draw(){
    const sx=this.x-cam.x,sy=this.y-cam.y;
    const er=this.c!==-1&&this.c===aC,hex=this.c===-1?NEU:CHX[this.c];
    cx.save();if(er)cx.globalAlpha=.1;
    cx.shadowColor=hex;cx.shadowBlur=er?0:18;
    const g=cx.createLinearGradient(sx,sy,sx,sy+this.h);
    g.addColorStop(0,hex);g.addColorStop(1,hex+'66');
    cx.fillStyle=g;cx.beginPath();cx.roundRect(sx,sy,this.w,this.h,5);cx.fill();
    if(!er){cx.globalAlpha=.35;cx.fillStyle='rgba(255,255,255,.4)';cx.fillRect(sx+4,sy+2,this.w-8,4);}
    cx.restore();
  }
}
class Spk{
  constructor(x,y,w,c){this.x=x;this.y=y;this.w=w||28;this.h=20;this.c=c;}
  solid(){return this.c===-1||this.c!==aC;}
  chk(){if(!this.solid())return;if(pl.alive&&ov(pl.rect(),{x:this.x,y:this.y,w:this.w,h:this.h}))pl.kill();}
  draw(){
    const sx=this.x-cam.x,sy=this.y-cam.y,hex=this.c===-1?NEU:CHX[this.c];
    const er=this.c!==-1&&this.c===aC;
    cx.save();if(er)cx.globalAlpha=.1;cx.fillStyle=hex;cx.shadowColor=hex;cx.shadowBlur=er?0:10;
    const n=Math.max(1,Math.floor(this.w/16)),sw=this.w/n;
    for(let i=0;i<n;i++){cx.beginPath();cx.moveTo(sx+i*sw,sy+this.h);cx.lineTo(sx+i*sw+sw/2,sy);cx.lineTo(sx+(i+1)*sw,sy+this.h);cx.closePath();cx.fill();}
    cx.restore();
  }
}
class Gem{
  constructor(x,y,c){this.x=x;this.y=y;this.w=20;this.h=20;this.c=c;this.t=Math.random()*Math.PI*2;this.done=false;}
  upd(){
    this.t+=.04;
    if(!this.done&&pl.alive){
      const fy=this.y-Math.sin(this.t)*7;
      if(ov(pl.rect(),{x:this.x,y:fy,w:this.w,h:this.h})){this.done=true;score+=50;burst(this.x+10,this.y+10,this.c<0?'#ffdd00':CHX[this.c],8);sfx('gem');}
    }
  }
  draw(){
    if(this.done)return;
    const sx=this.x-cam.x,sy=this.y-cam.y-Math.sin(this.t)*7;
    const hex=this.c<0?'#ffdd00':CHX[this.c];
    cx.save();cx.shadowColor=hex;cx.shadowBlur=16;cx.fillStyle=hex;
    cx.beginPath();cx.moveTo(sx+10,sy);cx.lineTo(sx+20,sy+10);cx.lineTo(sx+10,sy+20);cx.lineTo(sx,sy+10);cx.closePath();cx.fill();
    cx.globalAlpha=.5;cx.fillStyle='#fff';cx.beginPath();cx.moveTo(sx+10,sy+2);cx.lineTo(sx+18,sy+10);cx.lineTo(sx+10,sy+10);cx.closePath();cx.fill();
    cx.restore();
  }
}
class Portal{
  constructor(x,y){this.x=x;this.y=y;this.w=42;this.h=60;this.t=0;this.done=false;}
  upd(){this.t+=.04;if(!this.done&&pl.alive&&ov(pl.rect(),this)){this.done=true;nextLv();}}
  draw(){
    const sx=this.x-cam.x+21,sy=this.y-cam.y+30;
    cx.save();
    const og=cx.createRadialGradient(sx,sy,0,sx,sy,55);
    og.addColorStop(0,'rgba(200,80,255,.35)');og.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=og;cx.beginPath();cx.ellipse(sx,sy,55,60,0,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#cc55ff';cx.lineWidth=3+Math.sin(this.t);cx.shadowColor='#cc55ff';cx.shadowBlur=28;
    cx.beginPath();cx.ellipse(sx,sy,20+Math.sin(this.t)*3,29+Math.cos(this.t)*4,0,0,Math.PI*2);cx.stroke();
    const ig=cx.createRadialGradient(sx,sy,0,sx,sy,19);
    ig.addColorStop(0,'rgba(230,140,255,.85)');ig.addColorStop(1,'rgba(100,20,200,.3)');
    cx.fillStyle=ig;cx.beginPath();cx.ellipse(sx,sy,19,28,0,0,Math.PI*2);cx.fill();
    for(let i=0;i<3;i++){const a=this.t*2+i*Math.PI*2/3;cx.fillStyle='#ff88ff';cx.shadowBlur=9;cx.beginPath();cx.arc(sx+Math.cos(a)*29,sy+Math.sin(a)*35,4,0,Math.PI*2);cx.fill();}
    cx.shadowBlur=0;cx.font='bold 18px Arial';cx.textAlign='center';cx.textBaseline='middle';cx.fillStyle='#fff';cx.fillText('⭐',sx,sy);
    cx.restore();
  }
}
class Enm{
  constructor(x,y,l,r,c){this.x=x;this.y=y;this.w=30;this.h=30;this.vx=.9;this.l=l;this.r=r;this.c=c;this.alive=true;this.t=0;}
  upd(){
    if(!this.alive)return;this.t+=.1;this.x+=this.vx;
    if(this.x<=this.l||this.x+this.w>=this.r)this.vx*=-1;
    if(!pl.alive||pl.inv>0)return;
    if(ov(pl.rect(),{x:this.x,y:this.y,w:this.w,h:this.h})){
      if(pl.vy>1&&pl.y+pl.h<this.y+this.h*.55){
        this.alive=false;pl.vy=JMP*.65;score+=100;addShk(8);
        burst(this.x+15,this.y+15,this.c>=0?CHX[this.c]:'#ff8833',14);sfx('stomp');
      }else pl.kill();
    }
  }
  draw(){
    if(!this.alive)return;
    const sx=this.x-cam.x,sy=this.y-cam.y+Math.sin(this.t)*2.5;
    const ec=this.c>=0?CHX[this.c]:'#ff8833';
    cx.save();cx.shadowColor=ec;cx.shadowBlur=14;cx.fillStyle=ec;
    cx.beginPath();cx.roundRect(sx,sy,this.w,this.h-Math.abs(Math.sin(this.t))*2,7);cx.fill();
    cx.fillStyle='#111';cx.shadowBlur=0;
    [-1,1].forEach(s=>{cx.beginPath();cx.arc(sx+15+s*8,sy+11,4,0,Math.PI*2);cx.fill();});
    cx.fillStyle='#f00';[-1,1].forEach(s=>{cx.beginPath();cx.arc(sx+15+s*8,sy+11,2,0,Math.PI*2);cx.fill();});
    cx.strokeStyle='#111';cx.lineWidth=2;cx.beginPath();cx.moveTo(sx+5,sy+5);cx.lineTo(sx+11,sy+8);cx.moveTo(sx+25,sy+5);cx.lineTo(sx+19,sy+8);cx.stroke();
    cx.restore();
  }
}

// ─── PLAYER ─────────────────────────────────────────
const pl={
  x:100,y:100,vx:0,vy:0,w:PW,h:PH,
  grounded:false,alive:true,dying:false,inv:0,jumped:false,face:1,
  sx:1,sy:1,tsx:1,tsy:1,
  rect(){return{x:this.x,y:this.y,w:this.w,h:this.h};},
  reset(rx,ry){this.x=rx;this.y=ry;this.vx=0;this.vy=0;this.grounded=false;this.alive=true;this.dying=false;this.inv=100;this.jumped=false;this.sx=1;this.sy=1;this.tsx=1;this.tsy=1;},
  upd(){
    if(!this.alive)return;
    if(this.inv>0)this.inv--;
    this.sx+=(this.tsx-this.sx)*.28;this.sy+=(this.tsy-this.sy)*.28;
    this.tsx+=(1-this.tsx)*.18;this.tsy+=(1-this.tsy)*.18;
    if(tk.L||tk.left){this.vx=-SPD;this.face=-1;}
    else if(tk.R||tk.right){this.vx=SPD;this.face=1;}
    else this.vx*=.76;
    this.vy=Math.min(this.vy+GRAV,MAXV);
    this.x+=this.vx;
    for(const p of lv.plats){if(!p.solid())continue;if(ov(this.rect(),p)){if(this.vx>0)this.x=p.x-this.w;else this.x=p.x+p.w;this.vx=0;}}
    const wasG=this.grounded;this.grounded=false;
    this.y+=this.vy;
    for(const p of lv.plats){
      if(!p.solid())continue;
      if(ov(this.rect(),p)){
        if(this.vy>=0){this.y=p.y-this.h;if(this.vy>4){addShk(5);this.tsx=1.5;this.tsy=0.55;sfx('land');}this.vy=0;this.grounded=true;}
        else{this.y=p.y+p.h;this.vy=0;}
      }
    }
    if(this.grounded&&!wasG)this.jumped=false;
    this.x=Math.max(0,this.x);
    if(this.x>maxX)maxX=this.x;  // progress bar: faqat oldinga!
    if(this.y>lv.wH+400)this.kill();
    if(this.grounded&&(tk.L||tk.left||tk.R||tk.right)&&fr%8===0)
      pts.push(new P2(this.x+13,this.y+this.h,CHX[aC],0,-1,.4,1.5));
    cam.tx=this.x-W()/2+this.w/2;cam.ty=this.y-H()*.44;
  },
  jump(){
    if(this.jumped||!this.grounded)return;
    this.vy=JMP;this.jumped=true;this.grounded=false;
    this.tsx=.7;this.tsy=1.45;sfx('jump');burst(this.x+13,this.y+this.h,CHX[aC],9,.7);
  },
  kill(){
    if(this.dying||this.inv>0)return;
    this.dying=true;this.alive=false;addShk(18);addFl('#ff1144',.55);
    burst(this.x+13,this.y+17,'#ff3355',25);burst(this.x+13,this.y+17,'#fff',10);
    sfx('die');lives--;
    setTimeout(()=>{if(lives<=0)gs='over';else{loadLv(lvIdx);gs='playing';}},1400);
  },
  draw(){
    if(!this.alive)return;if(this.inv>0&&fr%6<3)return;
    const dw=this.w*this.sx,dh=this.h*this.sy;
    const sx=this.x-cam.x+this.w/2-dw/2,sy=this.y-cam.y+this.h-dh;
    cx.save();
    cx.globalAlpha=.22;cx.fillStyle=CHX[aC];cx.beginPath();cx.roundRect(sx-6,sy-6,dw+12,dh+12,15);cx.fill();cx.globalAlpha=1;
    cx.shadowColor=CHX[aC];cx.shadowBlur=24;
    const g=cx.createLinearGradient(sx,sy,sx,sy+dh);g.addColorStop(0,'#dde2ff');g.addColorStop(1,'#7788cc');
    cx.fillStyle=g;cx.beginPath();cx.roundRect(sx,sy,dw,dh,8);cx.fill();
    cx.strokeStyle=CHX[aC];cx.lineWidth=2.5;cx.stroke();
    const ex=sx+(this.face>0?dw*.65:dw*.35),ey=sy+dh*.3;
    cx.fillStyle='#111';cx.shadowBlur=0;cx.beginPath();cx.arc(ex,ey,4,0,Math.PI*2);cx.fill();
    cx.fillStyle=CHX[aC];cx.beginPath();cx.arc(ex+this.face*1.3,ey,2,0,Math.PI*2);cx.fill();
    cx.fillStyle=CHX[aC];cx.globalAlpha=.8;cx.fillRect(sx+3,sy+dh*.55,dw-6,4);
    cx.restore();
  }
};

// ─── DARAJALAR ──────────────────────────────────────
const MK=(x,y,w,h,c)=>new Platf(x,y,w,h,c);
const MS=(x,y,w,c)=>new Spk(x,y,w,c);
const ME=(x,y,l,r,c)=>new Enm(x,y,l,r,c);
const MG=(x,y,c)=>new Gem(x,y,c);

function mkL1(){

function loadLv(i){

}
function startLv(i){
  lvIdx=i;loadLv(i);gs='countdown';cdN=3;cdT=0;
  if(ac&&!bgRun)startBG();
}
function startGame(){score=0;lives=5;startLv(0);}
function restartLv(){lives=5;loadLv(lvIdx);gs='countdown';cdN=3;cdT=0;}
function nextLv(){
  score+=500;sfx('win');burst(pl.x+13,pl.y+17,'#ffdd00',30);addFl('#ffdd00',.5);
  lvIdx++;if(lvIdx>unlkd){unlkd=lvIdx;save();}
  if(lvIdx>=LVS.length){if(score>bestS){bestS=score;save();}gs='win';}
  else gs='levelComplete';
}
function setCol(c){
  if(aC===c)return;aC=c;sfx('col');addFl(CHX[c],.35);burst(pl.x+13,pl.y+17,CHX[c],14,.75);
}

// ─── TOUCH / INPUT ──────────────────────────────────
const tk={left:false,right:false,L:false,R:false};

function getTXY(t){
  const r=cv.getBoundingClientRect();
  return{x:(t.clientX-r.left)*cv.width/r.width, y:(t.clientY-r.top)*cv.height/r.height};
}

// Bitta bosh touch handler — holat bo'yicha
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!ac){initAC();startBG();}
  const t=e.changedTouches[0];
  const{x,y}=getTXY(t);

  if(gs==='menu'){
    if(hit(UI.play,x,y)){sfx('tap');startGame();return;}
    if(hit(UI.levs,x,y)){sfx('tap');gs='levelSelect';return;}
    if(hit(UI.mmus,x,y)){sfx('tap');togMus();return;}
    return;
  }
  if(gs==='levelSelect'){
    if(hit(UI.back,x,y)){sfx('tap');gs='menu';return;}
    for(const c of UI.cards){
      if(hit(c,x,y,10)){if(c.idx<=unlkd){sfx('tap');score=0;lives=5;startLv(c.idx);}return;}
    }
    return;
  }
  if(gs==='paused'){
    if(hit(UI.pr, x,y)){sfx('tap');gs='playing';return;}
    if(hit(UI.prs,x,y)){sfx('tap');restartLv();return;}
    if(hit(UI.pm, x,y)){sfx('tap');togMus();return;}
    if(hit(UI.pmn,x,y)){sfx('tap');stopBG();gs='menu';return;}
    return;
  }
  if(gs==='levelComplete'){sfx('tap');startLv(lvIdx);return;}
  if(gs==='over'){sfx('tap');gs='menu';return;}
  if(gs==='win'){sfx('tap');gs='menu';return;}

  // Playing yoki countdown
  if(gs==='playing'){
    if(hit(UI.pBtn,x,y,8)){gs='paused';return;}
    // Kontroller
    for(const ct of e.changedTouches){
      const p=getTXY(ct);
      if(hit(UI.jmp,p.x,p.y)){pl.jump();}
      if(hit(UI.cr,p.x,p.y)){setCol(0);}
      if(hit(UI.cg,p.x,p.y)){setCol(1);}
      if(hit(UI.cb,p.x,p.y)){setCol(2);}
    }
  }
  // Harakat tugmalarini yangilash
  updTkFromTouches(e.touches);
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();updTkFromTouches(e.touches);
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();updTkFromTouches(e.touches);
},{passive:false});

function updTkFromTouches(touches){
  tk.left=false;tk.right=false;
  for(const t of touches){
    const{x,y}=getTXY(t);
    if(hit(UI.lft,x,y))tk.left=true;
    if(hit(UI.rgt,x,y))tk.right=true;
  }
}

// Klaviatura
const keys={};
window.addEventListener('keydown',e=>{
  if(!ac){initAC();startBG();}
  if(gs==='menu')          {startGame();return;}
  if(gs==='levelSelect')   {if(e.key==='Escape'){gs='menu';}return;}
  if(gs==='paused')        {if(['Escape','p','P'].includes(e.key))gs='playing';return;}
  if(gs==='levelComplete') {startLv(lvIdx);return;}
  if(gs==='over'||gs==='win'){gs='menu';return;}
  if(gs==='playing'){
    if(['Escape','p','P'].includes(e.key)){gs='paused';return;}
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;
    if(['ArrowUp','w','W',' '].includes(e.key)){e.preventDefault();pl.jump();}
    if(e.key==='1')setCol(0);if(e.key==='2')setCol(1);if(e.key==='3')setCol(2);
  }
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
});
// Klaviatura harakatini tk ga ulaymiz
function updTk(){tk.L=keys.left;tk.R=keys.right;}

// ─── YULDUZLAR ──────────────────────────────────────
const ST=Array.from({length:120},()=>({fx:Math.random(),fy:Math.random(),r:Math.random()*1.4+.3,sp:Math.random()*.0003+.0001,t:Math.random()*Math.PI*2}));
function drawSt(par){
  const w=W(),h=H();
  for(const s of ST){
    s.t+=s.sp*60;const a=.18+Math.sin(s.t)*.18;
    const px=((s.fx*w)-(cam.x*(par||.06))+w*60)%w;
    cx.fillStyle=`rgba(255,255,255,${a})`;cx.beginPath();cx.arc(px,s.fy*h,s.r,0,Math.PI*2);cx.fill();
  }
}

// ─── CHIZISH YORDAMCHILARI ──────────────────────────
function fillBtn(b,col,active,label,fs,r){
  cx.save();cx.globalAlpha=active?1:.72;
  cx.shadowColor=col;cx.shadowBlur=active?24:8;
  const g=cx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
  g.addColorStop(0,active?col+'44':'#0e0e25');g.addColorStop(1,active?col+'22':'#07071a');
  cx.fillStyle=g;cx.beginPath();cx.roundRect(b.x,b.y,b.w,b.h,r||14);cx.fill();
  cx.strokeStyle=col;cx.lineWidth=active?2.5:1.5;cx.stroke();
  cx.shadowBlur=0;cx.fillStyle='#fff';
  cx.font=`bold ${fs||Math.min(b.h*.5,22)}px Arial`;
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(label,b.x+b.w/2,b.y+b.h/2);cx.restore();
}

function drawMenu(){
  menuT+=.016;const w=W(),h=H();
  // Fon
  const bg=cx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#030318');bg.addColorStop(.7,'#08052c');bg.addColorStop(1,'#0c0320');
  cx.fillStyle=bg;cx.fillRect(0,0,w,h);
  drawSt(0);
  // Uchuvchi sferalar (fon)
  [[CHX[0],.14,.45],[CHX[1],.5,.28],[CHX[2],.86,.45]].forEach(([c,fx,fy],i)=>{
    const ox=w*fx+Math.cos(menuT+i*2.1)*28,oy=h*fy+Math.sin(menuT*1.3+i)*20;
    const rg=cx.createRadialGradient(ox,oy,0,ox,oy,80);
    rg.addColorStop(0,c+'3a');rg.addColorStop(1,c+'00');
    cx.fillStyle=rg;cx.beginPath();cx.arc(ox,oy,80,0,Math.PI*2);cx.fill();
  });

  cx.save();cx.textAlign='center';cx.textBaseline='middle';

  // Logo — animatsiyali ranglar
  const fs=Math.min(w*.085,36);cx.font=`bold ${fs}px Arial`;
  const T="RANGLAR KO'RLIGI";const tw=cx.measureText(T).width;
  const lx=w/2-tw/2;const RC=[CHX[0],'#ff9933','#ffee00',CHX[1],CHX[2],'#aa44ff'];
  let cx2=0;

    cx.fillStyle=RC[ci];cx.shadowColor=RC[ci];cx.shadowBlur=16;

  cx.beginPath();cx.moveTo(w/2-lw/2,h*.41);cx.lineTo(w/2+lw/2,h*.41);cx.stroke();

  // Jonlar
  cx.textBaseline='middle';cx.textAlign='left';
  cx.fillStyle='#ff4466';cx.font=`bold ${Math.min(14,w*.035)}px Arial`;
  cx.fillText('❤️'.repeat(Math.max(0,lives)),10,25);
  // Ball
  cx.fillStyle='#ffee88';cx.font=`bold ${Math.min(14,w*.035)}px Arial`;
  cx.textAlign='center';cx.fillText(`⭐ ${score}`,w/2,25);
  // Pause tugmasi
  fillBtn(UI.pBtn,'#6677aa',false,'⏸',Math.min(UI.pBtn.h*.5,18),8);
  // Aktiv rang
  cx.fillStyle=CHX[aC];cx.shadowColor=CHX[aC];cx.shadowBlur=8;
  cx.font=`bold ${Math.min(10,w*.026)}px Arial`;cx.textAlign='left';
  cx.fillText(`● ${CNM[aC].toUpperCase()} O'CHIRILGAN`,10,40);cx.shadowBlur=0;
  // Progress bar — maxX ishlatiladi (orqaga ketmaydi)
  const prog=Math.min(1,(maxX-lv.sx)/Math.max(1,lv.wW-W()-lv.sx));
  const bx=w*.14,bw=w*.72,by=43.5,bh=5;
  cx.fillStyle='rgba(255,255,255,.1)';cx.fillRect(bx,by,bw,bh);
  const pg=cx.createLinearGradient(bx,0,bx+bw,0);
  pg.addColorStop(0,CHX[0]);pg.addColorStop(.5,CHX[1]);pg.addColorStop(1,CHX[2]);
  cx.fillStyle=pg;cx.shadowColor='#fff';cx.shadowBlur=4;
  cx.fillRect(bx,by,bw*prog,bh);cx.shadowBlur=0;
  cx.font='10px Arial';cx.textAlign='left';cx.fillStyle='rgba(255,255,255,.7)';
  cx.fillText('🏃',bx-4,by+bh+8);
  cx.fillText('🚩',bx+bw*prog-3,by+bh+8); // bayroqcha — faqat o'ngga!
}

// ─── KONTROLLER ─────────────────────────────────────
function drawControls(){
  const w=W(),h=H();
  const barTop=Math.min(UI.cr.y,UI.lft.y)-14;
  const bg=cx.createLinearGradient(0,barTop,0,h);
  bg.addColorStop(0,'rgba(0,0,5,0)');bg.addColorStop(.08,'rgba(0,0,15,.9)');bg.addColorStop(1,'rgba(0,0,22,.98)');
  cx.fillStyle=bg;cx.fillRect(0,barTop,w,h-barTop);
  cx.strokeStyle='rgba(80,80,150,.15)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,barTop+14);cx.lineTo(w,barTop+14);cx.stroke();
  fillBtn(UI.lft,'#4466cc',tk.left||keys.left,'◀');
  fillBtn(UI.rgt,'#4466cc',tk.right||keys.right,'▶');
  fillBtn(UI.jmp,'#8855cc',false,'▲',Math.min(UI.jmp.h*.6,30));
  fillBtn(UI.cr,CHX[0],aC===0,'R',Math.min(UI.cr.h*.52,22));
  fillBtn(UI.cg,CHX[1],aC===1,'G',Math.min(UI.cg.h*.52,22));
  fillBtn(UI.cb,CHX[2],aC===2,'B',Math.min(UI.cb.h*.52,22));
  cx.fillStyle='rgba(160,160,200,.45)';cx.font=`${Math.min(9.5,w*.024)}px Arial`;
  cx.textAlign='center';cx.textBaseline='bottom';cx.fillText("RANGNI O'CHIR",w/2,UI.cr.y-3);
}

// ─── COUNTDOWN ──────────────────────────────────────
function drawCountDown(){
  const w=W(),h=H();
  cx.save();cx.fillStyle='rgba(0,0,0,.75)';cx.fillRect(0,0,w,h);
  cx.textAlign='center';cx.textBaseline='middle';
  const n=Math.ceil(cdN),sc=1+(cdN%1)*.65;
  cx.font=`bold ${Math.min(w*.3,120)*sc}px Arial`;
  cx.fillStyle=n===3?CHX[0]:n===2?CHX[1]:CHX[2];
  cx.shadowColor=cx.fillStyle;cx.shadowBlur=55;
  cx.fillText(n>0?n:'GO!',w/2,h*.42);cx.restore();
}

// ─── PAUZA MENYU ────────────────────────────────────
function drawPause(){
  const w=W(),h=H();cx.save();
  // To'liq qora overlay
  cx.fillStyle='rgba(0,0,14,.88)';cx.fillRect(0,0,w,h);
  // Chap/o'ng rang chiziqlari
  cx.fillStyle=CHX[0]+'18';cx.fillRect(0,0,w/2,h);
  cx.fillStyle=CHX[2]+'18';cx.fillRect(w/2,0,w/2,h);

  cx.textAlign='center';cx.textBaseline='middle';
  // Sarlavha
  cx.font=`bold ${Math.min(w*.1,40)}px Arial`;cx.fillStyle='#fff';
  cx.shadowColor=NEU;cx.shadowBlur=20;cx.fillText('⏸  PAUZA',w/2,h*.2);
  cx.shadowBlur=0;
  // Info
  cx.font=`${Math.min(w*.052,20)}px Arial`;cx.fillStyle='#ffee88';
  cx.fillText(`⭐ ${score}   ❤️ ${lives}`,w/2,h*.295);
  // Chiziq
  const lw2=Math.min(w*.5,200);cx.strokeStyle='rgba(100,100,200,.3)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(w/2-lw2/2,h*.335);cx.lineTo(w/2+lw2/2,h*.335);cx.stroke();
  // Tugmalar
  fillBtn(UI.pr, '#33ff88',false,'▶  DAVOM ETISH',  Math.min(UI.pr.h*.5,22));
  fillBtn(UI.prs,'#ffdd22',false,'↺  QAYTA BOSHLASH',Math.min(UI.prs.h*.5,22));
  fillBtn(UI.pm, '#aabbff',false,musOn?'🔊  MUSIQA: YOQIQ':'🔇  MUSIQA: O\'CHIQ',Math.min(UI.pm.h*.48,20));
  fillBtn(UI.pmn,'#ff7755',false,'🏠  BOSH MENYU',  Math.min(UI.pmn.h*.5,22));
  cx.restore();
}

// ─── OVERLAY ────────────────────────────────────────
function drawOverlay(t1,sub,hint,tc){
  menuT+=.025;const w=W(),h=H();cx.save();
  cx.fillStyle='rgba(0,0,0,.85)';cx.fillRect(0,0,w,h);
  const lg=cx.createLinearGradient(0,0,w,h);
  lg.addColorStop(0,tc+'0e');lg.addColorStop(1,tc+'1a');
  cx.fillStyle=lg;cx.fillRect(0,0,w,h);
  cx.textAlign='center';cx.textBaseline='middle';
  cx.font=`bold ${Math.min(w*.1,42)}px Arial`;
  cx.fillStyle=tc;cx.shadowColor=tc;cx.shadowBlur=35;
  cx.fillText(t1,w/2,h*.27+Math.sin(menuT*3)*6);
  cx.shadowBlur=0;cx.fillStyle='#fff';
  cx.font=`bold ${Math.min(w*.065,26)}px Arial`;
  cx.fillText(sub,w/2,h*.43);
  if(bestS>0){cx.fillStyle='#ffdd88';cx.font=`${Math.min(w*.038,15)}px Arial`;cx.fillText(`🏆 Rekord: ${bestS}`,w/2,h*.51);}
  const pulse=.6+Math.sin(menuT*3.8)*.4;
  const bW=Math.min(260,w*.7),bH=50,bX=w/2-bW/2,bY=h*.63;
  cx.shadowColor='#44ffbb';cx.shadowBlur=14+pulse*18;
  cx.fillStyle=`rgba(14,60,40,${.82+pulse*.18})`;
  cx.beginPath();cx.roundRect(bX,bY,bW,bH,14);cx.fill();
  cx.strokeStyle=`rgba(55,235,145,${.65+pulse*.35})`;cx.lineWidth=2.5;cx.stroke();
  cx.shadowBlur=0;cx.globalAlpha=.88+pulse*.12;cx.fillStyle='#fff';
  cx.font=`bold ${Math.min(bH*.5,21)}px Arial`;cx.fillText(hint,w/2,bY+bH/2);
  cx.restore();
}

// ─── YANGILASH SIKLI ────────────────────────────────
function update(){
  fr++;updTk();
  if(gs==='countdown'){
    cdT++;
    if(cdT%55===0){cdN--;if(cdN>0)sfx('cd');else{sfx('go');gs='playing';cdN=0;}}
    return;
  }
  if(gs==='playing'){
    pl.upd();updCam();
    for(const e of lv.enemies)e.upd();
    for(const s of lv.spikes) s.chk();
    for(const g of lv.gems)   g.upd();
    lv.portal.upd();
  }
  pts=pts.filter(p=>{p.upd();return!p.dead();});
  if((gs==='win'||gs==='levelComplete')&&fr%2===0){
    const cl=[CHX[0],CHX[1],CHX[2],'#ffdd00','#fff'];
    pts.push(new P2(Math.random()*W()+cam.x,Math.random()*H()*.65+cam.y,cl[Math.random()*cl.length|0],(Math.random()-.5)*7,-Math.random()*7,2,5));
  }
  if(shk>0){shk*=.78;if(shk<.3)shk=0;}
  if(flA>0){flA*=.82;if(flA<.01)flA=0;}
}

// ─── TASVIR SIKLI ───────────────────────────────────
function render(){
  cx.clearRect(0,0,W(),H());

  // Menyu ekranlar — alohida
  if(gs==='menu')       {drawMenu();return;}
  if(gs==='levelSelect'){drawLevelSelect();return;}

  // O'yin sahnasi
  cx.save();
  if(shk>0)cx.translate((Math.random()-.5)*shk*2,(Math.random()-.5)*shk*2);
  const bg=cx.createLinearGradient(0,0,0,H());
  bg.addColorStop(0,lv.bg1);bg.addColorStop(1,lv.bg2);
  cx.fillStyle=bg;cx.fillRect(0,0,W(),H());
  drawSt(.07);
  for(const p of lv.plats) p.draw();
  for(const s of lv.spikes)s.draw();
  for(const g of lv.gems)  g.draw();
  lv.portal.draw();
  for(const e of lv.enemies)e.draw();
  pl.draw();
  for(const p of pts)p.draw();
  if(flA>0){cx.globalAlpha=flA*.3;cx.fillStyle=flC;cx.fillRect(0,0,W(),H());cx.globalAlpha=1;}
  cx.restore();

  // Playing / countdown — HUD + kontroller
  if(gs==='playing'||gs==='countdown'){
    drawHUD();drawControls();
    if(gs==='countdown')drawCountDown();
  }
  // Paused — HUD + PAUZA menyu (kontroller ko'rsatilmaydi)
  if(gs==='paused'){drawHUD();drawPause();}
  // Yakuniy ekranlar
  if(gs==='levelComplete')drawOverlay('🎉 DARAJA TUGADI!',`Natija: ⭐ ${score}`,'▶  KEYINGI DARAJA','#ffdd00');
  if(gs==='over')         drawOverlay('💔 O\'YIN TUGADI',`Natija: ⭐ ${score}`,'🏠  BOSH MENYU','#ff3355');
  if(gs==='win')          drawOverlay("🏆 G'OLIB! 🏆",`Umumiy natija: ⭐ ${score}`,'🏠  BOSH MENYU','#ffdd00');
}

function loop(){update();render();requestAnimationFrame(loop);}

// ─── ISHGA TUSHIRISH ────────────────────────────────
loadLv(0);gs='menu';layoutUI();loop();
</script>
