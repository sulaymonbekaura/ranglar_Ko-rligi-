'use strict';
// =========================================================
//  RANGLAR KO'RLIGI  v2 — telefon uchun yaxshilangan
// =========================================================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r||0, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath(); return this;
  };
}

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', () => { resize(); updateBtns(); });

// =========================================================
//  KONSTANTLAR
// =========================================================
const GRAVITY = 0.46;
const JUMP_F  = -13;
const SPEED   = 3.6;
const MAX_V   = 16;
const PW=26, PH=34;

// Colors: 0=Qizil 1=Yashil 2=Ko'k  -1=Neytral
const CHEX   = ['#ff3355','#33ff88','#3388ff'];
const CNAME  = ["Qizil","Yashil","Ko'k"];
const CNEUTRAL = '#8899cc';

// =========================================================
//  AUDIO
// =========================================================
let ac;
function initAudio(){ if(!ac) ac = new(window.AudioContext||window.webkitAudioContext)(); }
function beep(freq,type,dur,vol){
  if(!ac)return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
  o.start(); o.stop(ac.currentTime+dur+0.01);
}
function snd(t){
  if(!ac)return;
  switch(t){
    case 'jump':    beep(260,'square',.08,.08); setTimeout(()=>beep(440,'square',.07,.06),55); break;
    case 'land':    beep(100,'square',.06,.05); break;
    case 'die':     beep(350,'sawtooth',.1,.09); setTimeout(()=>beep(160,'sawtooth',.22,.08),110); break;
    case 'collect': beep(720,'sine',.08,.07); setTimeout(()=>beep(1050,'sine',.1,.05),75); break;
    case 'stomp':   beep(260,'square',.05,.09); setTimeout(()=>beep(80,'sine',.18,.07),40); break;
    case 'color':   beep([500,640,780][activeC],'sine',.13,.07); break;
    case 'win':     [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'square',.15,.07),i*115)); break;
    case 'next':    beep(750,'sine',.09,.07); setTimeout(()=>beep(1000,'sine',.15,.06),95); break;
  }
}

// =========================================================
//  ZARRALAR (Particles)
// =========================================================
class Particle {
  constructor(x,y,col,vx,vy,life,sz){
    this.x=x; this.y=y; this.col=col;
    this.vx=vx!==undefined?vx:(Math.random()-.5)*9;
    this.vy=vy!==undefined?vy:(Math.random()-.5)*9-2;
    this.life=life||1; this.ml=this.life;
    this.sz=sz||Math.random()*4+1;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=.19; this.vx*=.97; this.life-=.022; }
  draw(){
    if(this.life<=0)return;
    const a=Math.pow(this.life/this.ml,.6);
    ctx.save(); ctx.globalAlpha=a*.9;
    ctx.fillStyle=this.col; ctx.shadowColor=this.col; ctx.shadowBlur=7;
    ctx.beginPath(); ctx.arc(this.x-cam.x,this.y-cam.y,this.sz*a,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  dead(){ return this.life<=0; }
}
let parts=[];
function burst(x,y,col,n,str){
  str=str||1;
  for(let i=0;i<n;i++) parts.push(new Particle(x,y,col,(Math.random()-.5)*9*str,(Math.random()-.5)*9*str-3*str));
}

// =========================================================
//  KAMERA
// =========================================================
const cam={x:0,y:0,tx:0,ty:0};
function updateCam(){
  cam.x+=(cam.tx-cam.x)*.13; cam.y+=(cam.ty-cam.y)*.13;
  const lv=currentLevel;
  cam.x=Math.max(0,Math.min(cam.x,lv.worldW-canvas.width));
  cam.y=Math.max(-150,Math.min(cam.y,lv.worldH-canvas.height+200));
}

// =========================================================
//  YORDAMCHI
// =========================================================
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

// =========================================================
//  PLATFORMA
// =========================================================
class Platform {
  constructor(x,y,w,h,col){ this.x=x; this.y=y; this.w=w; this.h=h; this.col=col; }
  solid(){ return this.col===-1||this.col!==activeC; }
  draw(){
    const sx=this.x-cam.x, sy=this.y-cam.y;
    const erased=this.col!==-1&&this.col===activeC;
    const hex=this.col===-1?CNEUTRAL:CHEX[this.col];
    ctx.save();
    if(erased) ctx.globalAlpha=.1;
    ctx.shadowColor=hex; ctx.shadowBlur=erased?0:18;
    const gr=ctx.createLinearGradient(sx,sy,sx,sy+this.h);
    gr.addColorStop(0,hex); gr.addColorStop(1,hex+'88');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h,5); ctx.fill();
    if(!erased){
      ctx.globalAlpha=.35; ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.fillRect(sx+4,sy+2,this.w-8,4);
    }
    ctx.restore();
  }
}

// =========================================================
//  TIKAN (Spike)
// =========================================================
class Spike {
  constructor(x,y,w,col){ this.x=x; this.y=y; this.w=w||30; this.h=20; this.col=col; }
  solid(){ return this.col===-1||this.col!==activeC; }
  check(){
    if(!this.solid())return;
    if(player.alive&&overlap(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h})) player.kill();
  }
  draw(){
    const sx=this.x-cam.x, sy=this.y-cam.y;
    const hex=this.col===-1?CNEUTRAL:CHEX[this.col];
    const erased=this.col!==-1&&this.col===activeC;
    ctx.save(); if(erased)ctx.globalAlpha=.1;
    ctx.fillStyle=hex; ctx.shadowColor=hex; ctx.shadowBlur=erased?0:10;
    const n=Math.max(1,Math.floor(this.w/16)), sw=this.w/n;
    for(let i=0;i<n;i++){
      ctx.beginPath(); ctx.moveTo(sx+i*sw,sy+this.h); ctx.lineTo(sx+i*sw+sw/2,sy); ctx.lineTo(sx+(i+1)*sw,sy+this.h); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

// =========================================================
//  OLMOS (Gem)
// =========================================================
class Gem {
  constructor(x,y,col){ this.x=x; this.y=y; this.w=20; this.h=20; this.col=col; this.t=Math.random()*Math.PI*2; this.taken=false; }
  update(){
    this.t+=.04;
    if(!this.taken&&player.alive){
      const fy=this.y-Math.sin(this.t)*7;
      if(overlap(player.rect(),{x:this.x,y:fy,w:this.w,h:this.h})){
        this.taken=true; score+=50;
        burst(this.x+10,this.y+10,this.col===-1?'#ffdd00':CHEX[this.col],8); snd('collect');
      }
    }
  }
  draw(){
    if(this.taken)return;
    const sx=this.x-cam.x, sy=this.y-cam.y-Math.sin(this.t)*7;
    const hex=this.col===-1?'#ffdd00':CHEX[this.col];
    ctx.save(); ctx.shadowColor=hex; ctx.shadowBlur=16; ctx.fillStyle=hex;
    ctx.beginPath(); ctx.moveTo(sx+10,sy); ctx.lineTo(sx+20,sy+10); ctx.lineTo(sx+10,sy+20); ctx.lineTo(sx,sy+10); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=.5; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.moveTo(sx+10,sy+2); ctx.lineTo(sx+18,sy+10); ctx.lineTo(sx+10,sy+10); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// =========================================================
//  PORTAL (Daraja tugashi)
// =========================================================
class Portal {
  constructor(x,y){ this.x=x; this.y=y; this.w=42; this.h=60; this.t=0; this.triggered=false; }
  update(){ this.t+=.04; if(!this.triggered&&player.alive&&overlap(player.rect(),this)){this.triggered=true;nextLevel();} }
  draw(){
    const sx=this.x-cam.x+21, sy=this.y-cam.y+30;
    ctx.save();
    const og=ctx.createRadialGradient(sx,sy,0,sx,sy,55);
    og.addColorStop(0,'rgba(200,80,255,.35)'); og.addColorStop(1,'rgba(180,60,255,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.ellipse(sx,sy,55,60,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#cc55ff'; ctx.lineWidth=3+Math.sin(this.t); ctx.shadowColor='#cc55ff'; ctx.shadowBlur=28;
    ctx.beginPath(); ctx.ellipse(sx,sy,20+Math.sin(this.t)*3,30+Math.cos(this.t)*4,0,0,Math.PI*2); ctx.stroke();
    const ig=ctx.createRadialGradient(sx,sy,0,sx,sy,19);
    ig.addColorStop(0,'rgba(230,140,255,.85)'); ig.addColorStop(1,'rgba(100,20,200,.3)');
    ctx.fillStyle=ig; ctx.beginPath(); ctx.ellipse(sx,sy,19,29,0,0,Math.PI*2); ctx.fill();
    for(let i=0;i<3;i++){
      const a=this.t*2+i*Math.PI*2/3;
      ctx.fillStyle='#ff88ff'; ctx.shadowBlur=9;
      ctx.beginPath(); ctx.arc(sx+Math.cos(a)*29,sy+Math.sin(a)*35,4,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0; ctx.font='bold 18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff'; ctx.fillText('⭐',sx,sy);
    ctx.restore();
  }
}

// =========================================================
//  DUSHMAN (Enemy)
// =========================================================
class Enemy {
  constructor(x,y,pl,pr,col){ this.x=x; this.y=y; this.w=30; this.h=30; this.vx=.9; this.pl=pl; this.pr=pr; this.col=col; this.alive=true; this.t=0; }
  update(){
    if(!this.alive)return;
    this.t+=.1; this.x+=this.vx;
    if(this.x<=this.pl||this.x+this.w>=this.pr) this.vx*=-1;
    if(!player.alive||player.invincible>0)return;
    if(overlap(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h})){
      if(player.vy>1&&player.y+player.h<this.y+this.h*.55){
        this.alive=false; player.vy=JUMP_F*.65; player.jumps=1;
        score+=100; burst(this.x+15,this.y+15,this.col>=0?CHEX[this.col]:'#ff8833',14); snd('stomp');
      } else { player.kill(); }
    }
  }
  draw(){
    if(!this.alive)return;
    const sx=this.x-cam.x, sy=this.y-cam.y+Math.sin(this.t)*2.5;
    const ec=this.col>=0?CHEX[this.col]:'#ff8833';
    ctx.save(); ctx.shadowColor=ec; ctx.shadowBlur=14; ctx.fillStyle=ec;
    ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h-Math.abs(Math.sin(this.t))*2,7); ctx.fill();
    ctx.fillStyle='#111'; ctx.shadowBlur=0;
    [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(sx+15+s*8,sy+11,4,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#f00';
    [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(sx+15+s*8,sy+11,2,0,Math.PI*2);ctx.fill();});
    ctx.strokeStyle='#111'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx+5,sy+5); ctx.lineTo(sx+11,sy+8); ctx.moveTo(sx+25,sy+5); ctx.lineTo(sx+19,sy+8); ctx.stroke();
    ctx.restore();
  }
}

// =========================================================
//  PLAYER
// =========================================================
const player={
  x:100,y:100,vx:0,vy:0,w:PW,h:PH,
  grounded:false,alive:true,dying:false,invincible:0,jumps:0,maxJumps:2,face:1,
  rect(){ return {x:this.x,y:this.y,w:this.w,h:this.h}; },
  reset(sx,sy){
    this.x=sx; this.y=sy; this.vx=0; this.vy=0;
    this.grounded=false; this.alive=true; this.dying=false;
    this.invincible=90; // kirish vaqtida himoya
    this.jumps=0;
  },
  update(){
    if(!this.alive)return;
    if(this.invincible>0)this.invincible--;
    // Harakat
    if(keys.left||touch.left)       {this.vx=-SPEED;this.face=-1;}
    else if(keys.right||touch.right){this.vx= SPEED;this.face= 1;}
    else this.vx*=.76;
    // Tortishish
    this.vy=Math.min(this.vy+GRAVITY,MAX_V);
    // X harakat + to'qnashuv
    this.x+=this.vx;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(overlap(this.rect(),p)){
        if(this.vx>0)this.x=p.x-this.w; else this.x=p.x+p.w; this.vx=0;
      }
    }
    // Y harakat + to'qnashuv
    const wasG=this.grounded; this.grounded=false;
    this.y+=this.vy;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(overlap(this.rect(),p)){
        if(this.vy>=0){this.y=p.y-this.h;this.vy=0;this.grounded=true;}
        else{this.y=p.y+p.h;this.vy=0;}
      }
    }
    if(this.grounded&&!wasG){this.jumps=0;if(this.vy>3)snd('land');}
    this.x=Math.max(0,this.x);
    if(this.y>currentLevel.worldH+350)this.kill();
    // Yugurish changi
    if(this.grounded&&(keys.left||touch.left||keys.right||touch.right)&&frame%7===0)
      parts.push(new Particle(this.x+13,this.y+this.h,CHEX[activeC],0,-1,.4,1.5));
    // Kamera
    cam.tx=this.x-canvas.width/2+this.w/2;
    cam.ty=this.y-canvas.height*.44;
  },
  jump(){
    if(this.jumps<this.maxJumps){
      this.vy=JUMP_F; this.jumps++; this.grounded=false;
      snd('jump'); burst(this.x+13,this.y+this.h,CHEX[activeC],8,.7);
    }
  },
  kill(){
    if(this.dying||this.invincible>0)return;
    this.dying=true; this.alive=false;
    burst(this.x+13,this.y+17,'#ff3355',22); burst(this.x+13,this.y+17,'#fff',8);
    snd('die'); lives--;
    setTimeout(()=>{
      if(lives<=0)gameState='over';
      else{loadLevel(levelIdx);gameState='playing';}
    },1300);
  },
  draw(){
    if(!this.alive)return;
    if(this.invincible>0&&frame%6<3)return;
    const sx=this.x-cam.x, sy=this.y-cam.y;
    ctx.save();
    ctx.globalAlpha=.22; ctx.fillStyle=CHEX[activeC];
    ctx.beginPath(); ctx.roundRect(sx-6,sy-6,this.w+12,this.h+12,15); ctx.fill(); ctx.globalAlpha=1;
    ctx.shadowColor=CHEX[activeC]; ctx.shadowBlur=24;
    const gr=ctx.createLinearGradient(sx,sy,sx,sy+this.h);
    gr.addColorStop(0,'#dde2ff'); gr.addColorStop(1,'#7788cc');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h,8); ctx.fill();
    ctx.strokeStyle=CHEX[activeC]; ctx.lineWidth=2.5; ctx.stroke();
    const ex=sx+(this.face>0?this.w*.65:this.w*.35), ey=sy+this.h*.3;
    ctx.fillStyle='#111'; ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(ex,ey,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=CHEX[activeC]; ctx.beginPath(); ctx.arc(ex+this.face*1.3,ey,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=CHEX[activeC]; ctx.globalAlpha=.8; ctx.fillRect(sx+3,sy+this.h*.55,this.w-6,5);
    ctx.restore();
  }
};

// =========================================================
//  DARAJALAR
// =========================================================
function P(x,y,w,h,c){ return new Platform(x,y,w,h,c); }
function S(x,y,w,c)  { return new Spike(x,y,w,c); }
function E(x,y,l,r,c){ return new Enemy(x,y,l,r,c); }
function G(x,y,c)    { return new Gem(x,y,c); }

const levelFactories=[makeLevel1,makeLevel2,makeLevel3];
let levelIdx=0, currentLevel, gameState='title';
let score=0, lives=5, activeC=0, frame=0;
let titleT=0;

function loadLevel(idx){
  currentLevel=levelFactories[idx]();
  activeC=currentLevel.initC;
  player.reset(currentLevel.startX,currentLevel.startY);
  cam.x=0; cam.y=0; parts=[];
}
function nextLevel(){
  score+=500; snd('next');
  burst(player.x+13,player.y+17,'#ffdd00',28); burst(player.x+13,player.y+17,'#fff',12);
  levelIdx++;
  if(levelIdx>=levelFactories.length){gameState='win';snd('win');}
  else gameState='levelComplete';
}
function setColor(c){
  if(activeC===c)return;
  activeC=c; snd('color');
  burst(player.x+13,player.y+17,CHEX[c],14,.8);
}
function startGame()  {score=0;lives=5;levelIdx=0;loadLevel(0);gameState='playing';}
function restartGame(){score=0;lives=5;levelIdx=0;loadLevel(0);gameState='playing';}

// =========================================================
//  KLAVIATURA
// =========================================================
const keys={};
const touch={left:false,right:false};
window.addEventListener('keydown',e=>{
  initAudio();
  if(gameState==='title')                     {startGame();return;}
  if(gameState==='over'||gameState==='win')   {restartGame();return;}
  if(gameState==='levelComplete')             {loadLevel(levelIdx);gameState='playing';return;}
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if(['ArrowUp','w','W',' '].includes(e.key)){e.preventDefault();player.jump();}
  if(e.key==='1')setColor(0);
  if(e.key==='2')setColor(1);
  if(e.key==='3')setColor(2);
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});

// =========================================================
//  VIRTUAL TUGMALAR — yangi qulay joy
// =========================================================
const btns={};

function updateBtns(){
  const W=canvas.width, H=canvas.height;
  // Pastki boshqaruv paneli 160px
  const ctrlH=Math.min(160,H*.22);
  const pad=10;

  // --- Harakat tugmalari (chap pastda) ---
  const mvW=Math.min(74,W*.18);
  const mvH=Math.min(72,ctrlH*.52);
  const row2Y=H-mvH-pad;
  btns.left ={x:pad,         y:row2Y, w:mvW, h:mvH};
  btns.right={x:pad*2+mvW,   y:row2Y, w:mvW, h:mvH};

  // --- Sakrash tugmasi (o'ng pastda) ---
  const jpW=Math.min(80,W*.20);
  const jpH=Math.min(80,ctrlH*.58);
  btns.jump={x:W-jpW-pad, y:H-jpH-pad, w:jpW, h:jpH};

  // --- Rang tugmalari (o'rtada, harakat tugmalari ustida) ---
  const cw=Math.min(68,W*.165);
  const ch=Math.min(54,ctrlH*.4);
  const cTot=cw*3+pad*2;
  const csx=(W-cTot)/2;
  const cY=row2Y-ch-8;
  btns.R={x:csx,           y:cY, w:cw, h:ch};
  btns.G={x:csx+cw+pad,    y:cY, w:cw, h:ch};
  btns.B={x:csx+cw*2+pad*2,y:cY, w:cw, h:ch};
}

function inBtn(b,tx,ty){
  // Kattaroq urish maydoni (20px atrofida)
  const m=14;
  return tx>=b.x-m&&tx<=b.x+b.w+m&&ty>=b.y-m&&ty<=b.y+b.h+m;
}

function getTxy(t){
  const r=canvas.getBoundingClientRect();
  return{x:(t.clientX-r.left)*canvas.width/r.width, y:(t.clientY-r.top)*canvas.height/r.height};
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); initAudio();
  if(gameState==='title')                   {startGame();return;}
  if(gameState==='over'||gameState==='win') {restartGame();return;}
  if(gameState==='levelComplete')           {loadLevel(levelIdx);gameState='playing';return;}
  for(const t of e.changedTouches){
    const{x,y}=getTxy(t);
    if(inBtn(btns.left,x,y))  touch.left=true;
    if(inBtn(btns.right,x,y)) touch.right=true;
    if(inBtn(btns.jump,x,y))  player.jump();
    if(inBtn(btns.R,x,y))setColor(0);
    if(inBtn(btns.G,x,y))setColor(1);
    if(inBtn(btns.B,x,y))setColor(2);
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  touch.left=false; touch.right=false;
  for(const t of e.touches){
    const{x,y}=getTxy(t);
    if(inBtn(btns.left,x,y))  touch.left=true;
    if(inBtn(btns.right,x,y)) touch.right=true;
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  touch.left=false; touch.right=false;
  for(const t of e.touches){
    const{x,y}=getTxy(t);
    if(inBtn(btns.left,x,y))  touch.left=true;
    if(inBtn(btns.right,x,y)) touch.right=true;
  }
},{passive:false});

const STARS=Array.from({length:140},()=>({fx:Math.random(),fy:Math.random(),r:Math.random()*1.5+.3,speed:Math.random()*.0003+.0001,t:Math.random()*Math.PI*2}));
function drawStars(W,H,parallax){
  for(const s of STARS){
    s.t+=s.speed*60;
    const a=.22+Math.sin(s.t)*.2;
    const px=((s.fx*W)-(cam.x*(parallax||.08))+W*50)%W;
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.arc(px,s.fy*H,s.r,0,Math.PI*2);ctx.fill();
  }
}

function drawBg(){
  const bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,currentLevel.bgTop); bg.addColorStop(1,currentLevel.bgBot);
  ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

}

  ctx.fillStyle='#ff4466'; ctx.font=`bold ${Math.min(14,W*.036)}px Arial`;

/* --- Tugma chizish --- */
function drawBtn(b,lbl,col,active,fontSize){
  ctx.save(); ctx.globalAlpha=active?1:.62;
  ctx.fillStyle=active?col+'bb':'#111133cc';
  ctx.shadowColor=col; ctx.shadowBlur=active?28:10;
  ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,14); ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=active?3:1.8; ctx.stroke();
  ctx.shadowBlur=0; ctx.fillStyle='#fff';
  ctx.font=`bold ${fontSize||Math.min(b.h*.55,26)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(lbl,b.x+b.w/2,b.y+b.h/2);
  ctx.restore();
}

function drawControls(){
  updateBtns();
  const W=canvas.width, H=canvas.height;
  // Boshqaruv paneli foni
  const barTop=Math.min(btns.R.y,btns.left.y)-12;
  const barGr=ctx.createLinearGradient(0,barTop,0,H);
  barGr.addColorStop(0,'rgba(0,0,5,0)');
  barGr.addColorStop(.12,'rgba(0,0,15,.88)');
  barGr.addColorStop(1,'rgba(0,0,20,.96)');
  ctx.fillStyle=barGr; ctx.fillRect(0,barTop,W,H-barTop);

  // Ajratuvchi chiziq
  ctx.strokeStyle='rgba(100,100,180,.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,barTop+12); ctx.lineTo(W,barTop+12); ctx.stroke();

  // Harakat tugmalari (katta)
  drawBtn(btns.left, '◀','#4466cc',touch.left);
  drawBtn(btns.right,'▶','#4466cc',touch.right);
  drawBtn(btns.jump, '▲','#8855cc',false,Math.min(btns.jump.h*.6,30));

  // Rang tugmalari — yorliq bilan
  drawBtn(btns.R,'R',CHEX[0],activeC===0,Math.min(btns.R.h*.55,22));
  drawBtn(btns.G,'G',CHEX[1],activeC===1,Math.min(btns.G.h*.55,22));
  drawBtn(btns.B,"B",CHEX[2],activeC===2,Math.min(btns.B.h*.55,22));

  // "O'CHIRISH" yozuvi rang tugmalari ustida
  ctx.fillStyle='rgba(180,180,220,.55)';
  ctx.font=`${Math.min(9.5,W*.024)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText("RANGNI O'CHIR",W/2,btns.R.y-3);
}

function drawTitle(){
  titleT+=.018;
  const W=canvas.width, H=canvas.height;
  // Fon
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#03031a'); bg.addColorStop(1,'#0c041e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  drawStars(W,H,0);

  // Uchuvchi ranglar shari
  [[CHEX[0],.17,.46],[CHEX[1],.5,.32],[CHEX[2],.83,.46]].forEach(([c,fx,fy],i)=>{
    const ox=W*fx+Math.cos(titleT+i*2.1)*30, oy=H*fy+Math.sin(titleT*1.3+i)*22;
    const rg=ctx.createRadialGradient(ox,oy,0,ox,oy,80);
    rg.addColorStop(0,c+'55'); rg.addColorStop(1,c+'00');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(ox,oy,80,0,Math.PI*2); ctx.fill();
  });

  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';

  // Sarlavha — rangberang to'lqin
  const fs=Math.min(W*.086,37);
  ctx.font=`bold ${fs}px Arial`;
  const title="RANGLAR KO'RLIGI";
  const tw=ctx.measureText(title).width;
  const sx2=W/2-tw/2;
  const rcols=[CHEX[0],'#ff9933','#ffee00',CHEX[1],CHEX[2],'#aa44ff'];
  let cx2=0;
  for(let i=0;i<title.length;i++){
    const ci=(i+Math.floor(titleT*2))%rcols.length;
    ctx.fillStyle=rcols[ci]; ctx.shadowColor=rcols[ci]; ctx.shadowBlur=18;
    const cw2=ctx.measureText(title[i]).width;
    ctx.fillText(title[i],sx2+cx2+cw2/2,H*.25+Math.sin(titleT*2.5+i*.4)*8);
    cx2+=cw2;
  }

  // Kichik sarlavha
  ctx.shadowBlur=6; ctx.shadowColor='#88aaff'; ctx.fillStyle='#aabbff';
  ctx.font=`${Math.min(W*.038,15.5)}px Arial`;
  ctx.fillText('Color Shift Adventure  🎮',W/2,H*.34);

  // Qoidalar paneli
  ctx.shadowBlur=0;
  const tips=[
    {e:'🔴',t:"R tugma → Qizil to'siqlar yo'qoladi",c:'#ff7788'},
    {e:'🟢',t:"G tugma → Yashil to'siqlar yo'qoladi",c:'#77ffaa'},
    {e:'🔵',t:"B tugma → Ko'k to'siqlar yo'qoladi",c:'#7799ff'},
    {e:'⭐',t:"Olmoslar yig'ing, portga yeting!",c:'#ffdd88'},
    {e:'👟',t:"Dushmanlarni tepib o'ldiring!",c:'#ffbb88'},
  ];
  const tfs=Math.min(W*.033,13.5);
  ctx.font=`${tfs}px Arial`;
  const tipTop=H*.43;
  tips.forEach((tip,i)=>{ctx.fillStyle=tip.c; ctx.fillText(`${tip.e}  ${tip.t}`,W/2,tipTop+i*(tfs*1.9));});

  // === BOSING tugmasi (yangi, chiroyli) ===
  const pulse=.65+Math.sin(titleT*3.8)*.35;
  const bW=Math.min(300,W*.78);
  const bH=Math.min(60,H*.075);
  const bX=W/2-bW/2;
  const bY=H*.84;

  // Soya glow
  ctx.shadowColor='#44ffbb'; ctx.shadowBlur=22+pulse*28;
  // Fon
  const bGr=ctx.createLinearGradient(bX,bY,bX,bY+bH);
  bGr.addColorStop(0,`rgba(16,70,48,${.82+pulse*.18})`);
  bGr.addColorStop(1,`rgba(8,40,26,${.82+pulse*.18})`);
  ctx.fillStyle=bGr;
  ctx.beginPath(); ctx.roundRect(bX,bY,bW,bH,16); ctx.fill();
  // Chegara
  ctx.strokeStyle=`rgba(60,240,160,${.65+pulse*.35})`; ctx.lineWidth=2.5; ctx.stroke();
  // Matn
  ctx.shadowBlur=0; ctx.globalAlpha=.85+pulse*.15;
  ctx.fillStyle='#ffffff';
  ctx.font=`bold ${Math.min(bH*.48,23)}px Arial`;
  ctx.fillText('▶  O\'YNASH BOSHLASH  ◀',W/2,bY+bH/2);

  // Pastda kichik izoh
  ctx.globalAlpha=.5; ctx.fillStyle='#aabbcc';
  ctx.font=`${Math.min(W*.03,12)}px Arial`;
  ctx.fillText('Teging yoki istalgan tugmani bosing',W/2,bY+bH+16);

  ctx.restore();
}

function drawOverlay(t1,sub,hint,tc){
  titleT+=.025;
  const W=canvas.width,H=canvas.height;
  ctx.save(); ctx.fillStyle='rgba(0,0,0,.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(W*.1,42)}px Arial`;
  ctx.fillStyle=tc; ctx.shadowColor=tc; ctx.shadowBlur=35;
  ctx.fillText(t1,W/2,H*.32+Math.sin(titleT*3)*6);
  if(sub){
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.min(W*.065,26)}px Arial`;
    ctx.fillText(sub,W/2,H*.48);
  }
  const pulse=.6+Math.sin(titleT*3.8)*.4;
  const bW=Math.min(280,W*.72),bH=Math.min(54,H*.07),bX=W/2-bW/2,bY=H*.66;
  ctx.shadowColor='#44ffbb'; ctx.shadowBlur=18+pulse*22;
  ctx.fillStyle=`rgba(16,65,45,${.8+pulse*.2})`;
  ctx.beginPath(); ctx.roundRect(bX,bY,bW,bH,14); ctx.fill();
  ctx.strokeStyle=`rgba(60,240,150,${.6+pulse*.4})`; ctx.lineWidth=2.5; ctx.stroke();
  ctx.shadowBlur=0; ctx.globalAlpha=.85+pulse*.15; ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(bH*.5,22)}px Arial`;
  ctx.fillText(hint,W/2,bY+bH/2);
  ctx.restore();
}

// =========================================================
//  YANGILASH / TASVIR
// =========================================================
function update(){
  frame++;
  player.update(); updateCam();
  for(const e of currentLevel.enemies)e.update();
  for(const s of currentLevel.spikes) s.check();
  for(const g of currentLevel.gems)   g.update();
  currentLevel.portal.update();
  parts=parts.filter(p=>{p.update();return!p.dead();});
  // Nishonlash zarralari
  if((gameState==='win'||gameState==='levelComplete')&&frame%2===0){
    const cols=[CHEX[0],CHEX[1],CHEX[2],'#ffdd00','#fff'];
    parts.push(new Particle(
      Math.random()*canvas.width+cam.x, Math.random()*canvas.height*.65+cam.y,
      cols[Math.random()*cols.length|0], (Math.random()-.5)*7,-Math.random()*7,2,5
    ));
  }
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(gameState==='title'){drawTitle();return;}
  drawBg();
  for(const p of currentLevel.plats)   p.draw();
  for(const s of currentLevel.spikes)  s.draw();
  for(const g of currentLevel.gems)    g.draw();
  currentLevel.portal.draw();
  for(const e of currentLevel.enemies) e.draw();
  player.draw();
  for(const p of parts)p.draw();
  drawHUD();
  drawControls();
  if(gameState==='levelComplete')drawOverlay('🎉 DARAJA TUGADI!',`Natija: ⭐ ${score}`,'▶ DAVOM ETISH ◀','#ffdd00');
  if(gameState==='over')         drawOverlay("💔 O'YIN TUGADI",`Natija: ⭐ ${score}`,'▶ QAYTA URINISH ◀','#ff3355');
  if(gameState==='win')          drawOverlay("🏆 G'OLIB! 🏆",`Umumiy natija: ⭐ ${score}`,"▶ QAYTA O'YNASH ◀",'#ffdd00');
}

function loop(){
  if(gameState==='playing'||gameState==='levelComplete'||gameState==='over'||gameState==='win')update();
  render();
  requestAnimationFrame(loop);
}

// =========================================================
//  ISHGA TUSHIRISH
// =========================================================
loadLevel(0); gameState='title'; updateBtns(); loop();
</script>
</body>
</html>
