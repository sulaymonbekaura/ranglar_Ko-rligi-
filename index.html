// ============================================================

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let BTNS = {};

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  calcBtns();
}
resize();
window.addEventListener('resize', resize);

// RoundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r||0, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath(); return this;
  };
}

// ─── KONSTANTLAR ──────────────────────────────────────────
const GRAVITY = 0.47;
const JUMP_FORCE = -13.2;
const MOVE_SPEED = 3.6;
const MAX_FALL   = 16;
const PL_W = 26, PL_H = 34;
const COLORS  = ['#ff3355', '#33ff88', '#3388ff'];
const C_NAMES = ["Qizil", "Yashil", "Ko'k"];
const C_NEUTRAL = '#6677aa';

// ─── O'YIN HOLATI ─────────────────────────────────────────
// state: 'menu' | 'levels' | 'countdown' | 'playing' | 'paused' | 'complete' | 'over' | 'win'
let state     = 'menu';
let levelIndex = 0;
let score     = 0;
let lives     = 5;
let activeColor = 0;
let frameCount  = 0;
let menuTimer   = 0;
let countdown   = 3;
let cdTimer     = 0;
let shakeAmount = 0;
let flashAmount = 0;
let flashColor  = '#fff';
let maxReachedX = 0; // progress bar — sadece ileri gider

// Saqlash
let bestScore   = parseInt(localStorage.getItem('rk_best') || '0');
let unlockedLvl = parseInt(localStorage.getItem('rk_unl')  || '0');
let musicOn     = localStorage.getItem('rk_mus') !== '0';
function saveData(){
  localStorage.setItem('rk_best', bestScore);
  localStorage.setItem('rk_unl',  unlockedLvl);
  localStorage.setItem('rk_mus',  musicOn ? '1' : '0');
}

// ─── AUDIO ────────────────────────────────────────────────
let audioCtx, bgmGain, bgmRunning = false, bgmTimer = null;

function initAudio(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = musicOn ? 0.05 : 0;
  bgmGain.connect(audioCtx.destination);
}

function playBeep(freq, type, dur, vol, delay){
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

function playSFX(name){
  if (!audioCtx) return;
  if (name === 'jump')    { playBeep(260,'square',.08,.08); playBeep(420,'square',.07,.06,.06); }
  if (name === 'land')      playBeep(110,'square',.05,.06);
  if (name === 'die')     { playBeep(360,'sawtooth',.1,.09); playBeep(180,'sawtooth',.25,.08,.12); }
  if (name === 'gem')     { playBeep(700,'sine',.08,.07); playBeep(1050,'sine',.1,.05,.08); }
  if (name === 'stomp')   { playBeep(270,'square',.05,.1); playBeep(85,'sine',.18,.08,.05); }
  if (name === 'color')     playBeep([500,640,780][activeColor],'sine',.12,.07);
  if (name === 'portal')    [523,659,784,1047].forEach((f,i) => playBeep(f,'square',.14,.07,i*.12));
  if (name === 'countdown') playBeep(660,'sine',.15,.1);
  if (name === 'go')      { playBeep(880,'square',.06,.1); playBeep(1100,'square',.1,.08,.08); }
  if (name === 'tap')       playBeep(800,'sine',.06,.05);
}

// BGM melody
const BGM_NOTES = [
  [392,196],[330,196],[392,196],[440,196],[392,175],[330,175],[262,175],[294,175],
  [330,196],[294,196],[330,196],[392,196],[330,175],[262,175],[196,175],[196,175],
  [392,196],[523,196],[440,196],[392,196],[330,175],[392,175],[440,175],[523,175],
  [440,196],[392,196],[330,196],[294,196],[262,131],[262,131],[294,131],[330,131]
];
const BGM_STEP = 0.178;

function bgmPlayNote(freq, dur, when, type, vol){
  if (!audioCtx || !bgmGain) return;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.connect(g); g.connect(bgmGain);
  osc.type = type || 'square';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.4, when);
  g.gain.setValueAtTime(vol || 0.4, when + dur * 0.75);
  g.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.95);
  osc.start(when); osc.stop(when + dur + 0.02);
}

function startBGM(){
  if (!audioCtx || bgmRunning) return;
  bgmRunning = true;
  bgmGain.gain.setTargetAtTime(musicOn ? 0.05 : 0, audioCtx.currentTime, 0.3);
  const totalDur = BGM_NOTES.length * BGM_STEP;
  function scheduleLoop(){
    if (!bgmRunning) return;
    let t = audioCtx.currentTime + 0.05;
    for (const [mel, bas] of BGM_NOTES){
      bgmPlayNote(mel, BGM_STEP * 0.82, t, 'square', 0.38);
      bgmPlayNote(bas, BGM_STEP * 0.9,  t, 'triangle', 0.26);
      t += BGM_STEP;
    }
    bgmTimer = setTimeout(scheduleLoop, (totalDur - 0.2) * 1000);
  }
  scheduleLoop();
}

function stopBGM(){
  bgmRunning = false;
  if (bgmTimer){ clearTimeout(bgmTimer); bgmTimer = null; }
}

function toggleMusic(){
  musicOn = !musicOn;
  if (bgmGain && audioCtx)
    bgmGain.gain.setTargetAtTime(musicOn ? 0.05 : 0, audioCtx.currentTime, 0.3);
  saveData();
}

// ─── ZARRALAR ─────────────────────────────────────────────
class Particle {
  constructor(x, y, color, vx, vy, life, size){
    this.x = x; this.y = y; this.color = color;
    this.vx = (vx !== undefined) ? vx : (Math.random() - 0.5) * 9;
    this.vy = (vy !== undefined) ? vy : (Math.random() - 0.5) * 9 - 2;
    this.life = life || 1; this.maxLife = this.life;
    this.size = size || Math.random() * 4 + 1;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.2; this.vx*=0.97; this.life-=0.022; }
  draw(){
    if (this.life <= 0) return;
    const alpha = Math.pow(this.life / this.maxLife, 0.6);
    ctx.save();
    ctx.globalAlpha = alpha * 0.9;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 7;
    ctx.beginPath();
    ctx.arc(this.x - cam.x, this.y - cam.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  isDead(){ return this.life <= 0; }
}

let particles = [];
function burst(x, y, color, count, strength){
  strength = strength || 1;
  for (let i = 0; i < count; i++){
    particles.push(new Particle(x, y, color,
      (Math.random()-0.5)*9*strength, (Math.random()-0.5)*9*strength-3*strength));
  }
}

// ─── KAMERA ───────────────────────────────────────────────
const cam = { x: 0, y: 0, tx: 0, ty: 0 };
function updateCamera(){
  cam.x += (cam.tx - cam.x) * 0.13;
  cam.y += (cam.ty - cam.y) * 0.13;
  if (!currentLevel) return;
  cam.x = Math.max(0, Math.min(cam.x, currentLevel.worldW - canvas.width));
  cam.y = Math.max(-180, Math.min(cam.y, currentLevel.worldH - canvas.height + 200));
}

function addShake(v){ shakeAmount = Math.max(shakeAmount, v); }
function addFlash(c, v){ flashColor = c; flashAmount = Math.max(flashAmount, v); }

function overlap(a, b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ─── PLATFORM ─────────────────────────────────────────────
class Platform {
  constructor(x,y,w,h,color){ this.x=x; this.y=y; this.w=w; this.h=h; this.color=color; }
  isSolid(){ return this.color===-1 || this.color!==activeColor; }
  draw(){
    const sx=this.x-cam.x, sy=this.y-cam.y;
    const erased = this.color!==-1 && this.color===activeColor;
    const hex = this.color===-1 ? C_NEUTRAL : COLORS[this.color];
    ctx.save();
    if (erased) ctx.globalAlpha = 0.1;
    ctx.shadowColor = hex; ctx.shadowBlur = erased ? 0 : 18;
    const gr = ctx.createLinearGradient(sx,sy,sx,sy+this.h);
    gr.addColorStop(0, hex); gr.addColorStop(1, hex+'77');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h,5); ctx.fill();
    if (!erased){
      ctx.globalAlpha = 0.35; ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(sx+4,sy+2,this.w-8,4);
    }
    ctx.restore();
  }
}

// ─── TIKAN ────────────────────────────────────────────────
class Spike {
  constructor(x,y,w,color){ this.x=x; this.y=y; this.w=w||28; this.h=20; this.color=color; }
  isSolid(){ return this.color===-1 || this.color!==activeColor; }
  check(){
    if (!this.isSolid()) return;
    if (player.alive && overlap(player.getRect(), {x:this.x,y:this.y,w:this.w,h:this.h}))
      player.kill();
  }
  draw(){
    const sx=this.x-cam.x, sy=this.y-cam.y;
    const hex = this.color===-1 ? C_NEUTRAL : COLORS[this.color];
    const erased = this.color!==-1 && this.color===activeColor;
    ctx.save();
    if (erased) ctx.globalAlpha = 0.1;
    ctx.fillStyle = hex; ctx.shadowColor = hex; ctx.shadowBlur = erased ? 0 : 10;
    const n = Math.max(1, Math.floor(this.w/16)), sw = this.w/n;
    for (let i=0; i<n; i++){
      ctx.beginPath();
      ctx.moveTo(sx+i*sw, sy+this.h); ctx.lineTo(sx+i*sw+sw/2, sy); ctx.lineTo(sx+(i+1)*sw, sy+this.h);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

// ─── OLMOS ────────────────────────────────────────────────
class Gem {
  constructor(x,y,color){
    this.x=x; this.y=y; this.w=20; this.h=20; this.color=color;
    this.t = Math.random()*Math.PI*2; this.taken=false;
  }
  update(){
    this.t += 0.04;
    if (!this.taken && player.alive){
      const fy = this.y - Math.sin(this.t)*7;
      if (overlap(player.getRect(), {x:this.x,y:fy,w:this.w,h:this.h})){
        this.taken = true; score += 50;
        burst(this.x+10, this.y+10, this.color<0?'#ffdd00':COLORS[this.color], 8);
        playSFX('gem');
      }
    }
  }
  draw(){
    if (this.taken) return;
    const sx=this.x-cam.x, sy=this.y-cam.y-Math.sin(this.t)*7;
    const hex = this.color<0 ? '#ffdd00' : COLORS[this.color];
    ctx.save();
    ctx.shadowColor=hex; ctx.shadowBlur=16; ctx.fillStyle=hex;
    ctx.beginPath(); ctx.moveTo(sx+10,sy); ctx.lineTo(sx+20,sy+10); ctx.lineTo(sx+10,sy+20); ctx.lineTo(sx,sy+10); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=0.5; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.moveTo(sx+10,sy+2); ctx.lineTo(sx+18,sy+10); ctx.lineTo(sx+10,sy+10); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// ─── PORTAL ───────────────────────────────────────────────
class Portal {
  constructor(x,y){ this.x=x; this.y=y; this.w=42; this.h=60; this.t=0; this.used=false; }
  update(){
    this.t += 0.04;
    if (!this.used && player.alive && overlap(player.getRect(), this)){
      this.used = true; goNextLevel();
    }
  }
  draw(){
    const sx=this.x-cam.x+21, sy=this.y-cam.y+30;
    ctx.save();
    const og = ctx.createRadialGradient(sx,sy,0,sx,sy,55);
    og.addColorStop(0,'rgba(200,80,255,0.35)'); og.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.ellipse(sx,sy,55,60,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#cc55ff'; ctx.lineWidth=3+Math.sin(this.t); ctx.shadowColor='#cc55ff'; ctx.shadowBlur=28;
    ctx.beginPath(); ctx.ellipse(sx,sy,20+Math.sin(this.t)*3,29+Math.cos(this.t)*4,0,0,Math.PI*2); ctx.stroke();
    const ig = ctx.createRadialGradient(sx,sy,0,sx,sy,19);
    ig.addColorStop(0,'rgba(230,140,255,0.85)'); ig.addColorStop(1,'rgba(100,20,200,0.3)');
    ctx.fillStyle=ig; ctx.beginPath(); ctx.ellipse(sx,sy,19,28,0,0,Math.PI*2); ctx.fill();
    for (let i=0; i<3; i++){
      const a = this.t*2 + i*Math.PI*2/3;
      ctx.fillStyle='#ff88ff'; ctx.shadowBlur=9;
      ctx.beginPath(); ctx.arc(sx+Math.cos(a)*29, sy+Math.sin(a)*35, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0; ctx.font='bold 18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff'; ctx.fillText('⭐',sx,sy);
    ctx.restore();
  }
}

// ─── DUSHMAN ──────────────────────────────────────────────
class Enemy {
  constructor(x,y,left,right,color){
    this.x=x; this.y=y; this.w=30; this.h=30; this.vx=0.9;
    this.left=left; this.right=right; this.color=color; this.alive=true; this.t=0;
  }
  update(){
    if (!this.alive) return;
    this.t += 0.1; this.x += this.vx;
    if (this.x <= this.left || this.x+this.w >= this.right) this.vx *= -1;
    if (!player.alive || player.invincible > 0) return;
    if (overlap(player.getRect(), {x:this.x,y:this.y,w:this.w,h:this.h})){
      if (player.vy > 1 && player.y+player.h < this.y+this.h*0.55){
        this.alive = false; player.vy = JUMP_FORCE*0.65;
        score += 100; addShake(8);
        burst(this.x+15, this.y+15, this.color>=0?COLORS[this.color]:'#ff8833', 14);
        playSFX('stomp');
      } else { player.kill(); }
    }
  }
  draw(){
    if (!this.alive) return;
    const sx=this.x-cam.x, sy=this.y-cam.y+Math.sin(this.t)*2.5;
    const col = this.color>=0 ? COLORS[this.color] : '#ff8833';
    ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=14; ctx.fillStyle=col;
    ctx.beginPath(); ctx.roundRect(sx,sy,this.w,this.h-Math.abs(Math.sin(this.t))*2,7); ctx.fill();
    ctx.fillStyle='#111'; ctx.shadowBlur=0;
    [-1,1].forEach(s=>{ ctx.beginPath(); ctx.arc(sx+15+s*8,sy+11,4,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle='#f00';
    [-1,1].forEach(s=>{ ctx.beginPath(); ctx.arc(sx+15+s*8,sy+11,2,0,Math.PI*2); ctx.fill(); });
    ctx.strokeStyle='#111'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx+5,sy+5); ctx.lineTo(sx+11,sy+8);
    ctx.moveTo(sx+25,sy+5); ctx.lineTo(sx+19,sy+8); ctx.stroke();
    ctx.restore();
  }
}

// ─── PLAYER ───────────────────────────────────────────────
const player = {
  x:100, y:100, vx:0, vy:0, w:PL_W, h:PL_H,
  grounded:false, alive:true, dying:false, invincible:0,
  jumped:false, faceDir:1,
  scaleX:1, scaleY:1, targetSX:1, targetSY:1,

  getRect(){ return {x:this.x, y:this.y, w:this.w, h:this.h}; },

  reset(startX, startY){
    this.x=startX; this.y=startY; this.vx=0; this.vy=0;
    this.grounded=false; this.alive=true; this.dying=false;
    this.invincible=100; this.jumped=false;
    this.scaleX=1; this.scaleY=1; this.targetSX=1; this.targetSY=1;
  },

  update(){
    if (!this.alive) return;
    if (this.invincible > 0) this.invincible--;

    // Squash & stretch
    this.scaleX += (this.targetSX - this.scaleX) * 0.28;
    this.scaleY += (this.targetSY - this.scaleY) * 0.28;
    this.targetSX += (1 - this.targetSX) * 0.18;
    this.targetSY += (1 - this.targetSY) * 0.18;

    // Harakat
    if (keys.left  || touchState.left)  { this.vx = -MOVE_SPEED; this.faceDir = -1; }
    else if (keys.right || touchState.right) { this.vx =  MOVE_SPEED; this.faceDir =  1; }
    else this.vx *= 0.76;

    this.vy = Math.min(this.vy + GRAVITY, MAX_FALL);

    // X to'qnashuv
    this.x += this.vx;
    for (const p of currentLevel.platforms){
      if (!p.isSolid()) continue;
      if (overlap(this.getRect(), p)){
        if (this.vx > 0) this.x = p.x - this.w;
        else             this.x = p.x + p.w;
        this.vx = 0;
      }
    }

    // Y to'qnashuv
    const wasGrounded = this.grounded;
    this.grounded = false;
    this.y += this.vy;
    for (const p of currentLevel.platforms){
      if (!p.isSolid()) continue;
      if (overlap(this.getRect(), p)){
        if (this.vy >= 0){
          this.y = p.y - this.h;
          if (this.vy > 4){ addShake(5); this.targetSX=1.5; this.targetSY=0.55; playSFX('land'); }
          this.vy = 0; this.grounded = true;
        } else {
          this.y = p.y + p.h; this.vy = 0;
        }
      }
    }

    if (this.grounded && !wasGrounded) this.jumped = false;
    this.x = Math.max(0, this.x);

    // Progress tracking
    if (this.x > maxReachedX) maxReachedX = this.x;

    // Qulab ketish
    if (this.y > currentLevel.worldH + 400) this.kill();

    // Chang zarralari
    if (this.grounded && (keys.left||touchState.left||keys.right||touchState.right) && frameCount%8===0)
      particles.push(new Particle(this.x+13, this.y+this.h, COLORS[activeColor], 0,-1, 0.4, 1.5));

    cam.tx = this.x - canvas.width/2  + this.w/2;
    cam.ty = this.y - canvas.height*0.44;
  },

  jump(){
    if (this.jumped || !this.grounded) return;
    this.vy = JUMP_FORCE; this.jumped = true; this.grounded = false;
    this.targetSX = 0.7; this.targetSY = 1.45;
    playSFX('jump');
    burst(this.x+13, this.y+this.h, COLORS[activeColor], 9, 0.7);
  },

  kill(){
    if (this.dying || this.invincible > 0) return;
    this.dying = true; this.alive = false;
    addShake(18); addFlash('#ff1144', 0.55);
    burst(this.x+13, this.y+17, '#ff3355', 25);
    burst(this.x+13, this.y+17, '#fff', 10);
    playSFX('die');
    lives--;
    setTimeout(() => {
      if (lives <= 0) state = 'over';
      else { loadLevel(levelIndex); state = 'playing'; }
    }, 1400);
  },

  draw(){
    if (!this.alive) return;
    if (this.invincible > 0 && frameCount%6 < 3) return;
    const dw = this.w * this.scaleX, dh = this.h * this.scaleY;
    const sx = this.x - cam.x + this.w/2 - dw/2;
    const sy = this.y - cam.y + this.h - dh;
    ctx.save();
    // Aura
    ctx.globalAlpha = 0.22; ctx.fillStyle = COLORS[activeColor];
    ctx.beginPath(); ctx.roundRect(sx-6,sy-6,dw+12,dh+12,15); ctx.fill();
    ctx.globalAlpha = 1;
    // Tana
    ctx.shadowColor = COLORS[activeColor]; ctx.shadowBlur = 24;
    const gr = ctx.createLinearGradient(sx,sy,sx,sy+dh);
    gr.addColorStop(0,'#dde2ff'); gr.addColorStop(1,'#7788cc');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.roundRect(sx,sy,dw,dh,8); ctx.fill();
    ctx.strokeStyle = COLORS[activeColor]; ctx.lineWidth = 2.5; ctx.stroke();
    // Ko'z
    const ex = sx + (this.faceDir>0 ? dw*0.65 : dw*0.35), ey = sy + dh*0.3;
    ctx.fillStyle = '#111'; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = COLORS[activeColor];
    ctx.beginPath(); ctx.arc(ex+this.faceDir*1.3,ey,2,0,Math.PI*2); ctx.fill();
    // Sharf
    ctx.fillStyle = COLORS[activeColor]; ctx.globalAlpha = 0.8;
    ctx.fillRect(sx+3, sy+dh*0.55, dw-6, 4);
    ctx.restore();
  }
};

// ─── DARAJA FACTORY ───────────────────────────────────────
function makeLevel1(){
  const Y = 530;
  return {
    name:'1-DARAJA: Salom Dunyo!', worldW:2900, worldH:800,
    startX:60, startY:Y-80, bg1:'#06061e', bg2:'#140824', initColor:0,
    platforms:[

// ─── BOSHQARUV ────────────────────────────────────────────
function loadLevel(index){
  currentLevel = LEVEL_FACTORIES[index]();
  activeColor  = currentLevel.initColor;
  player.reset(currentLevel.startX, currentLevel.startY);
  cam.x=0; cam.y=0; particles=[];
  maxReachedX = currentLevel.startX;
}

function startLevel(index){
  levelIndex = index;
  loadLevel(index);
  state     = 'countdown';
  countdown = 3;
  cdTimer   = 0;
  if (audioCtx && !bgmRunning) startBGM();
}

function startGame(){ score=0; lives=5; startLevel(0); }
function restartLevel(){ lives=5; loadLevel(levelIndex); state='countdown'; countdown=3; cdTimer=0; }

function goNextLevel(){
  score += 500;
  playSFX('portal');
  burst(player.x+13, player.y+17, '#ffdd00', 30);
  addFlash('#ffdd00', 0.5);
  levelIndex++;
  if (levelIndex > unlockedLvl){ unlockedLvl = levelIndex; saveData(); }
  if (levelIndex >= LEVEL_FACTORIES.length){
    if (score > bestScore){ bestScore = score; saveData(); }
    state = 'win';
  } else {
    state = 'complete';
  }
}

function setActiveColor(c){
  if (activeColor === c) return;
  activeColor = c;
  playSFX('color');
  addFlash(COLORS[c], 0.35);
  burst(player.x+13, player.y+17, COLORS[c], 14, 0.75);
}

// ─── TOUCH / INPUT ────────────────────────────────────────
const keys = { left:false, right:false };
const touchState = { left:false, right:false };


function calcBtns(){
  const W = canvas.width, H = canvas.height, P = 12;

  // Menyu
  const mW = Math.min(300, W*0.82), mH = Math.min(58, H*0.075);
  const mX = (W-mW)/2;
  BTNS.menuPlay   = {x:mX,   y:H*0.73,        w:mW, h:mH};
  BTNS.menuLevels = {x:mX,   y:H*0.73+mH+10,  w:mW, h:Math.min(44,H*0.056)};
  BTNS.menuMusic  = {x:W-52, y:H-50,           w:42, h:42};

  // Daraja tanlash
  BTNS.back = {x:10, y:10, w:88, h:36};
  const cW = Math.min(W*0.88, 360), cH = Math.min(H*0.2, 148);
  const cX = (W-cW)/2;
  BTNS.cards = [0,1,2].map(i => ({x:cX, y:H*0.25+i*(cH+12), w:cW, h:cH, idx:i}));

  // Pauza menyu
  const pW = Math.min(260, W*0.72), pH = 52, pX = (W-pW)/2, pY0 = H*0.38;
  BTNS.pResume  = {x:pX, y:pY0,     w:pW, h:pH};
  BTNS.pRestart = {x:pX, y:pY0+64,  w:pW, h:pH};
  BTNS.pMusic   = {x:pX, y:pY0+128, w:pW, h:pH};
  BTNS.pMenu    = {x:pX, y:pY0+192, w:pW, h:pH};

  // HUD pause
  BTNS.pauseBtn = {x:W-52, y:6, w:42, h:38};

  // Kontroller
  const mvW = Math.min(72, W*0.178), mvH = Math.min(72, H*0.1);
  const rY = H - mvH - P;
  BTNS.left  = {x:P,       y:rY, w:mvW, h:mvH};
  BTNS.right = {x:P*2+mvW, y:rY, w:mvW, h:mvH};
  const jW = Math.min(78, W*0.19), jH = Math.min(78, H*0.107);
  BTNS.jump  = {x:W-jW-P, y:H-jH-P, w:jW, h:jH};
  const bW = Math.min(65, W*0.16), bH = Math.min(50, H*0.07);
  const bTot = bW*3+P*2, bSX = (W-bTot)/2, bY2 = rY-bH-8;
  BTNS.colorR = {x:bSX,       y:bY2, w:bW, h:bH};
  BTNS.colorG = {x:bSX+bW+P,  y:bY2, w:bW, h:bH};
  BTNS.colorB = {x:bSX+bW*2+P*2, y:bY2, w:bW, h:bH};
}

function inRect(b, x, y, m){
  if (!b) return false;
  m = (m !== undefined) ? m : 16;
  return x>=b.x-m && x<=b.x+b.w+m && y>=b.y-m && y<=b.y+b.h+m;
}

function getTouchPos(touch){
  const r = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - r.left) * canvas.width  / r.width,
    y: (touch.clientY - r.top)  * canvas.height / r.height
  };
}

canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  if (!audioCtx){ initAudio(); startBGM(); }

  const t0 = e.changedTouches[0];
  const {x, y} = getTouchPos(t0);

  // ─ Menyu
  if (state === 'menu'){
    if (inRect(BTNS.menuPlay,   x, y)){ playSFX('tap'); startGame(); return; }
    if (inRect(BTNS.menuLevels, x, y)){ playSFX('tap'); state='levels'; return; }
    if (inRect(BTNS.menuMusic,  x, y)){ toggleMusic(); playSFX('tap'); return; }
    return;
  }

  // ─ Daraja tanlash
  if (state === 'levels'){
    if (inRect(BTNS.back, x, y, 10)){ playSFX('tap'); state='menu'; return; }
    for (const card of BTNS.cards){
      if (inRect(card, x, y, 8)){
        if (card.idx <= unlockedLvl){ playSFX('tap'); score=0; lives=5; startLevel(card.idx); }
        return;
      }
    }
    return;
  }

  // ─ Pauza menyu
  if (state === 'paused'){
    if (inRect(BTNS.pResume,  x, y)){ playSFX('tap'); state='playing'; return; }
    if (inRect(BTNS.pRestart, x, y)){ playSFX('tap'); restartLevel(); return; }
    if (inRect(BTNS.pMusic,   x, y)){ playSFX('tap'); toggleMusic(); return; }
    if (inRect(BTNS.pMenu,    x, y)){ playSFX('tap'); stopBGM(); state='menu'; return; }
    return;
  }

  // ─ Daraja tugadi / O'yin tugadi / G'alaba
  if (state === 'complete'){ playSFX('tap'); startLevel(levelIndex); return; }
  if (state === 'over')    { playSFX('tap'); state='menu'; return; }
  if (state === 'win')     { playSFX('tap'); state='menu'; return; }

  // ─ O'yinda
  if (state === 'playing'){
    if (inRect(BTNS.pauseBtn, x, y, 6)){ state='paused'; return; }
    for (const t of e.changedTouches){
      const p = getTouchPos(t);
      if (inRect(BTNS.jump,   p.x, p.y)) player.jump();
      if (inRect(BTNS.colorR, p.x, p.y)) setActiveColor(0);
      if (inRect(BTNS.colorG, p.x, p.y)) setActiveColor(1);
      if (inRect(BTNS.colorB, p.x, p.y)) setActiveColor(2);
    }
  }

  refreshMovement(e.touches);
}, {passive:false});

canvas.addEventListener('touchend',  function(e){ e.preventDefault(); refreshMovement(e.touches); }, {passive:false});
canvas.addEventListener('touchmove', function(e){ e.preventDefault(); refreshMovement(e.touches); }, {passive:false});

function refreshMovement(touches){
  touchState.left = false; touchState.right = false;
  for (const t of touches){
    const p = getTouchPos(t);
    if (inRect(BTNS.left,  p.x, p.y)) touchState.left  = true;
    if (inRect(BTNS.right, p.x, p.y)) touchState.right = true;
  }
}

window.addEventListener('keydown', function(e){
  if (!audioCtx){ initAudio(); startBGM(); }
  if (state==='menu')   { startGame(); return; }
  if (state==='levels') { if(e.key==='Escape') state='menu'; return; }
  if (state==='paused') { if(['Escape','p','P'].includes(e.key)) state='playing'; return; }
  if (state==='complete'){ startLevel(levelIndex); return; }
  if (state==='over'||state==='win'){ state='menu'; return; }
  if (state==='playing'){
    if (['Escape','p','P'].includes(e.key)){ state='paused'; return; }
    if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') keys.left  = true;
    if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = true;
    if (['ArrowUp','w','W',' '].includes(e.key)){ e.preventDefault(); player.jump(); }
    if (e.key==='1') setActiveColor(0);
    if (e.key==='2') setActiveColor(1);
    if (e.key==='3') setActiveColor(2);
  }
});
window.addEventListener('keyup', function(e){
  if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') keys.left  = false;
  if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') keys.right = false;
});

// ─── YULDUZLAR ────────────────────────────────────────────
const stars = Array.from({length:120}, () => ({
  fx: Math.random(), fy: Math.random(),
  r:  Math.random()*1.4+0.3,
  sp: Math.random()*0.0003+0.0001,
  t:  Math.random()*Math.PI*2
}));
function drawStars(parallax){
  const W = canvas.width, H = canvas.height;
  for (const s of stars){
    s.t += s.sp * 60;
    const alpha = 0.18 + Math.sin(s.t)*0.18;
    const px = ((s.fx*W) - cam.x*(parallax||0.06) + W*60) % W;
    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(px, s.fy*H, s.r, 0, Math.PI*2); ctx.fill();
  }
}

// ─── UI YORDAMCHI FUNKSIYA ────────────────────────────────
function drawRoundBtn(b, label, color, isActive, fontSize){
  fontSize = fontSize || Math.min(b.h*0.5, 22);
  ctx.save();
  ctx.globalAlpha = isActive ? 1 : 0.72;
  ctx.shadowColor = color; ctx.shadowBlur = isActive ? 24 : 8;
  const gr = ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
  gr.addColorStop(0, isActive ? color+'44' : '#0e0e25');
  gr.addColorStop(1, isActive ? color+'22' : '#07071a');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,14); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = isActive ? 2.5 : 1.5; ctx.stroke();
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
  ctx.font = `bold ${fontSize}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, b.x+b.w/2, b.y+b.h/2);
  ctx.restore();
}

// ─── EKRANLAR ─────────────────────────────────────────────
function drawMenu(){
  menuTimer += 0.016;
  const W = canvas.width, H = canvas.height;

  // Fon
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030318'); bg.addColorStop(0.7,'#08052c'); bg.addColorStop(1,'#0c0320');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  drawStars(0);

  // Uchuvchi sferalar
  const orbData = [[COLORS[0],0.14,0.44],[COLORS[1],0.5,0.28],[COLORS[2],0.86,0.44]];
  for (let i=0; i<orbData.length; i++){
    const [c,fx,fy] = orbData[i];
    const ox = W*fx + Math.cos(menuTimer+i*2.1)*28;
    const oy = H*fy + Math.sin(menuTimer*1.3+i)*20;
    const rg = ctx.createRadialGradient(ox,oy,0,ox,oy,80);
    rg.addColorStop(0, c+'33'); rg.addColorStop(1, c+'00');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(ox,oy,80,0,Math.PI*2); ctx.fill();
  }

  ctx.save();

  // Logo
  const fs = Math.min(W*0.085, 36);
  ctx.font = `bold ${fs}px Arial`;
  const titleStr = "RANGLAR KO'RLIGI";
  const titleW = ctx.measureText(titleStr).width;
  const titleX = W/2 - titleW/2;
  const rainbowCols = [COLORS[0],'#ff9933','#ffee00',COLORS[1],COLORS[2],'#aa44ff'];
  let charX = 0;
  for (let i=0; i<titleStr.length; i++){
    const ci = (i + Math.floor(menuTimer*2)) % rainbowCols.length;
    ctx.fillStyle = rainbowCols[ci]; ctx.shadowColor = rainbowCols[ci]; ctx.shadowBlur = 16;
    const cw = ctx.measureText(titleStr[i]).width;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(titleStr[i], titleX+charX, H*0.17 + Math.sin(menuTimer*2.5+i*0.4)*7);
    charX += cw;
  }

  ctx.shadowBlur = 0;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(180,190,255,0.7)';
  ctx.font = `${Math.min(W*0.036,14.5)}px Arial`;
  ctx.fillText('Color Shift Adventure', W/2, H*0.25);

  if (bestScore > 0){
    ctx.fillStyle = '#ffdd88';
    ctx.font = `bold ${Math.min(W*0.04,16)}px Arial`;
    ctx.fillText(`🏆  Rekord:  ${bestScore}  ⭐`, W/2, H*0.33);
  }

  // Ajratuvchi
  const lineW = Math.min(W*0.5, 200);
  ctx.strokeStyle = 'rgba(100,100,200,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2-lineW/2, H*0.4); ctx.lineTo(W/2+lineW/2, H*0.4); ctx.stroke();

  // PLAY tugmasi
  const pb   = BTNS.menuPlay;
  const pulse = 0.65 + Math.sin(menuTimer*3.8)*0.35;
  ctx.shadowColor = '#33ffaa'; ctx.shadowBlur = 18+pulse*26;
  const pg = ctx.createLinearGradient(pb.x,pb.y,pb.x,pb.y+pb.h);
  pg.addColorStop(0, `rgba(14,75,46,${(0.88+pulse*0.12).toFixed(2)})`);
  pg.addColorStop(1, `rgba(7,40,23,${(0.88+pulse*0.12).toFixed(2)})`);
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.roundRect(pb.x,pb.y,pb.w,pb.h,18); ctx.fill();
  ctx.strokeStyle = `rgba(50,240,140,${(0.7+pulse*0.3).toFixed(2)})`; ctx.lineWidth=2.5; ctx.stroke();
  ctx.shadowBlur = 0; ctx.globalAlpha = 0.9+pulse*0.1; ctx.fillStyle='#fff';
  ctx.font = `bold ${Math.min(pb.h*0.5,24)}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText("▶  O'YNASHNI BOSHLASH", W/2, pb.y+pb.h/2);

  ctx.globalAlpha = 1;
  drawRoundBtn(BTNS.menuLevels, '📋  Darajalar', C_NEUTRAL, false, Math.min(BTNS.menuLevels.h*0.48,20));
  drawRoundBtn(BTNS.menuMusic,  musicOn?'🔊':'🔇',  musicOn?'#55aaff':'#556688', false, 16);

  ctx.globalAlpha = 0.35; ctx.fillStyle='#aabbcc';
  ctx.font = `${Math.min(W*0.026,10.5)}px Arial`;
  ctx.fillText('Teging yoki bosing', W/2, H*0.97);
  ctx.restore();
}

function drawLevelSelect(){
  menuTimer += 0.016;
  const W = canvas.width, H = canvas.height;
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030318'); bg.addColorStop(1,'#07052a');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  drawStars(0);

  drawRoundBtn(BTNS.back, '← Orqaga', C_NEUTRAL, false, Math.min(BTNS.back.h*0.5,16));

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.shadowColor='#aabbff'; ctx.shadowBlur=14;
  ctx.font = `bold ${Math.min(W*0.065,26)}px Arial`;
  ctx.fillText('📋  DARAJALAR', W/2, H*0.135);
  ctx.shadowBlur = 0;

  for (const card of BTNS.cards){
    const info   = LEVEL_INFO[card.idx];
    const locked = card.idx > unlockedLvl;
    const col    = COLORS[card.idx];
    ctx.save();
    const cg = ctx.createLinearGradient(card.x,card.y,card.x,card.y+card.h);
    cg.addColorStop(0, locked ? '#0e0e20' : col+'1a');
    cg.addColorStop(1, locked ? '#080818' : '#050512');
    ctx.fillStyle = cg; ctx.shadowColor = locked?'#333':col; ctx.shadowBlur = locked?0:14;
    ctx.beginPath(); ctx.roundRect(card.x,card.y,card.w,card.h,16); ctx.fill();
    ctx.strokeStyle = locked?'#2a2a44':col; ctx.lineWidth = locked?1:2; ctx.stroke();

    if (!locked){
      ctx.fillStyle = col; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.roundRect(card.x,card.y+8,5,card.h-16,4); ctx.fill();
    }

    ctx.shadowBlur=0; ctx.textAlign='left'; ctx.textBaseline='middle';
    const iconSz = Math.min(card.h*0.52, 42);
    ctx.font = `${iconSz}px Arial`;
    ctx.fillStyle = locked?'#333':col;
    ctx.fillText(info.icon, card.x+18, card.y+card.h/2-6);

    ctx.font = `bold ${Math.min(card.h*0.28,22)}px Arial`;
    ctx.fillStyle = locked?'#444':'#fff';
    ctx.fillText(`${card.idx+1}-DARAJA`, card.x+72, card.y+card.h*0.37);

    ctx.font = `${Math.min(card.h*0.2,15)}px Arial`;
    ctx.fillStyle = locked?'#3a3a55':'#8899bb';
    ctx.fillText(info.sub, card.x+72, card.y+card.h*0.63);

    ctx.textAlign='right';
    if (locked){
      ctx.font = `${Math.min(card.h*0.5,40)}px Arial`;
      ctx.fillStyle='#333444';
      ctx.fillText('🔒', card.x+card.w-16, card.y+card.h/2);
    } else {
      ctx.font = `bold ${Math.min(card.h*0.27,21)}px Arial`;
      ctx.fillStyle = col;
      ctx.fillText("O'YNASH ▶", card.x+card.w-16, card.y+card.h/2);
    }
    ctx.restore();
  }
}

function drawHUD(){
  const W = canvas.width;
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,50);

  ctx.textBaseline='middle';
  ctx.textAlign='left'; ctx.fillStyle='#ff4466';
  ctx.font = `bold ${Math.min(14,W*0.035)}px Arial`;
  ctx.fillText('❤️'.repeat(Math.max(0,lives)), 10, 25);

  ctx.textAlign='center'; ctx.fillStyle='#ffee88';
  ctx.font = `bold ${Math.min(14,W*0.035)}px Arial`;
  ctx.fillText(`⭐ ${score}`, W/2, 25);

  drawRoundBtn(BTNS.pauseBtn, '⏸', C_NEUTRAL, false, Math.min(BTNS.pauseBtn.h*0.5,18));

  ctx.fillStyle=COLORS[activeColor]; ctx.shadowColor=COLORS[activeColor]; ctx.shadowBlur=8;
  ctx.font = `bold ${Math.min(10,W*0.026)}px Arial`;
  ctx.textAlign='left';
  ctx.fillText(`● ${C_NAMES[activeColor].toUpperCase()} O'CHIRILGAN`, 10, 40);
  ctx.shadowBlur=0;

  // Progress bar — maxReachedX ishlatiladi
  const range   = Math.max(1, currentLevel.worldW - canvas.width - currentLevel.startX);
  const progress = Math.min(1, (maxReachedX - currentLevel.startX) / range);
  const bx=W*0.14, bw=W*0.72, by=43.5, bh=5;
  ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(bx,by,bw,bh);
  const barGr = ctx.createLinearGradient(bx,0,bx+bw,0);
  barGr.addColorStop(0, COLORS[0]); barGr.addColorStop(0.5, COLORS[1]); barGr.addColorStop(1, COLORS[2]);
  ctx.fillStyle=barGr; ctx.shadowColor='#fff'; ctx.shadowBlur=4;
  ctx.fillRect(bx, by, bw*progress, bh);
  ctx.shadowBlur=0;
  ctx.font='10px Arial'; ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('🏃', bx-4, by+bh+8);
  ctx.fillText('🚩', bx + bw*progress - 3, by+bh+8);
}

function drawControls(){
  const W=canvas.width, H=canvas.height;
  const barTop = Math.min(BTNS.colorR.y, BTNS.left.y) - 14;
  const bg = ctx.createLinearGradient(0,barTop,0,H);
  bg.addColorStop(0,'rgba(0,0,5,0)'); bg.addColorStop(0.1,'rgba(0,0,15,0.9)'); bg.addColorStop(1,'rgba(0,0,22,0.98)');
  ctx.fillStyle=bg; ctx.fillRect(0,barTop,W,H-barTop);
  ctx.strokeStyle='rgba(80,80,150,0.15)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,barTop+14); ctx.lineTo(W,barTop+14); ctx.stroke();

  const leftActive  = touchState.left  || keys.left;
  const rightActive = touchState.right || keys.right;
  drawRoundBtn(BTNS.left,   '◀', '#4466cc', leftActive);
  drawRoundBtn(BTNS.right,  '▶', '#4466cc', rightActive);
  drawRoundBtn(BTNS.jump,   '▲', '#8855cc', false, Math.min(BTNS.jump.h*0.6,30));
  drawRoundBtn(BTNS.colorR, 'R', COLORS[0], activeColor===0, Math.min(BTNS.colorR.h*0.52,22));
  drawRoundBtn(BTNS.colorG, 'G', COLORS[1], activeColor===1, Math.min(BTNS.colorG.h*0.52,22));
  drawRoundBtn(BTNS.colorB, 'B', COLORS[2], activeColor===2, Math.min(BTNS.colorB.h*0.52,22));

  ctx.fillStyle='rgba(160,160,200,0.45)';
  ctx.font = `${Math.min(9.5,canvas.width*0.024)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText("RANGNI O'CHIR", canvas.width/2, BTNS.colorR.y - 3);
}

function drawCountdown(){
  const W=canvas.width, H=canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const n = Math.ceil(countdown);
  const sc = 1 + (countdown%1)*0.65;
  ctx.font = `bold ${Math.min(W*0.3,120)*sc}px Arial`;
  ctx.fillStyle = n===3?COLORS[0]: n===2?COLORS[1]:COLORS[2];
  ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur=55;
  ctx.fillText(n>0 ? n : 'GO!', W/2, H*0.42);
  ctx.restore();
}

function drawPauseMenu(){
  const W=canvas.width, H=canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(0,0,14,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=COLORS[0]+'15'; ctx.fillRect(0,0,W/2,H);
  ctx.fillStyle=COLORS[2]+'15'; ctx.fillRect(W/2,0,W/2,H);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = `bold ${Math.min(W*0.1,40)}px Arial`;
  ctx.fillStyle='#fff'; ctx.shadowColor=C_NEUTRAL; ctx.shadowBlur=20;
  ctx.fillText('⏸  PAUZA', W/2, H*0.2);
  ctx.shadowBlur=0;

  ctx.font = `${Math.min(W*0.052,20)}px Arial`; ctx.fillStyle='#ffee88';
  ctx.fillText(`⭐ ${score}   ❤️ ${lives}`, W/2, H*0.3);

  const lineW2 = Math.min(W*0.5, 200);
  ctx.strokeStyle='rgba(100,100,200,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-lineW2/2,H*0.34); ctx.lineTo(W/2+lineW2/2,H*0.34); ctx.stroke();

  drawRoundBtn(BTNS.pResume,  '▶  DAVOM ETISH',   '#33ff88', false, Math.min(BTNS.pResume.h*0.5,22));
  drawRoundBtn(BTNS.pRestart, '↺  QAYTA BOSHLASH', '#ffdd22', false, Math.min(BTNS.pRestart.h*0.5,22));
  drawRoundBtn(BTNS.pMusic,   musicOn?'🔊  MUSIQA: YOQIQ':'🔇  MUSIQA: OCHIQ', '#aabbff', false, Math.min(BTNS.pMusic.h*0.48,20));
  drawRoundBtn(BTNS.pMenu,    '🏠  BOSH MENYU',   '#ff7755', false, Math.min(BTNS.pMenu.h*0.5,22));
  ctx.restore();
}

function drawEndScreen(title, subtitle, btnText, titleColor){
  menuTimer += 0.025;
  const W=canvas.width, H=canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
  const eGr = ctx.createLinearGradient(0,0,W,H);
  eGr.addColorStop(0, titleColor+'0e'); eGr.addColorStop(1, titleColor+'1a');
  ctx.fillStyle=eGr; ctx.fillRect(0,0,W,H);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = `bold ${Math.min(W*0.1,42)}px Arial`;
  ctx.fillStyle=titleColor; ctx.shadowColor=titleColor; ctx.shadowBlur=35;
  ctx.fillText(title, W/2, H*0.27 + Math.sin(menuTimer*3)*6);
  ctx.shadowBlur=0;

  ctx.font = `bold ${Math.min(W*0.065,26)}px Arial`; ctx.fillStyle='#fff';
  ctx.fillText(subtitle, W/2, H*0.43);

  if (bestScore > 0){
    ctx.font = `${Math.min(W*0.038,15)}px Arial`; ctx.fillStyle='#ffdd88';
    ctx.fillText(`🏆 Rekord: ${bestScore}`, W/2, H*0.51);
  }

  const pulse = 0.6 + Math.sin(menuTimer*3.8)*0.4;
  const bW = Math.min(260,W*0.7), bH=50, bX=(W-bW)/2, bY=H*0.63;
  ctx.shadowColor='#44ffbb'; ctx.shadowBlur=14+pulse*18;
  ctx.fillStyle=`rgba(14,60,40,${(0.82+pulse*0.18).toFixed(2)})`;
  ctx.beginPath(); ctx.roundRect(bX,bY,bW,bH,14); ctx.fill();
  ctx.strokeStyle=`rgba(55,235,145,${(0.65+pulse*0.35).toFixed(2)})`; ctx.lineWidth=2.5; ctx.stroke();
  ctx.shadowBlur=0; ctx.globalAlpha=0.88+pulse*0.12; ctx.fillStyle='#fff';
  ctx.font = `bold ${Math.min(bH*0.5,21)}px Arial`;
  ctx.fillText(btnText, W/2, bY+bH/2);
  ctx.restore();
}

// ─── YANGILASH ────────────────────────────────────────────
function update(){
  frameCount++;

  if (state === 'countdown'){
    cdTimer++;
    if (cdTimer % 55 === 0){
      countdown--;
      if (countdown > 0) playSFX('countdown');
      else { playSFX('go'); state='playing'; countdown=0; }
    }
    return;
  }

  if (state === 'playing'){
    player.update();
    updateCamera();
    for (const e of currentLevel.enemies) e.update();
    for (const s of currentLevel.spikes)  s.check();
    for (const g of currentLevel.gems)    g.update();
    currentLevel.portal.update();
  }

  particles = particles.filter(p => { p.update(); return !p.isDead(); });

  if ((state==='win'||state==='complete') && frameCount%2===0){
    const confCols = [COLORS[0],COLORS[1],COLORS[2],'#ffdd00','#fff'];
    const c = confCols[Math.floor(Math.random()*confCols.length)];
    particles.push(new Particle(
      Math.random()*canvas.width+cam.x, Math.random()*canvas.height*0.65+cam.y, c,
      (Math.random()-0.5)*7, -Math.random()*7, 2, 5
    ));
  }

  if (shakeAmount > 0){ shakeAmount *= 0.78; if (shakeAmount < 0.3) shakeAmount=0; }
  if (flashAmount > 0){ flashAmount *= 0.82; if (flashAmount < 0.01) flashAmount=0; }
}

// ─── TASVIR ───────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (state === 'menu')   { drawMenu();        return; }
  if (state === 'levels') { drawLevelSelect(); return; }

  // O'yin sahnasi
  ctx.save();
  if (shakeAmount > 0)
    ctx.translate((Math.random()-0.5)*shakeAmount*2, (Math.random()-0.5)*shakeAmount*2);

  const bgGr = ctx.createLinearGradient(0,0,0,canvas.height);
  bgGr.addColorStop(0, currentLevel.bg1); bgGr.addColorStop(1, currentLevel.bg2);
  ctx.fillStyle=bgGr; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawStars(0.07);

  for (const p of currentLevel.platforms) p.draw();
  for (const s of currentLevel.spikes)    s.draw();
  for (const g of currentLevel.gems)      g.draw();
  currentLevel.portal.draw();
  for (const e of currentLevel.enemies)   e.draw();
  player.draw();
  for (const p of particles) p.draw();

  if (flashAmount > 0){
    ctx.globalAlpha = flashAmount * 0.3;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // HUD va kontroller — faqat o'yinda
  if (state==='playing' || state==='countdown'){
    drawHUD(); drawControls();
    if (state==='countdown') drawCountdown();
  }

  // Pauza — HUD ko'rsatiladi, kontroller yo'q
  if (state==='paused'){
    drawHUD(); drawPauseMenu();
  }

  // Yakuniy ekranlar
  if (state==='complete') drawEndScreen('🎉 DARAJA TUGADI!', `Natija: ⭐ ${score}`, '▶  KEYINGI DARAJA', '#ffdd00');
  if (state==='over')     drawEndScreen("💔 O'YIN TUGADI",   `Natija: ⭐ ${score}`, '🏠  BOSH MENYU', '#ff3355');
  if (state==='win')      drawEndScreen("🏆 G'OLIB! 🏆",     `Umumiy natija: ⭐ ${score}`, '🏠  BOSH MENYU', '#ffdd00');
}

// ─── ASOSIY SIKL ──────────────────────────────────────────
function loop(){ update(); render(); requestAnimationFrame(loop); }

// ─── ISHGA TUSHIRISH ──────────────────────────────────────
loadLevel(0);
state = 'menu';
calcBtns();
loop();
</script>
