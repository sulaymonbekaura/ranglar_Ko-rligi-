const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r||0,w/2,h/2);this.beginPath();
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();return this;
  };
}

// ─── KONSTANTLAR ────────────────────────────────────────────
const GRAV=0.47,JUMP=-13.2,SPD=3.6,MAXV=16;
const PW=26,PH=34;
const CHEX=['#ff3355','#33ff88','#3388ff'];
const CNAME=["Qizil","Yashil","Ko'k"];
const NEU='#8899cc';

// ─── HOLAT ──────────────────────────────────────────────────
// States: menu | levelSelect | countdown | playing | paused | levelComplete | over | win
let gameState='menu';
let levelIdx=0,score=0,lives=5,activeC=0,frame=0;
let countDown=3,countTimer=0;

// ─── SAQLASH ────────────────────────────────────────────────
let bestScore   =parseInt(localStorage.getItem('rk_best')||'0');
let unlockedLvl =parseInt(localStorage.getItem('rk_unlocked')||'0'); // 0=1ta ochiq
let musicOn     =localStorage.getItem('rk_music')!=='false';

function saveProg(){
  localStorage.setItem('rk_best',bestScore);
  localStorage.setItem('rk_unlocked',unlockedLvl);
  localStorage.setItem('rk_music',musicOn);

// ─── AUDIO ──────────────────────────────────────────────────
let ac,bgmGain,bgmRunning=false,bgmTimer=null;
function initAudio(){
  if(ac)return;
  ac=new(window.AudioContext||window.webkitAudioContext)();
  bgmGain=ac.createGain();
  bgmGain.gain.value=musicOn?.055:0;
  bgmGain.connect(ac.destination);
}
function beep(f,t,d,v,delay){
  if(!ac)return;
  const w=ac.currentTime+(delay||0);
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,w);
  g.gain.exponentialRampToValueAtTime(0.0001,w+d);
  o.start(w);o.stop(w+d+.02);
}
function snd(type){
  if(!ac)return;
  switch(type){
    case'jump':   beep(260,'square',.08,.08);beep(420,'square',.07,.06,.06);break;
    case'land':   beep(110,'square',.05,.06);break;
    case'die':    beep(360,'sawtooth',.1,.09);beep(180,'sawtooth',.25,.08,.12);beep(90,'sawtooth',.4,.07,.27);break;
    case'collect':beep(700,'sine',.08,.07);beep(1050,'sine',.1,.05,.08);break;
    case'stomp':  beep(270,'square',.05,.1);beep(85,'sine',.18,.08,.05);break;
    case'color':  beep([500,640,780][activeC],'sine',.12,.07);break;
    case'portal': [523,659,784,1047].forEach((f,i)=>beep(f,'square',.14,.07,i*.12));break;
    case'count':  beep(660,'sine',.15,.1);break;
    case'go':     beep(880,'square',.06,.1);beep(1100,'square',.1,.08,.08);break;
    case'tap':    beep(800,'sine',.06,.05);break;
  }
}

// BGM
const BGM=[[392,196,1],[330,196,1],[392,196,1],[440,196,1],[392,175,1],[330,175,1],[262,175,1],[294,175,1],[330,196,1],[294,196,1],[330,196,1],[392,196,1],[330,175,1],[262,175,1],[196,175,2],[392,196,1],[523,196,1],[440,196,1],[392,196,1],[330,175,1],[392,175,1],[440,175,1],[523,175,1],[440,196,1],[392,196,1],[330,196,1],[294,196,1],[262,131,2],[294,131,1],[330,131,1]];
const BGM_S=0.175;
function bgmNote(f,d,w,t,v){
  if(!ac||!bgmGain)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(bgmGain);
  o.type=t||'square';o.frequency.value=f;
  g.gain.setValueAtTime(v||.4,w);
  g.gain.setValueAtTime(v||.4,w+d*.75);
  g.gain.exponentialRampToValueAtTime(.0001,w+d*.95);
  o.start(w);o.stop(w+d+.02);
}
function startBGM(){
  if(!ac||bgmRunning)return;
  bgmRunning=true;
  if(bgmGain)bgmGain.gain.setTargetAtTime(musicOn?.055:0,ac.currentTime,.3);
  const tot=BGM.reduce((s,[,,d])=>s+d*BGM_S,0);
  function sch(){
    if(!bgmRunning)return;
    let t=ac.currentTime+.05;
    for(const[m,b,steps]of BGM){
      const d=steps*BGM_S;
      bgmNote(m,d*.82,t,'square',.38);
      bgmNote(b,d*.88,t,'triangle',.26);
      t+=d;
    }
    bgmTimer=setTimeout(sch,(tot-.15)*1000);
  }
  sch();
}
function stopBGM(){
  bgmRunning=false;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}
}
function toggleMusic(){
  musicOn=!musicOn;
  if(bgmGain&&ac)bgmGain.gain.setTargetAtTime(musicOn?.055:0,ac.currentTime,.3);
  saveProg();
}

// ─── ZARRALAR ───────────────────────────────────────────────
class Particle{
  constructor(x,y,col,vx,vy,life,sz){
    this.x=x;this.y=y;this.col=col;
    this.vx=vx!=null?vx:(Math.random()-.5)*9;
    this.vy=vy!=null?vy:(Math.random()-.5)*9-2;
    this.life=life||1;this.ml=this.life;this.sz=sz||Math.random()*4+1;
  }
  upd(){this.x+=this.vx;this.y+=this.vy;this.vy+=.2;this.vx*=.97;this.life-=.022;}
  draw(){
    if(this.life<=0)return;
    const a=Math.pow(this.life/this.ml,.6);
    ctx.save();ctx.globalAlpha=a*.9;
    ctx.fillStyle=this.col;ctx.shadowColor=this.col;ctx.shadowBlur=7;
    ctx.beginPath();ctx.arc(this.x-cam.x,this.y-cam.y,this.sz*a,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  dead(){return this.life<=0;}
}
let parts=[];
function burst(x,y,col,n,str){
  str=str||1;
  for(let i=0;i<n;i++)parts.push(new Particle(x,y,col,(Math.random()-.5)*9*str,(Math.random()-.5)*9*str-3*str));
}
let menuParts=[];
function spawnMenuParts(){
  const cols=[CHEX[0],CHEX[1],CHEX[2],'#ffdd00','#fff'];
  const W=canvas.width,H=canvas.height;
  menuParts.push(new Particle(Math.random()*W,H+10,cols[Math.random()*cols.length|0],
    (Math.random()-.5)*1.5,-Math.random()*1.5-1,3+Math.random()*2,Math.random()*3+1));
}

// ─── KAMERA ─────────────────────────────────────────────────
const cam={x:0,y:0,tx:0,ty:0};
function updateCam(){
  cam.x+=(cam.tx-cam.x)*.13;cam.y+=(cam.ty-cam.y)*.13;
  const lv=currentLevel;
  cam.x=Math.max(0,Math.min(cam.x,lv.worldW-canvas.width));
  cam.y=Math.max(-180,Math.min(cam.y,lv.worldH-canvas.height+200));
}
function addShake(v){shakeAmt=Math.max(shakeAmt,v);}
function addFlash(c,v){flashCol=c;flashAmt=Math.max(flashAmt,v);}
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ─── PLATFORMA ──────────────────────────────────────────────
class Platform{
  constructor(x,y,w,h,col){this.x=x;this.y=y;this.w=w;this.h=h;this.col=col;}
  solid(){return this.col===-1||this.col!==activeC;}
  draw(){
    const sx=this.x-cam.x,sy=this.y-cam.y;
    const er=this.col!==-1&&this.col===activeC;
    const hex=this.col===-1?NEU:CHEX[this.col];
    ctx.save();if(er)ctx.globalAlpha=.1;
    ctx.shadowColor=hex;ctx.shadowBlur=er?0:18;
    const gr=ctx.createLinearGradient(sx,sy,sx,sy+this.h);
    gr.addColorStop(0,hex);gr.addColorStop(1,hex+'77');
    ctx.fillStyle=gr;ctx.beginPath();ctx.roundRect(sx,sy,this.w,this.h,5);ctx.fill();
    if(!er){ctx.globalAlpha=.35;ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(sx+4,sy+2,this.w-8,4);}
    ctx.restore();
  }
}

// ─── TIKAN ──────────────────────────────────────────────────
class Spike{
  constructor(x,y,w,col){this.x=x;this.y=y;this.w=w||28;this.h=20;this.col=col;}
  solid(){return this.col===-1||this.col!==activeC;}
  check(){if(!this.solid())return;if(player.alive&&ov(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h}))player.kill();}
  draw(){
    const sx=this.x-cam.x,sy=this.y-cam.y,hex=this.col===-1?NEU:CHEX[this.col];
    const er=this.col!==-1&&this.col===activeC;
    ctx.save();if(er)ctx.globalAlpha=.1;
    ctx.fillStyle=hex;ctx.shadowColor=hex;ctx.shadowBlur=er?0:10;
    const n=Math.max(1,Math.floor(this.w/16)),sw=this.w/n;
    for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(sx+i*sw,sy+this.h);ctx.lineTo(sx+i*sw+sw/2,sy);ctx.lineTo(sx+(i+1)*sw,sy+this.h);ctx.closePath();ctx.fill();}
    ctx.restore();
  }
}

// ─── OLMOS ──────────────────────────────────────────────────
class Gem{
  constructor(x,y,col){this.x=x;this.y=y;this.w=20;this.h=20;this.col=col;this.t=Math.random()*Math.PI*2;this.taken=false;}
  upd(){
    this.t+=.04;
    if(!this.taken&&player.alive){
      const fy=this.y-Math.sin(this.t)*7;
      if(ov(player.rect(),{x:this.x,y:fy,w:this.w,h:this.h})){this.taken=true;score+=50;burst(this.x+10,this.y+10,this.col===-1?'#ffdd00':CHEX[this.col],8);snd('collect');}
    }
  }
  draw(){
    if(this.taken)return;
    const sx=this.x-cam.x,sy=this.y-cam.y-Math.sin(this.t)*7;
    const hex=this.col===-1?'#ffdd00':CHEX[this.col];
    ctx.save();ctx.shadowColor=hex;ctx.shadowBlur=16;ctx.fillStyle=hex;
    ctx.beginPath();ctx.moveTo(sx+10,sy);ctx.lineTo(sx+20,sy+10);ctx.lineTo(sx+10,sy+20);ctx.lineTo(sx,sy+10);ctx.closePath();ctx.fill();
    ctx.globalAlpha=.5;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(sx+10,sy+2);ctx.lineTo(sx+18,sy+10);ctx.lineTo(sx+10,sy+10);ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

// ─── PORTAL ─────────────────────────────────────────────────
class Portal{
  constructor(x,y){this.x=x;this.y=y;this.w=42;this.h=60;this.t=0;this.done=false;}
  upd(){this.t+=.04;if(!this.done&&player.alive&&ov(player.rect(),this)){this.done=true;nextLevel();}}
  draw(){
    const sx=this.x-cam.x+21,sy=this.y-cam.y+30;
    ctx.save();
    const og=ctx.createRadialGradient(sx,sy,0,sx,sy,55);
    og.addColorStop(0,'rgba(200,80,255,.35)');og.addColorStop(1,'rgba(180,60,255,0)');
    ctx.fillStyle=og;ctx.beginPath();ctx.ellipse(sx,sy,55,60,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#cc55ff';ctx.lineWidth=3+Math.sin(this.t);ctx.shadowColor='#cc55ff';ctx.shadowBlur=28;
    ctx.beginPath();ctx.ellipse(sx,sy,20+Math.sin(this.t)*3,29+Math.cos(this.t)*4,0,0,Math.PI*2);ctx.stroke();
    const ig=ctx.createRadialGradient(sx,sy,0,sx,sy,19);
    ig.addColorStop(0,'rgba(230,140,255,.85)');ig.addColorStop(1,'rgba(100,20,200,.3)');
    ctx.fillStyle=ig;ctx.beginPath();ctx.ellipse(sx,sy,19,28,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<3;i++){const a=this.t*2+i*Math.PI*2/3;ctx.fillStyle='#ff88ff';ctx.shadowBlur=9;ctx.beginPath();ctx.arc(sx+Math.cos(a)*29,sy+Math.sin(a)*35,4,0,Math.PI*2);ctx.fill();}
    ctx.shadowBlur=0;ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.fillText('⭐',sx,sy);
    ctx.restore();
  }
}

// ─── DUSHMAN ────────────────────────────────────────────────
class Enemy{
  constructor(x,y,pl,pr,col){this.x=x;this.y=y;this.w=30;this.h=30;this.vx=.9;this.pl=pl;this.pr=pr;this.col=col;this.alive=true;this.t=0;}
  upd(){
    if(!this.alive)return;
    this.t+=.1;this.x+=this.vx;
    if(this.x<=this.pl||this.x+this.w>=this.pr)this.vx*=-1;
    if(!player.alive||player.inv>0)return;
    if(ov(player.rect(),{x:this.x,y:this.y,w:this.w,h:this.h})){
      if(player.vy>1&&player.y+player.h<this.y+this.h*.55){
        this.alive=false;player.vy=JUMP*.65;score+=100;addShake(8);
        burst(this.x+15,this.y+15,this.col>=0?CHEX[this.col]:'#ff8833',15);snd('stomp');
      }else{player.kill();}
    }
  }
  draw(){
    if(!this.alive)return;
    const sx=this.x-cam.x,sy=this.y-cam.y+Math.sin(this.t)*2.5;
    const ec=this.col>=0?CHEX[this.col]:'#ff8833';
    ctx.save();ctx.shadowColor=ec;ctx.shadowBlur=15;ctx.fillStyle=ec;
    ctx.beginPath();ctx.roundRect(sx,sy,this.w,this.h-Math.abs(Math.sin(this.t))*2,7);ctx.fill();
    ctx.fillStyle='#111';ctx.shadowBlur=0;
    [-1,1].forEach(s=>{ctx.beginPath();ctx.arc(sx+15+s*8,sy+11,4,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#f00';[-1,1].forEach(s=>{ctx.beginPath();ctx.arc(sx+15+s*8,sy+11,2,0,Math.PI*2);ctx.fill();});
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx+5,sy+5);ctx.lineTo(sx+11,sy+8);ctx.moveTo(sx+25,sy+5);ctx.lineTo(sx+19,sy+8);ctx.stroke();
    ctx.restore();
  }
}

// ─── PLAYER ─────────────────────────────────────────────────
const player={
  x:100,y:100,vx:0,vy:0,w:PW,h:PH,
  grounded:false,alive:true,dying:false,inv:0,jumped:false,face:1,
  sx:1,sy:1,tsx:1,tsy:1,
  rect(){return{x:this.x,y:this.y,w:this.w,h:this.h};},
  reset(rx,ry){
    this.x=rx;this.y=ry;this.vx=0;this.vy=0;
    this.grounded=false;this.alive=true;this.dying=false;
    this.inv=100;this.jumped=false;this.sx=1;this.sy=1;this.tsx=1;this.tsy=1;
  },
  upd(){
    if(!this.alive)return;
    if(this.inv>0)this.inv--;
    this.sx+=(this.tsx-this.sx)*.28;this.sy+=(this.tsy-this.sy)*.28;
    this.tsx+=(1-this.tsx)*.18;this.tsy+=(1-this.tsy)*.18;
    if(keys.left||touch.left){this.vx=-SPD;this.face=-1;}
    else if(keys.right||touch.right){this.vx=SPD;this.face=1;}
    else this.vx*=.76;
    this.vy=Math.min(this.vy+GRAV,MAXV);
    this.x+=this.vx;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(ov(this.rect(),p)){if(this.vx>0)this.x=p.x-this.w;else this.x=p.x+p.w;this.vx=0;}
    }
    const wasG=this.grounded;this.grounded=false;
    this.y+=this.vy;
    for(const p of currentLevel.plats){
      if(!p.solid())continue;
      if(ov(this.rect(),p)){
        if(this.vy>=0){this.y=p.y-this.h;if(this.vy>4){addShake(5);this.tsx=1.5;this.tsy=0.55;snd('land');}this.vy=0;this.grounded=true;}
        else{this.y=p.y+p.h;this.vy=0;}
      }
    }
    if(this.grounded&&!wasG)this.jumped=false;
    this.x=Math.max(0,this.x);
    // Progress tracking — faqat oldinga!
    if(this.x>maxReachedX)maxReachedX=this.x;
    if(this.y>currentLevel.worldH+400)this.kill();
    if(this.grounded&&(keys.left||touch.left||keys.right||touch.right)&&frame%8===0)
      parts.push(new Particle(this.x+13,this.y+this.h,CHEX[activeC],0,-1,.4,1.5));
    cam.tx=this.x-canvas.width/2+this.w/2;
    cam.ty=this.y-canvas.height*.44;
  },
  jump(){
    if(this.jumped||!this.grounded)return;
    this.vy=JUMP;this.jumped=true;this.grounded=false;
    this.tsx=.7;this.tsy=1.45;snd('jump');burst(this.x+13,this.y+this.h,CHEX[activeC],9,.7);
  },
  kill(){
    if(this.dying||this.inv>0)return;
    this.dying=true;this.alive=false;
    addShake(18);addFlash('#ff1144',.55);
    burst(this.x+13,this.y+17,'#ff3355',25);burst(this.x+13,this.y+17,'#fff',10);
    snd('die');lives--;
    setTimeout(()=>{if(lives<=0)gameState='over';else{loadLevel(levelIdx);gameState='playing';}},1400);
  },
  draw(){
    if(!this.alive)return;
    if(this.inv>0&&frame%6<3)return;
    const dw=this.w*this.sx,dh=this.h*this.sy;
    const sx=this.x-cam.x+this.w/2-dw/2,sy=this.y-cam.y+this.h-dh;
    ctx.save();
    ctx.globalAlpha=.22;ctx.fillStyle=CHEX[activeC];
    ctx.beginPath();ctx.roundRect(sx-6,sy-6,dw+12,dh+12,15);ctx.fill();ctx.globalAlpha=1;
    ctx.shadowColor=CHEX[activeC];ctx.shadowBlur=24;
    const gr=ctx.createLinearGradient(sx,sy,sx,sy+dh);
    gr.addColorStop(0,'#dde2ff');gr.addColorStop(1,'#7788cc');
    ctx.fillStyle=gr;ctx.beginPath();ctx.roundRect(sx,sy,dw,dh,8);ctx.fill();
    ctx.strokeStyle=CHEX[activeC];ctx.lineWidth=2.5;ctx.stroke();
    const ex=sx+(this.face>0?dw*.65:dw*.35),ey=sy+dh*.3;
    ctx.fillStyle='#111';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=CHEX[activeC];ctx.beginPath();ctx.arc(ex+this.face*1.3,ey,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=CHEX[activeC];ctx.globalAlpha=.8;ctx.fillRect(sx+3,sy+dh*.55,dw-6,4);
    ctx.restore();
  }
};

// ─── DARAJALAR ──────────────────────────────────────────────

const S=(x,y,w,c)=>new Spike(x,y,w,c);

function loadLevel(idx){
  currentLevel=LVS[idx]();
  activeC=currentLevel.initC;
  player.reset(currentLevel.sx,currentLevel.sy);
  cam.x=0;cam.y=0;parts=[];
  maxReachedX=currentLevel.sx; // progress boshlash nuqtasi
}
function startLevel(idx){
  levelIdx=idx;loadLevel(idx);
  gameState='countdown';countDown=3;countTimer=0;
}
function startGame(){score=0;lives=5;startLevel(0);}
function restartLevel(){lives=5;startLevel(levelIdx);}
function nextLevel(){
  score+=500;snd('portal');
  burst(player.x+13,player.y+17,'#ffdd00',30);addFlash('#ffdd00',.5);
  levelIdx++;
  if(levelIdx>unlockedLvl){unlockedLvl=levelIdx;saveProg();}
  if(levelIdx>=LVS.length){
    if(score>bestScore){bestScore=score;saveProg();}
    gameState='win';
  }else{gameState='levelComplete';}
}
function setColor(c){
  if(activeC===c)return;
  activeC=c;snd('color');addFlash(CHEX[c],.35);
  burst(player.x+13,player.y+17,CHEX[c],14,.75);
}

const keys={};

window.addEventListener('keydown',e=>{
  initAudio();
  if(gameState==='menu')      {snd('tap');startGame();return;}
  if(gameState==='levelSelect'){if(e.key==='Escape'){gameState='menu';snd('tap');}return;}
  if(gameState==='paused'){
    if(e.key==='Escape'||e.key==='p'||e.key==='P'){gameState='playing';snd('tap');}
    return;
  }
  if(gameState==='levelComplete'){snd('tap');startLevel(levelIdx);return;}
  if(gameState==='over')      {snd('tap');gameState='menu';return;}
  if(gameState==='win')       {snd('tap');gameState='menu';return;}
  if(gameState==='playing'){
    if(e.key==='Escape'||e.key==='p'||e.key==='P'){gameState='paused';return;}
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;
    if(['ArrowUp','w','W',' '].includes(e.key)){e.preventDefault();player.jump();}
    if(e.key==='1')setColor(0);if(e.key==='2')setColor(1);if(e.key==='3')setColor(2);
  }
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
});

// ─── VIRTUAL TUGMALAR ───────────────────────────────────────
const btns={};
let pauseBtn={x:0,y:0,w:44,h:44};

function calcBtns(){
  const W=canvas.width,H=canvas.height,pad=10;
  const mvW=Math.min(76,W*.185),mvH=Math.min(74,H*.105);
  const row2Y=H-mvH-pad;
  btns.left={x:pad,y:row2Y,w:mvW,h:mvH};
  btns.right={x:pad*2+mvW,y:row2Y,w:mvW,h:mvH};
  const jpW=Math.min(82,W*.2),jpH=Math.min(82,H*.115);
  btns.jump={x:W-jpW-pad,y:H-jpH-pad,w:jpW,h:jpH};
  const cw=Math.min(70,W*.17),ch=Math.min(56,H*.08);
  const tot=cw*3+pad*2,csx=(W-tot)/2,cY=row2Y-ch-8;
  btns.R={x:csx,y:cY,w:cw,h:ch};
  btns.G={x:csx+cw+pad,y:cY,w:cw,h:ch};
  btns.B={x:csx+cw*2+pad*2,y:cY,w:cw,h:ch};
  pauseBtn={x:canvas.width-54,y:6,w:44,h:38};
}
calcBtns();

function inB(b,tx,ty,m){m=m||14;return tx>=b.x-m&&tx<=b.x+b.w+m&&ty>=b.y-m&&ty<=b.y+b.h+m;}
function getTxy(t){const r=canvas.getBoundingClientRect();return{x:(t.clientX-r.left)*canvas.width/r.width,y:(t.clientY-r.top)*canvas.height/r.height};}

// Pause menu tugmalar (vertikal markazda)
function getPauseBtns(){
  const W=canvas.width,H=canvas.height;
  const bW=Math.min(260,W*.68),bH=48;
  const cx=W/2-bW/2;
  return[
    {x:cx,y:H*.42,w:bW,h:bH,lbl:'▶  DAVOM ETISH',col:'#33ff88',act:'resume'},
    {x:cx,y:H*.42+bH+12,w:bW,h:bH,lbl:'↺  QAYTA BOSHLASH',col:'#ffdd00',act:'restart'},
    {x:cx,y:H*.42+bH*2+24,w:bW,h:bH,lbl:musicOn?'🔊  MUSIQA: YOQIQ':'🔇  MUSIQA: O\'CHIQ',col:'#aabbff',act:'music'},
    {x:cx,y:H*.42+bH*3+36,w:bW,h:bH,lbl:'🏠  BOSH MENYU',col:'#ff8866',act:'menu'},
  ];
}
// Level select karta joylari
function getLvCards(){
  const W=canvas.width,H=canvas.height;
  const cW=Math.min(W*.88,380),cH=Math.min(120,H*.155);
  const cx=(W-cW)/2;
  return LVS.map((_,i)=>({x:cx,y:H*.27+i*(cH+14),w:cW,h:cH,idx:i}));
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  const touches=e.changedTouches;

  // MENU
  if(gameState==='menu'){
    for(const t of touches){
      const{x,y}=getTxy(t);
      // Play tugmasi
      const W=canvas.width,H=canvas.height;
      const bW=Math.min(310,W*.8),bH=Math.min(62,H*.078);
      const bX=W/2-bW/2,bY=H*.82;
      if(x>=bX&&x<=bX+bW&&y>=bY&&y<=bY+bH){snd('tap');startGame();}
      // Darajalar tugmasi
      const dW=Math.min(200,W*.52),dY=bY+bH+14;
      const dX=W/2-dW/2;
      if(x>=dX&&x<=dX+dW&&y>=dY&&y<=dY+40){snd('tap');gameState='levelSelect';}
      // Musiqa
      const mW=44,mX=W-mW-10,mY=H-44;
      if(x>=mX&&x<=mX+mW&&y>=mY&&y<=mY+44){toggleMusic();snd('tap');}
    }
    return;
  }
  // LEVEL SELECT
  if(gameState==='levelSelect'){
    for(const t of touches){
      const{x,y}=getTxy(t);
      // Orqaga
      if(y<80&&x<100){snd('tap');gameState='menu';return;}
      for(const card of getLvCards()){
        if(x>=card.x&&x<=card.x+card.w&&y>=card.y&&y<=card.y+card.h){
          if(card.idx<=unlockedLvl){snd('tap');score=0;lives=5;startLevel(card.idx);}
        }
      }
    }
    return;
  }
  // PAUSED
  if(gameState==='paused'){
    for(const t of touches){
      const{x,y}=getTxy(t);
      for(const pb of getPauseBtns()){
        if(x>=pb.x&&x<=pb.x+pb.w&&y>=pb.y&&y<=pb.y+pb.h){
          snd('tap');
          if(pb.act==='resume')gameState='playing';
          else if(pb.act==='restart')restartLevel();
          else if(pb.act==='music')toggleMusic();
          else if(pb.act==='menu'){stopBGM();gameState='menu';}
        }
      }
    }
    return;
  }
  // LEVEL COMPLETE / OVER / WIN
  if(gameState==='levelComplete'){snd('tap');startLevel(levelIdx);return;}
  if(gameState==='over'||gameState==='win'){snd('tap');gameState='menu';return;}
  // COUNTDOWN — faqat harakat tugmalari ishlashi kerak
  if(gameState==='countdown'||gameState==='playing'){
    for(const t of touches){
      const{x,y}=getTxy(t);
      // Pause tugmasi
      if(inB(pauseBtn,x,y,6)){gameState='paused';return;}
      if(gameState==='playing'){
        if(inB(btns.left,x,y))  touch.left=true;
        if(inB(btns.right,x,y)) touch.right=true;
        if(inB(btns.jump,x,y))  player.jump();
        if(inB(btns.R,x,y))setColor(0);
        if(inB(btns.G,x,y))setColor(1);
        if(inB(btns.B,x,y))setColor(2);
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  touch.left=false;touch.right=false;
  for(const t of e.touches){const{x,y}=getTxy(t);if(inB(btns.left,x,y))touch.left=true;if(inB(btns.right,x,y))touch.right=true;}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  touch.left=false;touch.right=false;
  for(const t of e.touches){const{x,y}=getTxy(t);if(inB(btns.left,x,y))touch.left=true;if(inB(btns.right,x,y))touch.right=true;}
},{passive:false});

// ─── YULDUZLAR ──────────────────────────────────────────────
const STARS=Array.from({length:150},()=>({fx:Math.random(),fy:Math.random(),r:Math.random()*1.5+.3,spd:Math.random()*.0003+.0001,t:Math.random()*Math.PI*2}));
function drawStars(W,H,par){
  for(const s of STARS){
    s.t+=s.spd*60;const a=.2+Math.sin(s.t)*.2;
    const px=((s.fx*W)-(cam.x*(par||.07))+W*60)%W;
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(px,s.fy*H,s.r,0,Math.PI*2);ctx.fill();
  }
}

// ─── PREMIUM TUGMA CHIZISH ───────────────────────────────────
function drawPBtn(x,y,w,h,lbl,col,active,fs,r){
  ctx.save();ctx.globalAlpha=active?1:.68;
  ctx.shadowColor=col;ctx.shadowBlur=active?26:8;
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,active?col+'44':'#0d0d22');
  g.addColorStop(1,active?col+'22':'#08081a');
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,w,h,r||14);ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=active?2.5:1.5;ctx.stroke();
  ctx.shadowBlur=0;ctx.fillStyle='#fff';
  ctx.font=`bold ${fs||Math.min(h*.5,22)}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lbl,x+w/2,y+h/2);
  ctx.restore();
}

function drawMenu(){
  menuT+=.016;
  const W=canvas.width,H=canvas.height;

  drawStars(W,H,0);
  // Menu zarralari yangilash
  if(frame%25===0)spawnMenuParts();
  menuParts=menuParts.filter(p=>{p.upd();if(!p.dead()){const a=p.life/p.ml*.5;ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();ctx.restore();return true;}return false;});
  // Rang sferalari
  [[CHEX[0],.15,.44],[CHEX[1],.5,.29],[CHEX[2],.85,.44]].forEach(([c,fx,fy],i)=>{
    const ox=W*fx+Math.cos(menuT+i*2.1)*32,oy=H*fy+Math.sin(menuT*1.3+i)*24;
    const rg=ctx.createRadialGradient(ox,oy,0,ox,oy,85);
    rg.addColorStop(0,c+'44');rg.addColorStop(1,c+'00');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(ox,oy,85,0,Math.PI*2);ctx.fill();
  });

  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  // Sarlavha — rangberang to'lqin
  const fs=Math.min(W*.086,37);ctx.font=`bold ${fs}px Arial`;
  const T="RANGLAR KO'RLIGI";const tw=ctx.measureText(T).width;
  const sx=W/2-tw/2;const RC=[CHEX[0],'#ff9933','#ffee00',CHEX[1],CHEX[2],'#aa44ff'];
  let cx2=0;
  for(let i=0;i<T.length;i++){
    const ci=(i+Math.floor(menuT*2))%RC.length;
    ctx.fillStyle=RC[ci];ctx.shadowColor=RC[ci];ctx.shadowBlur=18;
    const cw2=ctx.measureText(T[i]).width;
    ctx.fillText(T[i],sx+cx2+cw2/2,H*.22+Math.sin(menuT*2.5+i*.4)*8);cx2+=cw2;
  }
  ctx.shadowBlur=6;ctx.shadowColor='#88aaff';ctx.fillStyle='#aabbff';
  ctx.font=`${Math.min(W*.038,15.5)}px Arial`;
  ctx.fillText('Color Shift Adventure  🎮',W/2,H*.31);
  // Rekord
  ctx.shadowBlur=0;
  if(bestScore>0){ctx.fillStyle='#ffdd88';ctx.font=`bold ${Math.min(W*.035,14)}px Arial`;ctx.fillText(`🏆  Rekord:  ${bestScore}  ⭐`,W/2,H*.375);}

  // Ijtimoiy ma'lumot
  const tips=["🔴→Qizil yo'qoladi","🟢→Yashil yo'qoladi","🔵→Ko'k yo'qoladi"];
  ctx.font=`${Math.min(W*.03,12)}px Arial`;
  tips.forEach((t,i)=>{
    const rc=CHEX[i];ctx.fillStyle=rc;ctx.shadowColor=rc;ctx.shadowBlur=5;
    ctx.fillText(t,W/2,H*.435+i*(Math.min(W*.03,12)*1.7));

  // O'YNASH tugmasi
  const pulse=.65+Math.sin(menuT*3.8)*.35;
  const bW=Math.min(310,W*.8),bH=Math.min(62,H*.078);
  const bX=W/2-bW/2,bY=H*.77;
  ctx.shadowColor='#44ffbb';ctx.shadowBlur=20+pulse*28;
  const bGr=ctx.createLinearGradient(bX,bY,bX,bY+bH);
  bGr.addColorStop(0,`rgba(16,80,52,${.85+pulse*.15})`);bGr.addColorStop(1,`rgba(8,45,28,${.85+pulse*.15})`);
  ctx.fillStyle=bGr;ctx.beginPath();ctx.roundRect(bX,bY,bW,bH,18);ctx.fill();
  ctx.strokeStyle=`rgba(60,240,160,${.7+pulse*.3})`;ctx.lineWidth=2.5;ctx.stroke();
  ctx.shadowBlur=0;ctx.globalAlpha=.9+pulse*.1;ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(bH*.48,24)}px Arial`;
  ctx.fillText('▶  O\'YNASHNI BOSHLASH',W/2,bY+bH/2);

  // Darajalar tugmasi
  const dW=Math.min(200,W*.52),dH=40;
  const dX=W/2-dW/2,dY=bY+bH+14;
  ctx.globalAlpha=.8;
  drawPBtn(dX,dY,dW,dH,'📋  DARAJALAR',NEU,false,Math.min(dH*.48,18));

  // Musiqa tugmasi
  ctx.globalAlpha=.7;
  drawPBtn(W-54,H-44,44,34,musicOn?'🔊':'🔇','#aabbff',false,14,10);

  // Version
  ctx.globalAlpha=.3;ctx.fillStyle='#fff';ctx.font=`${Math.min(W*.025,10)}px Arial`;
  ctx.fillText('v4.0  |  Premium Edition',W/2,H*.975);
  ctx.restore();
}

// ─── DARAJALAR TANLASH ───────────────────────────────────────
function drawLevelSelect(){
  menuT+=.016;
  const W=canvas.width,H=canvas.height;
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030314');bg.addColorStop(1,'#08052a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawStars(W,H,0);

  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  // Orqaga tugmasi
  drawPBtn(12,8,90,36,'← Orqaga',NEU,false,13,10);
  // Sarlavha
  ctx.fillStyle='#fff';ctx.shadowColor='#aabbff';ctx.shadowBlur=12;
  ctx.font=`bold ${Math.min(W*.06,24)}px Arial`;
  ctx.fillText('📋  DARAJALAR',W/2,H*.14);
  ctx.shadowBlur=0;

  // Kartalar
  const cards=getLvCards();
  for(const card of cards){
    const info=LV_INFO[card.idx];
    const locked=card.idx>unlockedLvl;
    ctx.save();
    // Karta foni
    ctx.shadowColor=locked?'#333':info.col;ctx.shadowBlur=locked?0:16;
    const cg=ctx.createLinearGradient(card.x,card.y,card.x,card.y+card.h);
    cg.addColorStop(0,locked?'#111120':info.col+'22');
    cg.addColorStop(1,locked?'#0a0a18':'#050510');
    ctx.fillStyle=cg;ctx.beginPath();ctx.roundRect(card.x,card.y,card.w,card.h,16);ctx.fill();
    // Chegara
    ctx.strokeStyle=locked?'#333344':info.col;ctx.lineWidth=locked?1:2;ctx.stroke();
    // Chap rang chizig'i
    if(!locked){ctx.fillStyle=info.col;ctx.shadowBlur=0;ctx.beginPath();ctx.roundRect(card.x,card.y,6,card.h,4);ctx.fill();}
    // Daraja raqami va belgisi
    ctx.shadowBlur=0;
    ctx.font=`bold ${Math.min(card.h*.45,38)}px Arial`;
    ctx.fillStyle=locked?'#444':info.col;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(info.icon,card.x+22,card.y+card.h/2-8);
    ctx.font=`bold ${Math.min(card.h*.28,22)}px Arial`;
    ctx.fillStyle=locked?'#555':'#fff';
    ctx.fillText(`${card.idx+1}-DARAJA`,card.x+70,card.y+card.h/2-10);
    ctx.font=`${Math.min(card.h*.2,16)}px Arial`;
    ctx.fillStyle=locked?'#444':'#aabbdd';
    ctx.fillText(LV_INFO[card.idx].sub,card.x+70,card.y+card.h/2+12);
    // O'ng tomon
    ctx.textAlign='right';
    if(locked){
      ctx.font=`${Math.min(card.h*.55,44)}px Arial`;ctx.fillStyle='#444';
      ctx.fillText('🔒',card.x+card.w-20,card.y+card.h/2);
    }else{
      // Oxirgi ball (agar o'ynalgan)
      ctx.font=`${Math.min(card.h*.22,18)}px Arial`;ctx.fillStyle=info.col;
      const star=card.idx<levelIdx?'⭐⭐⭐':card.idx===levelIdx&&score>0?'⭐':'○○○';
      ctx.fillText(star,card.x+card.w-18,card.y+card.h/2);
    }
    ctx.restore();
  }
  ctx.restore();
}

// ─── HUD (o'yin ichida) ─────────────────────────────────────
function drawHUD(){
  const W=canvas.width;
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,50);
  ctx.textBaseline='middle';
  // Jonlar
  ctx.fillStyle='#ff4466';ctx.font=`bold ${Math.min(14,W*.035)}px Arial`;
  ctx.textAlign='left';ctx.fillText('❤️'.repeat(Math.max(0,lives)),10,25);
  // Ball
  ctx.fillStyle='#ffee88';ctx.font=`bold ${Math.min(14,W*.035)}px Arial`;
  ctx.textAlign='center';ctx.fillText(`⭐ ${score}`,W/2,25);
  // Pause tugmasi
  drawPBtn(pauseBtn.x,pauseBtn.y,pauseBtn.w,pauseBtn.h,'⏸',NEU,false,16,8);
  // Aktiv rang
  ctx.fillStyle=CHEX[activeC];ctx.shadowColor=CHEX[activeC];ctx.shadowBlur=9;
  ctx.font=`bold ${Math.min(10,W*.026)}px Arial`;
  ctx.textAlign='right';
  ctx.fillText(`${CNAME[activeC].toUpperCase()} — O'CHIRILGAN`,W-8,38);
  ctx.shadowBlur=0;
  // Progress bar — maxReachedX bilan (faqat oldinga)
  const prog=Math.min(1,(maxReachedX-currentLevel.sx)/Math.max(1,currentLevel.worldW-canvas.width));
  const bx=W*.14,bw=W*.72,by=43,bh=5;
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bx,by,bw,bh);
  const pg=ctx.createLinearGradient(bx,0,bx+bw,0);
  pg.addColorStop(0,CHEX[0]);pg.addColorStop(.5,CHEX[1]);pg.addColorStop(1,CHEX[2]);
  ctx.fillStyle=pg;ctx.shadowColor='#fff';ctx.shadowBlur=5;
  ctx.fillRect(bx,by,bw*prog,bh);ctx.shadowBlur=0;
  // Bayroqcha — faqat oldinga harakatlanadi!
  ctx.font='11px Arial';ctx.textAlign='left';
  ctx.fillText('🚩',bx+bw*prog-4,by+bh+7);
  // Start belgisi
  ctx.fillText('🏃',bx-3,by+bh+7);
}

// ─── BOSHQARUV TUGMALARI ────────────────────────────────────
function drawControls(){
  calcBtns();
  const W=canvas.width,H=canvas.height;
  const barTop=Math.min(btns.R.y,btns.left.y)-14;
  const bg=ctx.createLinearGradient(0,barTop,0,H);
  bg.addColorStop(0,'rgba(0,0,5,0)');bg.addColorStop(.1,'rgba(0,0,15,.9)');bg.addColorStop(1,'rgba(0,0,22,.98)');
  ctx.fillStyle=bg;ctx.fillRect(0,barTop,W,H-barTop);
  ctx.strokeStyle='rgba(100,100,180,.14)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,barTop+14);ctx.lineTo(W,barTop+14);ctx.stroke();
  drawPBtn(btns.left.x,btns.left.y,btns.left.w,btns.left.h,'◀','#4466cc',touch.left);
  drawPBtn(btns.right.x,btns.right.y,btns.right.w,btns.right.h,'▶','#4466cc',touch.right);
  drawPBtn(btns.jump.x,btns.jump.y,btns.jump.w,btns.jump.h,'▲','#8855cc',false,Math.min(btns.jump.h*.6,30));
  drawPBtn(btns.R.x,btns.R.y,btns.R.w,btns.R.h,'R',CHEX[0],activeC===0,Math.min(btns.R.h*.55,22));
  drawPBtn(btns.G.x,btns.G.y,btns.G.w,btns.G.h,'G',CHEX[1],activeC===1,Math.min(btns.G.h*.55,22));
  drawPBtn(btns.B.x,btns.B.y,btns.B.w,btns.B.h,'B',CHEX[2],activeC===2,Math.min(btns.B.h*.55,22));
  ctx.fillStyle='rgba(170,170,210,.45)';ctx.font=`${Math.min(9.5,W*.024)}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText("RANGNI O'CHIR",W/2,btns.R.y-3);
}

// ─── COUNTDOWN ──────────────────────────────────────────────
function drawCountDown(){
  const W=canvas.width,H=canvas.height;
  ctx.save();ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  const n=Math.ceil(countDown);
  const scale=1+(countDown%1)*.6;
  ctx.font=`bold ${Math.min(W*.32,130)*scale}px Arial`;
  ctx.fillStyle=n===3?CHEX[0]:n===2?CHEX[1]:CHEX[2];
  ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=55;
  ctx.fillText(n>0?n:'GO!',W/2,H*.42);
  ctx.restore();
}

// ─── PAUSE MENYU ────────────────────────────────────────────
function drawPause(){
  const W=canvas.width,H=canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(0,0,12,.85)';ctx.fillRect(0,0,W,H);
  // Yon tomonlardagi effekt
  const lg=ctx.createLinearGradient(0,0,W,0);
  lg.addColorStop(0,CHEX[0]+'22');lg.addColorStop(.5,'rgba(0,0,0,0)');lg.addColorStop(1,CHEX[2]+'22');
  ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(W*.1,40)}px Arial`;
  ctx.fillStyle='#fff';ctx.shadowColor=NEU;ctx.shadowBlur=20;
  ctx.fillText('⏸  PAUZA',W/2,H*.25);
  ctx.shadowBlur=0;

  // Score
  ctx.font=`${Math.min(W*.05,20)}px Arial`;ctx.fillStyle='#ffee88';
  ctx.fillText(`⭐ ${score}  |  ❤️ ${lives}`,W/2,H*.335);

  // Pause menyu tugmalari
  for(const pb of getPauseBtns()){drawPBtn(pb.x,pb.y,pb.w,pb.h,pb.lbl,pb.col,false,Math.min(pb.h*.46,20));}
  ctx.restore();
}

// ─── OVERLAY (Level Complete / Over / Win) ───────────────────
function drawOverlay(t1,sub,hint,tc){
  titleT+=.025;
  const W=canvas.width,H=canvas.height;
  ctx.save();ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);
  // Rang effekti
  const lg=ctx.createLinearGradient(0,0,W,H);
  lg.addColorStop(0,tc+'11');lg.addColorStop(1,tc+'22');
  ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(W*.1,42)}px Arial`;
  ctx.fillStyle=tc;ctx.shadowColor=tc;ctx.shadowBlur=35;
  ctx.fillText(t1,W/2,H*.28+Math.sin(titleT*3)*6);
  if(sub){
    ctx.shadowBlur=0;ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.min(W*.065,26)}px Arial`;ctx.fillText(sub,W/2,H*.43);
    if(bestScore>0){ctx.fillStyle='#ffdd88';ctx.font=`${Math.min(W*.035,14)}px Arial`;ctx.fillText(`🏆 Rekord: ${bestScore}`,W/2,H*.51);}
  }
  const pulse=.6+Math.sin(titleT*3.8)*.4;
  const bW=Math.min(270,W*.7),bH=50,bX=W/2-bW/2,bY=H*.62;
  ctx.shadowColor='#44ffbb';ctx.shadowBlur=16+pulse*20;
  ctx.fillStyle=`rgba(16,65,45,${.8+pulse*.2})`;
  ctx.beginPath();ctx.roundRect(bX,bY,bW,bH,14);ctx.fill();
  ctx.strokeStyle=`rgba(60,240,150,${.6+pulse*.4})`;ctx.lineWidth=2.5;ctx.stroke();
  ctx.shadowBlur=0;ctx.globalAlpha=.85+pulse*.15;ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(bH*.5,21)}px Arial`;ctx.fillText(hint,W/2,bY+bH/2);
  ctx.restore();
}

// ─── YANGILASH ──────────────────────────────────────────────
function update(){
  frame++;
  if(gameState==='countdown'){
    countTimer++;
    if(countTimer%55===0){
      countDown--;
      if(countDown>0)snd('count');
      else{snd('go');gameState='playing';countDown=0;}
    }
    return;
  }
  if(gameState==='playing'){
    player.upd();updateCam();
    for(const e of currentLevel.enemies)e.upd();
    for(const s of currentLevel.spikes)s.check();
    for(const g of currentLevel.gems)g.upd();
    currentLevel.portal.upd();
  }
  parts=parts.filter(p=>{p.upd();return!p.dead();});
  if((gameState==='win'||gameState==='levelComplete')&&frame%2===0){
    const cols=[CHEX[0],CHEX[1],CHEX[2],'#ffdd00','#fff'];
    parts.push(new Particle(Math.random()*canvas.width+cam.x,Math.random()*canvas.height*.65+cam.y,cols[Math.random()*cols.length|0],(Math.random()-.5)*7,-Math.random()*7,2,5));
  }
  if(shakeAmt>0){shakeAmt*=.78;if(shakeAmt<.3)shakeAmt=0;}
  if(flashAmt>0){flashAmt*=.82;if(flashAmt<.01)flashAmt=0;}
}

// ─── TASVIR ─────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Menyu ekranlar (camera shake yo'q)
  if(gameState==='menu'){drawMenu();return;}
  if(gameState==='levelSelect'){drawLevelSelect();return;}

  // O'yin sahnasi (shake bilan)
  ctx.save();
  if(shakeAmt>0)ctx.translate((Math.random()-.5)*shakeAmt*2,(Math.random()-.5)*shakeAmt*2);
  // Fon
  const bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,currentLevel.bgTop);bg.addColorStop(1,currentLevel.bgBot);
  ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawStars(canvas.width,canvas.height,.08);
  // O'yin elementlari
  for(const p of currentLevel.plats)p.draw();
  for(const s of currentLevel.spikes)s.draw();
  for(const g of currentLevel.gems)g.draw();
  currentLevel.portal.draw();
  for(const e of currentLevel.enemies)e.draw();
  player.draw();
  for(const p of parts)p.draw();
  // Rang flesh
  if(flashAmt>0){ctx.globalAlpha=flashAmt*.3;ctx.fillStyle=flashCol;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1;}
  ctx.restore();

  // UI (shake ta'sir qilmaydi)
  if(gameState!=='over'&&gameState!=='win'&&gameState!=='levelComplete'){
    drawHUD();drawControls();
  }
  if(gameState==='countdown')drawCountDown();
  if(gameState==='paused')drawPause();
  if(gameState==='levelComplete')drawOverlay('🎉 DARAJA TUGADI!',`Natija: ⭐ ${score}`,'▶  KEYINGI DARAJA','#ffdd00');
  if(gameState==='over')         drawOverlay('💔 O\'YIN TUGADI',`Natija: ⭐ ${score}`,'🏠  BOSH MENYU','#ff3355');
  if(gameState==='win')          drawOverlay("🏆 G'OLIB! 🏆",`Umumiy natija: ⭐ ${score}`,'🏠  BOSH MENYU','#ffdd00');
}

function loop(){update();render();requestAnimationFrame(loop);}

// ─── ISHGA TUSHIRISH ────────────────────────────────────────
loadLevel(0);gameState='menu';calcBtns();
canvas.addEventListener('touchstart',()=>{if(!ac){initAudio();if(gameState!=='menu')startBGM();}},{passive:true,once:true});
window.addEventListener('keydown',()=>{if(!ac){initAudio();if(gameState!=='menu')startBGM();}},{passive:true,once:true});
// BGM o'yin boshlanganda avtomatik yoqiladi (countdown da)
const origStartLevel=startLevel;
function startLevelWithBGM(idx){
  loadLevel(idx);
  levelIdx=idx;
  gameState='countdown';countDown=3;countTimer=0;
  if(ac&&!bgmRunning)startBGM();
}
loop();
</script>
